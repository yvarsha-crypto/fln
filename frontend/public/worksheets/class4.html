<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Class 4 FLN Worksheet Generator</title>
<style>
*{box-sizing:border-box;}
body{font-family:Arial,Helvetica,sans-serif;background:#e9e9e9;color:#000;margin:0;padding:0;}
.toolbar{background:#fff;border-bottom:2px solid #000;padding:10px 14px;display:flex;flex-wrap:wrap;align-items:center;gap:8px;position:sticky;top:0;z-index:60;}
.toolbar h1{font-size:15px;margin:0 8px 0 0;white-space:nowrap;}
.toolbar label{font-size:12px;}
.toolbar input[type=number]{width:64px;padding:4px 5px;border:1px solid #000;font-family:inherit;font-size:12px;}
.btn{background:#fff;border:1.5px solid #000;color:#000;padding:5px 11px;font-size:12px;font-family:inherit;cursor:pointer;border-radius:3px;}
.btn:hover{background:#000;color:#fff;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn:disabled:hover{background:#fff;color:#000;}
#exportProgress{font-size:11px;color:#000;min-width:200px;}
.tabbar{background:#f3f3f3;border-bottom:2px solid #000;padding:6px 8px 0 8px;display:flex;flex-wrap:wrap;gap:3px;position:sticky;top:52px;z-index:59;max-height:100px;overflow-y:auto;}
.tabbtn{background:#ddd;border:1px solid #000;border-bottom:none;padding:4px 10px;font-size:12px;font-family:inherit;cursor:pointer;border-radius:4px 4px 0 0;}
.tabbtn.active{background:#fff;font-weight:bold;}
#setsContainer{padding:18px;display:flex;justify-content:center;}
.worksheet{display:none;}
.worksheet.active{display:flex;flex-direction:column;align-items:center;gap:18px;}
.page-wrapper{position:relative;display:inline-block;background:#fff;page-break-after:always;}
.page-wrapper:last-child{page-break-after:auto;}
.reg-sq{position:absolute;width:5mm;height:5mm;background:#000;z-index:10;}
.reg-sq.tl{top:2mm;left:2mm;}.reg-sq.tr{top:2mm;right:2mm;}
.reg-sq.bl{bottom:2mm;left:2mm;}.reg-sq.br{bottom:2mm;right:2mm;}
.page{position:relative;background:#fff;width:210mm;min-height:296mm;padding:9mm 10mm 8mm 10mm;border:1px solid #999;box-shadow:0 0 10px rgba(0,0,0,0.12);}
.ws-header{text-align:center;border-bottom:3px solid #000;padding-bottom:4px;margin-bottom:6px;}
.ws-title{font-size:15px;font-weight:bold;}
.ws-sub{font-size:11px;margin-top:2px;font-weight:bold;}
.ws-fields{display:flex;justify-content:space-between;font-size:10px;margin-top:5px;flex-wrap:wrap;gap:3px;}
.ws-fields span{border-bottom:1px solid #000;padding:0 3px 1px 3px;min-width:85px;display:inline-block;}
.section-label{font-size:10px;font-weight:bold;letter-spacing:0.8px;text-transform:uppercase;background:#000;color:#fff;padding:2px 7px;margin:5px 0 2px 0;display:block;}
.qcell{padding:5px 7px 6px 7px;display:flex;flex-direction:column;}
.ctitle{font-weight:bold;font-size:10px;margin-bottom:1px;border-bottom:1px solid #000;padding-bottom:1px;}
.cprompt{font-size:8.5px;margin-bottom:2px;line-height:1.3;}
.ansbox{border:1.6px solid #000;display:inline-flex;align-items:center;justify-content:center;font-size:10px;min-width:28px;height:19px;padding:0 3px;}
.ansbox.lg{min-width:44px;height:23px;font-size:11px;}
.row{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin:2px 0;}
.numbox{border:1.6px solid #000;padding:1px 5px;font-size:11px;font-weight:bold;display:inline-block;}
.blankline{border-bottom:1.4px solid #000;display:inline-block;min-width:28px;height:12px;}
.smallnote{font-size:7.5px;color:#444;margin-top:2px;}
.vcol{display:inline-block;text-align:right;font-family:Consolas,monospace;font-weight:bold;font-size:14px;line-height:1.4;margin:3px 10px 2px 0;}
.vcol .opline{border-top:1.5px solid #000;margin-top:2px;padding-top:2px;}
.divblock{display:inline-block;margin:4px 10px 4px 0;vertical-align:top;}
.divblock .div-inner{display:flex;align-items:flex-start;}
.divblock .divisor{font-size:13px;font-weight:bold;font-family:Consolas,monospace;padding-right:3px;padding-top:4px;line-height:1;}
.divblock .divright{border-left:2px solid #000;border-top:2px solid #000;padding:2px 6px 2px 5px;min-width:50px;}
.divblock .dividend{font-size:13px;font-weight:bold;font-family:Consolas,monospace;line-height:1.3;}
.divblock .qline{border-bottom:1px solid #000;min-width:46px;height:15px;}
.divblock .workarea{min-height:32px;border-top:1px dashed #ccc;margin-top:2px;font-size:8px;color:#bbb;}
table.pvb{border-collapse:collapse;font-size:9px;}
table.pvb th,table.pvb td{border:1px solid #000;padding:2px 3px;text-align:center;}
.seesaw-wrap{display:flex;justify-content:center;margin:2px 0;}
.ws-footer{margin-top:4px;border-top:1.3px solid #000;padding-top:2px;font-size:8.5px;text-align:center;color:#444;}
.pageid{position:absolute;bottom:2mm;right:5mm;font-family:'Courier New',monospace;font-size:7px;color:#666;}
.cont-header{font-size:10px;font-weight:bold;text-align:center;border-bottom:2px solid #000;margin-bottom:5px;padding-bottom:2px;color:#333;}
.omr-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:40;display:none;}
.omr-overlay.on{display:block;}
.omr-box{position:absolute;border:1.5px solid rgba(200,0,0,0.9);background:rgba(255,0,0,0.10);box-sizing:border-box;}
.omr-label{position:absolute;top:-11px;left:0;font-size:6.5px;font-family:'Courier New',monospace;background:rgba(200,0,0,0.88);color:#fff;padding:0 2px;white-space:nowrap;line-height:11px;}
@media print{
  body{background:#fff;}
  .no-print{display:none !important;}
  #setsContainer{padding:0;display:block;}
  .worksheet{display:none;}
  .worksheet.active{display:block;}
  .page-wrapper{box-shadow:none;display:block;page-break-after:always;}
  .page-wrapper:last-child{page-break-after:auto;}
  .page{box-shadow:none;border:none;width:auto;min-height:0;padding:7mm 8mm;}
}
@page{size:A4;margin:4mm;}
</style>
<script src="./html2canvas.min.js"></script>
<script src="./jspdf.umd.min.js"></script>

<body>
<div class="toolbar no-print">
  <h1>Class 4 — FLN Worksheet Generator</h1>
  <label>Sets: <input type="number" id="setCount" min="1" max="5000" value="5"></label>
  <button class="btn" id="generateBtn">Generate</button>
  <button class="btn" id="printBtn">Print current set</button>
  <button class="btn" id="omrToggleBtn">Toggle OMR Overlay</button>
  <button class="btn" id="exportCoordsBtn">Export Coords JSON</button>
  <label>Set #: <input type="number" id="singleSetNum" min="1" value="1" style="width:52px;"></label>
  <button class="btn" id="downloadSingleBtn">Download This Set</button>
  <button class="btn" id="exportAllBtn">Download All Sets (ZIP)</button>
  <span id="exportProgress" class="no-print"></span>
</div>
<div class="tabbar no-print" id="tabbar"></div>
<div id="setsContainer"></div>
<div id="pdfRenderRoot" style="position:fixed;left:-99999px;top:0;width:210mm;background:#fff;"></div>

<script>
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function sh(a){const r=a.slice();for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function sp(a,n){return sh(a).slice(0,n);}
function pk(a){return a[ri(0,a.length-1)];}

const V={
  hundredBlock:()=>'<svg width="18" height="18" viewBox="0 0 18 18"><rect x=".5" y=".5" width="17" height="17" fill="#fff" stroke="#000" stroke-width="1"/>'+Array.from({length:9},(_,i)=>'<line x1="'+(i+1)*1.8+'" y1="0" x2="'+(i+1)*1.8+'" y2="18" stroke="#000" stroke-width="0.3"/>').join('')+Array.from({length:9},(_,i)=>'<line x1="0" y1="'+(i+1)*1.8+'" x2="18" y2="'+(i+1)*1.8+'" stroke="#000" stroke-width="0.3"/>').join('')+'</svg>',
  tenBlock:()=>'<svg width="4" height="18" viewBox="0 0 4 18"><rect x=".5" y=".5" width="3" height="17" fill="#fff" stroke="#000" stroke-width="1"/>'+Array.from({length:9},(_,i)=>'<line x1="0" y1="'+(i+1)*1.8+'" x2="4" y2="'+(i+1)*1.8+'" stroke="#000" stroke-width="0.3"/>').join('')+'</svg>',
  oneBlock:()=>'<svg width="5" height="5" viewBox="0 0 5 5"><rect x=".4" y=".4" width="4.2" height="4.2" fill="#fff" stroke="#000" stroke-width="0.9"/></svg>',
  placeValueBlocks(h,t,o){
    let s='<div style="display:flex;flex-wrap:wrap;gap:2px;align-items:flex-end;max-width:120px;">';
    for(let i=0;i<h;i++) s+=this.hundredBlock();
    if(h>0&&(t>0||o>0)) s+='<span style="width:2px;"></span>';
    for(let i=0;i<t;i++) s+=this.tenBlock();
    if(t>0&&o>0) s+='<span style="width:2px;"></span>';
    s+='<div style="display:flex;flex-wrap:wrap;gap:1px;align-self:flex-end;max-width:36px;">';
    for(let i=0;i<o;i++) s+=this.oneBlock();
    return s+'</div></div>';
  },
  pencilOnRuler(lenCm,rulerMax){
    rulerMax=rulerMax||10;const sc=11,w=rulerMax*sc+8;
    let ticks='';
    for(let i=0;i<=rulerMax;i++){const x=4+i*sc;ticks+='<line x1="'+x+'" y1="19" x2="'+x+'" y2="12" stroke="#000" stroke-width="0.7"/><text x="'+x+'" y="26" font-size="4.5" text-anchor="middle" font-family="Arial">'+i+'</text>';}
    const ex=4+lenCm*sc;
    return '<svg width="'+w+'" height="28" viewBox="0 0 '+w+' 28"><polygon points="4,3 '+(ex-4)+',3 '+ex+',7 '+(ex-4)+',11 4,11" fill="#fffde7" stroke="#000" stroke-width="0.9"/><line x1="10" y1="3" x2="10" y2="11" stroke="#000" stroke-width="0.6"/><rect x="3" y="10" width="'+(w-6)+'" height="8" fill="none" stroke="#000" stroke-width="0.9"/>'+ticks+'</svg>';
  },
  balanceScale(lL,rL,leftHeavy){
    const t=leftHeavy?-7:7,lY=leftHeavy?5:-6,rY=leftHeavy?-6:5;
    return '<svg width="100" height="64" viewBox="0 0 108 68"><polygon points="47,62 61,62 54,48" fill="#fff" stroke="#000" stroke-width="1.4"/><rect x="40" y="61" width="28" height="3" fill="#000"/><g transform="rotate('+t+' 54 48)"><rect x="10" y="47" width="88" height="2.5" fill="#000"/><line x1="16" y1="49" x2="16" y2="'+(57+lY)+'" stroke="#000" stroke-width="1.2"/><line x1="92" y1="49" x2="92" y2="'+(57+rY)+'" stroke="#000" stroke-width="1.2"/><path d="M6,'+(57+lY)+' Q16,'+(66+lY)+' 26,'+(57+lY)+'" fill="none" stroke="#000" stroke-width="1.2"/><path d="M82,'+(57+rY)+' Q92,'+(66+rY)+' 102,'+(57+rY)+'" fill="none" stroke="#000" stroke-width="1.2"/><text x="16" y="'+(55+lY)+'" font-size="6" text-anchor="middle" font-family="Arial" font-weight="bold">'+lL+'</text><text x="92" y="'+(55+rY)+'" font-size="6" text-anchor="middle" font-family="Arial" font-weight="bold">'+rL+'</text></g></svg>';
  },
  fractionCircle(frac){
    let shade='';
    if(Math.abs(frac-0.5)<0.01) shade='<path d="M30,30 L30,3 A27,27 0 0 1 57,30 Z" fill="#bbb"/><path d="M30,30 L57,30 A27,27 0 0 1 30,57 Z" fill="#bbb"/>';
    else if(Math.abs(frac-0.25)<0.01) shade='<path d="M30,30 L30,3 A27,27 0 0 1 57,30 Z" fill="#bbb"/>';
    else if(Math.abs(frac-0.75)<0.01) shade='<path d="M30,30 L30,3 A27,27 0 0 1 57,30 Z" fill="#bbb"/><path d="M30,30 L57,30 A27,27 0 0 1 30,57 Z" fill="#bbb"/><path d="M30,30 L30,57 A27,27 0 0 1 3,30 Z" fill="#bbb"/>';
    return '<svg width="52" height="52" viewBox="0 0 60 60"><circle cx="30" cy="30" r="27" fill="#fff" stroke="#000" stroke-width="1.4"/>'+shade+'<line x1="30" y1="3" x2="30" y2="57" stroke="#000" stroke-width="1"/><line x1="3" y1="30" x2="57" y2="30" stroke="#000" stroke-width="1"/><circle cx="30" cy="30" r="27" fill="none" stroke="#000" stroke-width="1.4"/></svg>';
  },
  fractionBar(n,of){
    let c='';for(let i=0;i<of;i++) c+='<rect x="'+(i*(56/of))+'" y="0" width="'+(56/of)+'" height="18" fill="'+(i<n?'#bbb':'#fff')+'" stroke="#000" stroke-width="1"/>';
    return '<svg width="56" height="18" viewBox="0 0 56 18">'+c+'</svg>';
  },
  fruitIcon(){return '<svg width="10" height="10" viewBox="0 0 11 11"><circle cx="5.5" cy="6.2" r="4.3" fill="#fff" stroke="#000" stroke-width="1"/><line x1="5.5" y1="2" x2="6.6" y2="0.6" stroke="#000" stroke-width="0.8"/></svg>';},
  basketIcon(count){
    let it='';for(let i=0;i<count;i++){const x=4+(i%5)*9,y=3+Math.floor(i/5)*8;it+='<circle cx="'+(x+3.6)+'" cy="'+(y+3.6)+'" r="3.2" fill="#fff" stroke="#000" stroke-width="0.8"/>';}
    return '<svg width="52" height="28" viewBox="0 0 52 28">'+it+'<path d="M2,18 L6,26 L46,26 L50,18 Z" fill="#fff" stroke="#000" stroke-width="1.2"/><path d="M10,18 C10,9 42,9 42,18" fill="none" stroke="#000" stroke-width="1.1"/></svg>';
  },
  basketIconSmall(count){
    let it='';for(let i=0;i<count;i++){const x=2+(i%4)*6.5,y=2+Math.floor(i/4)*6;it+='<circle cx="'+(x+2.4)+'" cy="'+(y+2.4)+'" r="2.1" fill="#fff" stroke="#000" stroke-width="0.6"/>';}
    return '<svg width="30" height="20" viewBox="0 0 30 20">'+it+'<path d="M1,13 L4,18 L26,18 L29,13 Z" fill="#fff" stroke="#000" stroke-width="0.9"/><path d="M6,13 C6,7 24,7 24,13" fill="none" stroke="#000" stroke-width="0.8"/></svg>';
  },
  barChart(data,maxY){
    maxY=maxY||Math.ceil(Math.max(...data.map(d=>d.value))/10)*10;
    const W=148,H=78,pL=16,pB=12,bW=13,g=5,cH=H-pB-4;
    let bars='',xl='',yl='';
    for(let s=0;s<=4;s++){const v=Math.round(maxY/4*s),y=4+cH-(cH*s/4);yl+='<line x1="'+pL+'" y1="'+y+'" x2="'+(W-2)+'" y2="'+y+'" stroke="#ccc" stroke-width="0.4"/><text x="'+(pL-2)+'" y="'+(y+2)+'" font-size="4" text-anchor="end" font-family="Arial">'+v+'</text>';}
    data.forEach((d,i)=>{const x=pL+3+i*(bW+g),bh=cH*(d.value/maxY),y=4+cH-bh;bars+='<rect x="'+x+'" y="'+y+'" width="'+bW+'" height="'+bh+'" fill="#ccc" stroke="#000" stroke-width="0.7"/><text x="'+(x+bW/2)+'" y="'+(y-2)+'" font-size="4" text-anchor="middle" font-family="Arial">'+d.value+'</text>';xl+='<text x="'+(x+bW/2)+'" y="'+(H-1)+'" font-size="4.2" text-anchor="middle" font-family="Arial">'+d.label.slice(0,7)+'</text>';});
    return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">'+yl+bars+xl+'<line x1="'+pL+'" y1="'+(4+cH)+'" x2="'+(W-2)+'" y2="'+(4+cH)+'" stroke="#000" stroke-width="0.9"/><line x1="'+pL+'" y1="4" x2="'+pL+'" y2="'+(4+cH)+'" stroke="#000" stroke-width="0.9"/></svg>';
  },
  divisionBox(dividend,divisor){
    return '<div class="divblock"><div class="div-inner">'+
      '<div class="divisor">'+divisor+'</div>'+
      '<div class="divright">'+
        '<div class="qline"></div>'+
        '<div class="dividend">'+dividend+'</div>'+
        '<div class="workarea">&nbsp;</div>'+
      '</div>'+
    '</div></div>';
  }
};

const Q={};

/* SECTION 1 — Place Value Blocks: 5 problems */
Q.S1=function(){
  const problems=[];
  for(let i=0;i<5;i++){const h=ri(1,4),t=ri(0,9),o=ri(0,9);problems.push({h,t,o,num:h*100+t*10+o});}
  let html='<div class="ctitle">Section 1 — Place Value Blocks</div>'+
    '<div class="cprompt">Look at the blocks and write the number.</div>';
  problems.forEach((p,i)=>{
    html+='<div style="display:flex;align-items:center;gap:6px;margin:3px 0;">'+
      '<span style="font-size:8.5px;font-weight:bold;">'+(i+1)+'.</span>'+
      V.placeValueBlocks(p.h,p.t,p.o)+
      '<span style="font-size:8.5px;">= </span>'+
      '<span class="ansbox lg" data-omr="S1-n'+i+'">&nbsp;</span></div>';
  });
  return {html,answers:problems.map((p,i)=>({qid:'S1n'+i,label:'Number '+(i+1),type:'fill_blank',answer:String(p.num),icr:{detect:'handwritten_number_ocr',notes:'Number from blocks.'},omr:'S1-n'+i}))};
};

/* SECTION 2 — Expanded Form: 5 problems (3-digit) */
Q.S2=function(){
  const probs=[];
  for(let i=0;i<5;i++){
    const digits=[ri(1,9),ri(0,9),ri(0,9)];
    const vals=digits.map((d,j)=>d*Math.pow(10,digits.length-1-j));
    const num=digits[0]*100+digits[1]*10+digits[2];
    probs.push({num,vals});
  }
  let html='<div class="ctitle">Section 2 — Expanded Form</div>'+
    '<div class="cprompt">Write the expanded form of each 3-digit number.</div>';
  probs.forEach((p,i)=>{
    html+='<div style="margin:3px 0;font-size:8.5px;"><b>'+(i+1)+') '+p.num+' = </b>'+
      p.vals.map((v,j)=>'<span class="blankline" data-omr="S2-'+i+'e'+j+'" style="min-width:26px;"></span>'+(j<p.vals.length-1?' + ':'')).join('')+'</div>';
  });
  const answers=[];
  probs.forEach((p,i)=>p.vals.forEach((v,j)=>answers.push({qid:'S2'+i+'e'+j,label:'Num '+(i+1)+' term '+(j+1),type:'fill_blank',answer:String(v),icr:{detect:'handwritten_number_ocr',notes:'Expanded term.'},omr:'S2-'+i+'e'+j})));
  return {html,answers};
};

/* SECTION 3 — Compare Numbers: 5 pairs */
Q.S3=function(){
  const pairs=[];
  for(let i=0;i<5;i++){
    let a=ri(100,999),b=ri(100,999);
    if(i===3) b=a;
    pairs.push({a,b,sym:a>b?'>':(a<b?'<':'=')});
  }
  let html='<div class="ctitle">Section 3 — Compare Numbers</div>'+
    '<div class="cprompt">Fill in &gt;, &lt; or =</div>';
  pairs.forEach((p,i)=>{
    html+='<div class="row" style="margin:2px 0;gap:4px;"><span style="font-size:8px;font-weight:bold;">'+(i+1)+')</span>'+
      '<span class="numbox" style="font-size:9.5px;padding:1px 4px;">'+p.a+'</span>'+
      '<span class="ansbox" style="min-width:22px;height:20px;" data-omr="S3-s'+i+'">&nbsp;</span>'+
      '<span class="numbox" style="font-size:9.5px;padding:1px 4px;">'+p.b+'</span></div>';
  });
  return {html,answers:pairs.map((p,i)=>({qid:'S3s'+i,label:'Pair '+(i+1),type:'fill_blank_symbol',answer:p.sym,icr:{detect:'handwritten_symbol_ocr',notes:'>, < or ='},omr:'S3-s'+i}))};
};

/* SECTION 4 — Addition: 5 vertical problems */
Q.S4=function(){
  const probs=[];
  for(let i=0;i<5;i++){const a=ri(100,899),b=ri(100,Math.min(899,999-a+100));probs.push({a,b,res:a+b});}
  let html='<div class="ctitle">Section 4 — Addition</div>'+
    '<div class="cprompt">Find the sum.</div>'+
    '<div style="display:flex;gap:10px;flex-wrap:wrap;">';
  probs.forEach((p,i)=>{
    html+='<div class="vcol"><span style="font-size:8px;">'+(i+1)+')</span><br>'+p.a+'<br>+ '+p.b+
      '<div class="opline"><div class="ansbox lg" data-omr="S4-r'+i+'">&nbsp;</div></div></div>';
  });
  html+='</div>';
  return {html,answers:probs.map((p,i)=>({qid:'S4r'+i,label:p.a+'+'+p.b,type:'fill_blank',answer:String(p.res),icr:{detect:'handwritten_number_ocr',notes:'Sum.'},omr:'S4-r'+i}))};
};

/* SECTION 5 — Subtraction: 5 vertical problems */
Q.S5=function(){
  const probs=[];
  for(let i=0;i<5;i++){const a=ri(200,999),b=ri(100,a-1);probs.push({a,b,res:a-b});}
  let html='<div class="ctitle">Section 5 — Subtraction</div>'+
    '<div class="cprompt">Find the difference.</div>'+
    '<div style="display:flex;gap:10px;flex-wrap:wrap;">';
  probs.forEach((p,i)=>{
    html+='<div class="vcol"><span style="font-size:8px;">'+(i+1)+')</span><br>'+p.a+'<br>&#8722; '+p.b+
      '<div class="opline"><div class="ansbox lg" data-omr="S5-r'+i+'">&nbsp;</div></div></div>';
  });
  html+='</div>';
  return {html,answers:probs.map((p,i)=>({qid:'S5r'+i,label:p.a+'-'+p.b,type:'fill_blank',answer:String(p.res),icr:{detect:'handwritten_number_ocr',notes:'Difference.'},omr:'S5-r'+i}))};
};

/* SECTION 6 — Money: 5 problems.
   FIX: each denomination is shown only ONCE as a tickable option, so the
   target amount is always built from EACH chosen denomination used exactly
   ONCE (no "tick the same note twice" requirement, which a child physically
   cannot do on paper). This guarantees every total shown is achievable by
   the visible options only — no impossible totals like needing 2x200 when
   "₹200" only appears once on the page. */
Q.S6=function(){
  const allDenoms=[500,200,100,50,20,10,5,2,1];
  function makeCombo(){
    // pick 3-4 UNIQUE denominations, each used exactly once -> total is just their sum
    const chosenCount=ri(3,4);
    const chosen=sp(allDenoms,chosenCount).sort((a,b)=>b-a);
    const total=chosen.reduce((s,d)=>s+d,0);
    // 2 decoy denominations not in the chosen set, so the child must pick correctly
    const decoys=sp(allDenoms.filter(d=>!chosen.includes(d)),2);
    const display=sh([...chosen,...decoys]);
    return {chosen,total,display};
  }
  const problems=[];
  for(let i=0;i<5;i++) problems.push(makeCombo());
  let html='<div class="ctitle">Section 6 — Money</div>'+
    '<div class="cprompt">Circle the notes/coins that add up to the given amount. Each note/coin shown is used only once.</div>';
  problems.forEach((p,ti)=>{
    html+='<div style="margin:3px 0;"><b style="font-size:8.5px;">'+(ti+1)+') Make ₹'+p.total+'</b>'+
      '<div class="row" style="gap:3px;margin-top:1px;">'+
      p.display.map((d,i)=>'<span class="ansbox" data-omr="S6-t'+ti+'d'+i+'" style="min-width:28px;font-size:8.5px;">₹'+d+'</span>').join('')+
      '</div></div>';
  });
  return{html,answers:problems.map((p,ti)=>({
    qid:'S6t'+ti,
    label:'Make ₹'+p.total,
    type:'circle_selection',
    answer:JSON.stringify(p.chosen.map(d=>({denom:d,count:1})).sort((a,b)=>b.denom-a.denom)),
    icr:{detect:'freehand_circle',notes:'Correct: '+p.chosen.map(d=>'₹'+d).join(' + ')+' = ₹'+p.total},
    omr:'S6-t'+ti
  }))};
};

/* SECTION 7 — Order Numbers: 5 sets */
Q.S7=function(){
  const sets=[];
  for(let i=0;i<5;i++){
    const dir=i%2===0?'ascending':'descending';
    const pool=[...Array(900).keys()].map(x=>x+100);
    const nums=sp(pool,5);
    const sorted=[...nums].sort((a,b)=>dir==='ascending'?a-b:b-a);
    sets.push({dir,nums,sorted});
  }
  let html='<div class="ctitle">Section 7 — Order Numbers</div>'+
    '<div class="cprompt">Arrange in the given order.</div>';
  sets.forEach((s,i)=>{
    html+='<div style="margin:3px 0;"><span style="font-size:8.5px;font-weight:bold;">'+(i+1)+') '+s.dir+':</span>'+
      '<div class="row" style="gap:2px;">'+s.nums.map(n=>'<span class="numbox" style="padding:1px 3px;font-size:8.5px;">'+n+'</span>').join('')+'</div>'+
      '<div class="row" style="gap:3px;">'+s.sorted.map((n,j)=>'<span class="blankline" data-omr="S7-s'+i+'p'+j+'" style="min-width:24px;"></span>'+(j<4?'<span style="font-size:8px;">,</span>':'')).join('')+'</div></div>';
  });
  const answers=[];
  sets.forEach((s,i)=>s.sorted.forEach((n,j)=>answers.push({qid:'S7s'+i+'p'+j,label:'Set '+(i+1)+' pos '+(j+1),type:'fill_blank',answer:String(n),icr:{detect:'handwritten_number_ocr',notes:'Ordered position.'},omr:'S7-s'+i+'p'+j})));
  return {html,answers};
};

/* SECTION 9 — Division: 1 vertical long-division + 4 fill-blank */
Q.S9=function(){
  const vb=ri(2,9),vr=ri(11,49),va=vb*vr;
  const simple=[];
  for(let i=0;i<4;i++){const b=ri(2,9),r=ri(2,12),a=b*r;simple.push({a,b,r});}
  let html='<div class="ctitle">Section 9 — Division</div>'+
    '<div class="cprompt">Q.1: Solve using vertical long division. Q.2–5: Fill the answer.</div>'+
    '<div style="margin:3px 0;font-size:8.5px;font-weight:bold;">1) Divide: '+va+' ÷ '+vb+' (show all steps below)</div>'+
    V.divisionBox(va,vb)+
    '<div style="font-size:8.5px;margin:2px 0;">Quotient = <span class="ansbox" data-omr="S9-vq" style="min-width:32px;">&nbsp;</span></div>'+
    '<div style="margin-top:4px;">';
  simple.forEach((p,i)=>{
    html+='<div style="font-size:8.5px;margin:2px 0;"><b>'+(i+2)+') </b>'+p.a+' ÷ '+p.b+' = <span class="ansbox" data-omr="S9-q'+i+'" style="min-width:30px;">&nbsp;</span></div>';
  });
  html+='</div>';
  const answers=[{qid:'S9vq',label:va+'÷'+vb+' (vertical)',type:'fill_blank',answer:String(vr),icr:{detect:'handwritten_number_ocr',notes:'Long division quotient.'},omr:'S9-vq'}];
  simple.forEach((p,i)=>answers.push({qid:'S9q'+i,label:p.a+'÷'+p.b,type:'fill_blank',answer:String(p.r),icr:{detect:'handwritten_number_ocr',notes:'Division answer.'},omr:'S9-q'+i}));
  return {html,answers};
};

/* SECTION 10 — Compare Weight */

/* SECTION 12 — Number Patterns: 5 patterns */
Q.S12=function(){
  const patterns=[];
  const steps=[2,3,4,5,10,15,20,-5,-10,25,50,100];
  for(let i=0;i<5;i++){
    const start=ri(1,20)*5,step=pk(steps);
    const seq=[start,start+step,start+2*step,start+3*step];
    const next=[start+4*step,start+5*step];
    patterns.push({seq,next,step});
  }
  let html='<div class="ctitle">Section 12 — Number Patterns</div>'+
    '<div class="cprompt">Find the rule. Write the next two numbers.</div>';
  patterns.forEach((p,i)=>{
    html+='<div style="margin:3px 0;font-size:9px;"><b>'+(i+1)+') </b>'+p.seq.join(', ')+', '+
      p.next.map((n,j)=>'<span class="blankline" data-omr="S12-p'+i+'n'+j+'" style="min-width:26px;"></span>').join(', ')+'</div>';
  });
  const answers=[];
  patterns.forEach((p,i)=>p.next.forEach((n,j)=>answers.push({qid:'S12p'+i+'n'+j,label:'Pat '+(i+1)+' next '+(j+1),type:'fill_blank',answer:String(n),icr:{detect:'handwritten_number_ocr',notes:'Pattern step '+p.step+'.'},omr:'S12-p'+i+'n'+j})));
  return {html,answers};
};

/* SECTION 14 — Multiplication: 5 vertical + fact family */
Q.S14=function(){
  const probs=[];
  for(let i=0;i<5;i++){const a=ri(10,99),b=ri(1,9);probs.push({a,b,res:a*b});}
  const fa=ri(2,9),fb=ri(2,9),fprod=fa*fb;
  let html='<div class="ctitle">Section 14 — Multiplication &amp; Fact Family</div>'+
    '<div class="cprompt">(1–5) Find the product. (6) Write 3 related facts.</div>'+
    '<div style="display:flex;gap:10px;flex-wrap:wrap;">';
  probs.forEach((p,i)=>{
    html+='<div class="vcol"><span style="font-size:8px;">'+(i+1)+')</span><br>'+p.a+'<br>&times; '+p.b+
      '<div class="opline"><div class="ansbox lg" data-omr="S14-p'+i+'">&nbsp;</div></div></div>';
  });
  html+='</div>'+
    '<div style="margin-top:4px;font-size:8.5px;"><b>6) '+fa+' &times; '+fb+' = '+fprod+'</b> &rarr; 3 related facts:</div>'+
    '<div style="font-size:8.5px;line-height:1.9;">'+
    '<span class="blankline" data-omr="S14-ff0a" style="min-width:18px;"></span>&times;<span class="blankline" data-omr="S14-ff0b" style="min-width:18px;"></span>=<span class="blankline" data-omr="S14-ff0c" style="min-width:24px;"></span>&nbsp;'+
    '<span class="blankline" data-omr="S14-ff1a" style="min-width:24px;"></span>&divide;<span class="blankline" data-omr="S14-ff1b" style="min-width:18px;"></span>=<span class="blankline" data-omr="S14-ff1c" style="min-width:18px;"></span>&nbsp;'+
    '<span class="blankline" data-omr="S14-ff2a" style="min-width:24px;"></span>&divide;<span class="blankline" data-omr="S14-ff2b" style="min-width:18px;"></span>=<span class="blankline" data-omr="S14-ff2c" style="min-width:18px;"></span></div>';
  const answers=probs.map((p,i)=>({qid:'S14p'+i,label:p.a+'x'+p.b,type:'fill_blank',answer:String(p.res),icr:{detect:'handwritten_number_ocr',notes:'Product.'},omr:'S14-p'+i}));
  answers.push({qid:'S14ff0',label:'Commutative',type:'fill_blank',answer:fb+'x'+fa+'='+fprod,icr:{detect:'handwritten_number_ocr',notes:'b x a = prod.'},omr:'S14-ff0'});
  answers.push({qid:'S14ff1',label:'Div fact 1',type:'fill_blank',answer:fprod+'/'+fa+'='+fb,icr:{detect:'handwritten_number_ocr',notes:'prod / a = b.'},omr:'S14-ff1'});
  answers.push({qid:'S14ff2',label:'Div fact 2',type:'fill_blank',answer:fprod+'/'+fb+'='+fa,icr:{detect:'handwritten_number_ocr',notes:'prod / b = a.'},omr:'S14-ff2'});
  return {html,answers};
};

/* SECTION 16 — Compose/Decompose */
Q.S16=function(){

/* ── BUILDERS ── */
function buildQCell(key){
  const {html,answers}=Q[key]();
  return {cellHtml:'<div class="qcell" data-qcell="'+key+'">'+html+'</div>',answers};
}
function makeSec(keys,allAnswers,full){
  const cells=keys.map(k=>{
    const {cellHtml,answers}=buildQCell(k);
    answers.forEach(a=>allAnswers.push(Object.assign({},a,{question:k})));
    return cellHtml;
  }).join('');
  return full
    ?'<div style="border:1.5px solid #000;">'+cells+'</div>'
    :'<div style="display:grid;grid-template-columns:1fr 1fr;border-left:1.5px solid #000;border-top:1.5px solid #000;">'+
      cells.replace(/<div class="qcell"/g,'<div class="qcell" style="border-right:1.5px solid #000;border-bottom:1.5px solid #000;"')+'</div>';
}

    makeSec(['S8','S10'],allAnswers,false)+
    '<div class="section-label">Section 9 — Division</div>'+makeSec(['S9'],allAnswers,true)+
    makeSec(['S11','S12'],allAnswers,false);

  const p3body=
    '<div class="section-label">Section 13 — Pictograph</div>'+makeSec(['S13'],allAnswers,true)+
    '<div class="section-label">Section 14 — Multiplication &amp; Fact Family</div>'+makeSec(['S14'],allAnswers,true)+
    makeSec(['S15','S16'],allAnswers,false)+
    '<div class="section-label">Section 17 — Choose the Operation</div>'+makeSec(['S17'],allAnswers,true);

  const pageHtml=
    makePageWrapper(setNum,1,3,p1body,pageId,true)+
    makePageWrapper(setNum,2,3,p2body,pageId,false)+
    makePageWrapper(setNum,3,3,p3body,pageId,false);

  return {pageHtml,answers:allAnswers,pageId};
}

/* ── OMR OVERLAY ── */
let omrOn=false;
function applyOmrOverlay(pw){
  const overlay=pw.querySelector('[data-omroverlay]');if(!overlay) return;
  overlay.innerHTML='';overlay.classList.toggle('on',omrOn);if(!omrOn) return;
  const page=pw.querySelector('[data-pagebody]');if(!page) return;
  const pr=page.getBoundingClientRect();
  page.querySelectorAll('[data-omr]').forEach(node=>{
    const r=node.getBoundingClientRect();
    const box=document.createElement('div');box.className='omr-box';
    box.style.left=(r.left-pr.left)+'px';box.style.top=(r.top-pr.top)+'px';
    box.style.width=r.width+'px';box.style.height=r.height+'px';
    const lbl=document.createElement('div');lbl.className='omr-label';lbl.textContent=node.getAttribute('data-omr');
    box.appendChild(lbl);overlay.appendChild(box);
  });
}
document.getElementById('omrToggleBtn').addEventListener('click',()=>{
  omrOn=!omrOn;
  document.querySelectorAll('.worksheet.active [data-pageid]').forEach(pw=>applyOmrOverlay(pw));
});

/* ── APP STATE ── */
let worksheetSets=[],inserted=[];
function generateSets(n){
  n=Math.max(1,Math.min(5000,n|0));
  worksheetSets=[];for(let i=0;i<n;i++) worksheetSets.push(buildSetData(i+1));
  inserted=new Array(n).fill(false);
  const tabbar=document.getElementById('tabbar');tabbar.innerHTML='';
  for(let i=1;i<=n;i++){const btn=document.createElement('button');btn.className='tabbtn';btn.id='tabbtn-'+i;btn.textContent='Set '+i;btn.addEventListener('click',()=>activateSet(i));tabbar.appendChild(btn);}
  const container=document.getElementById('setsContainer');container.innerHTML='';
  for(let i=1;i<=n;i++){const div=document.createElement('div');div.className='worksheet';div.id='ws-'+i;container.appendChild(div);}
  activateSet(1);
  const mx=document.getElementById('singleSetNum');if(mx) mx.max=String(n);
}
function activateSet(num){
  document.querySelectorAll('.worksheet').forEach(w=>w.classList.remove('active'));
  document.querySelectorAll('.tabbtn').forEach(b=>b.classList.remove('active'));
  const div=document.getElementById('ws-'+num);if(!div) return;
  if(!inserted[num-1]){div.innerHTML=worksheetSets[num-1].pageHtml;inserted[num-1]=true;}
  div.classList.add('active');
  const btn=document.getElementById('tabbtn-'+num);if(btn) btn.classList.add('active');
  div.querySelectorAll('[data-pageid]').forEach(pw=>applyOmrOverlay(pw));
}
document.getElementById('generateBtn').addEventListener('click',()=>{const n=parseInt(document.getElementById('setCount').value,10)||1;generateSets(n);});
document.getElementById('printBtn').addEventListener('click',()=>window.print());
generateSets(parseInt(document.getElementById('setCount').value,10)||5);

/* ── COORDINATE CAPTURE ── */
function captureCoords(pw){
  const wr=pw.getBoundingClientRect();
  const page=pw.querySelector('[data-pagebody]');const pr=page.getBoundingClientRect();
  const pxmm=pr.width/210;
  function toMm(r,orig){return{x_mm:+((r.left-orig.left)/pxmm).toFixed(2),y_mm:+((r.top-orig.top)/pxmm).toFixed(2),w_mm:+(r.width/pxmm).toFixed(2),h_mm:+(r.height/pxmm).toFixed(2)};}
  const regsq={};
  pw.querySelectorAll('[data-regsq]').forEach(sq=>{regsq[sq.getAttribute('data-regsq')]=toMm(sq.getBoundingClientRect(),wr);});
  const fields={};
  page.querySelectorAll('[data-omr]').forEach(node=>{fields[node.getAttribute('data-omr')]=toMm(node.getBoundingClientRect(),pr);});
  return{pageId:pw.getAttribute('data-pageid'),page_size_mm:{w:210,h:297},registration_squares_mm:regsq,fields_mm:fields};
}
document.getElementById('exportCoordsBtn').addEventListener('click',()=>{
  const wrappers=document.querySelectorAll('.worksheet.active [data-pageid]');
  if(!wrappers.length){alert('Generate and select a set first.');return;}
  const allCoords=Array.from(wrappers).map(pw=>captureCoords(pw));
  const blob=new Blob([JSON.stringify(allCoords,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  const sid=wrappers[0].getAttribute('data-pageid').replace(/-P\d+$/,'');
  a.href=url;a.download=sid+'_coords.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
});

/* ── MASTER JSON & CSV ──
   The JSON answer key is built so each entry's `qid` and `omr_field` match the
   `data-omr` attribute placed on the exact answer box in the worksheet HTML/PDF.
   A scanning/ICR pipeline that crops each `data-omr` region (using the coords
   from Export Coords JSON), runs OCR/circle-detection per `icr.detect`, and
   compares against `icr.evaluation.expected` can auto-score every field —
   the qid is the join key between the scanned student response and this key. */
function buildMasterJSON(start,end,cl){
  const evalMethod=t=>t==='fill_blank'?'exact_match_number':t==='fill_blank_text'?'exact_match_text':t==='fill_blank_symbol'?'exact_match_symbol':t==='circle_selection'?'freehand_circle_detect':t==='shaded_region'?'shaded_area_ratio':t==='mcq_box'?'circle_detect':'exact_match';
  const sets=[];
  for(let i=start;i<=end;i++){
    const sd=worksheetSets[i-1];if(!sd) continue;
    const coords=(cl&&cl[i])||null;
    const questions=sd.answers.map(a=>{
      const ch=coords&&coords.fields_mm&&coords.fields_mm[a.omr]?coords.fields_mm[a.omr]:null;
      return{
        qid:a.qid,
        section:a.question,
        label:a.label,
        type:a.type,
        correct_answer:a.answer,
        omr_field:a.omr,
        icr:{
          detect:a.icr.detect,
          notes:a.icr.notes,
          evaluation:{
            method:evalMethod(a.type),
            expected:a.answer,
            tolerance:a.type==='fill_blank'?0:null,
            case_sensitive:false,
            score:1
          }
        },
        coords_mm:ch,
        scanned_response:null,
        is_correct:null
      };
    });
    sets.push({set:i,pageId:sd.pageId,total_marks:questions.length,registration_squares_mm:coords?coords.registration_squares_mm:null,questions});
  }
  return{generated:new Date().toISOString(),total_sets:sets.length,sets};
}
function csvEscape(v){v=String(v==null?'':v);if(/[",\n]/.test(v)) return '"'+v.replace(/"/g,'""')+'"';return v;}
function buildCSV(start,end){
  const rows=[['set','question','qid','type','label','answer']];
  for(let i=start;i<=end;i++){const sd=worksheetSets[i-1];if(!sd) continue;sd.answers.forEach(a=>{rows.push([i,a.question,a.qid,a.type,a.label,a.answer]);});}
  return rows.map(r=>r.map(csvEscape).join(',')).join('\n');
}

/* ── PDF HELPERS ── */


async function buildPdfBlobForSet(i) {
  const rr = document.getElementById('pdfRenderRoot');
  rr.innerHTML = worksheetSets[i - 1].pageHtml;

  // Single rAF pair is enough; two was a workaround for layout jank.
  await new Promise(r => requestAnimationFrame(r));
  await new Promise(r => setTimeout(r, 0)); // yield to layout engine

  const pages = Array.from(rr.querySelectorAll('.page'));
  const pdf = new window.jspdf.jsPDF({ unit: 'mm', format: 'a4' });

  for (let p = 0; p < pages.length; p++) {
    if (p > 0) pdf.addPage();

    const cv = await html2canvas(pages[p], {
      scale: 1.5,
      backgroundColor: '#ffffff',
      // Constrain canvas to exactly A4 so jsPDF never needs to slice.
      width: pages[p].offsetWidth,
      height: pages[p].offsetHeight,
      windowWidth: pages[p].offsetWidth,
    });

    // Fit the whole canvas onto one A4 page — no slicing.
    pdf.addImage(
      cv.toDataURL('image/jpeg', 0.82), // slightly lower quality = faster encode, smaller file
      'JPEG',
      0, 0,
      210,
      297
    );
  }

  rr.innerHTML = '';
  return pdf.output('blob');
}

/* ── SINGLE SET DOWNLOAD ── */
document.getElementById('downloadSingleBtn').addEventListener('click',async()=>{
  const n=parseInt(document.getElementById('singleSetNum').value,10)||1;
  if(!worksheetSets[n-1]){alert('Generate sets first.');return;}
  const btn=document.getElementById('downloadSingleBtn');btn.disabled=true;
  const pr=document.getElementById('exportProgress');
  try{
    pr.textContent='Building PDF for Set '+n+' …';
    const pdfBlob=await buildPdfBlobForSet(n);
    const zip=new JSZip();
    zip.file('Set_'+String(n).padStart(5,'0')+'.pdf',pdfBlob);
    zip.file('Set_'+String(n).padStart(5,'0')+'_answerkey.json',JSON.stringify(buildMasterJSON(n,n,null),null,2));
    zip.file('Set_'+String(n).padStart(5,'0')+'_answers.csv',buildCSV(n,n));
    const zb=await zip.generateAsync({type:'blob',compression:'STORE'});
    const url=URL.createObjectURL(zb);const a=document.createElement('a');a.href=url;a.download='Class4_Set_'+String(n).padStart(5,'0')+'.zip';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    pr.textContent='Done — Set '+n+' downloaded.';
  }catch(e){console.error(e);pr.textContent='Export failed: '+e.message;}finally{btn.disabled=false;}
});

/* ── BULK ZIP ── */
const ZIP_CHUNK=300;
async function exportAllSetsAsZip(){
  if(!worksheetSets.length){alert('Generate sets first.');return;}
  const eb=document.getElementById('exportAllBtn'),gb=document.getElementById('generateBtn'),pr=document.getElementById('exportProgress');
  const n=worksheetSets.length;eb.disabled=true;gb.disabled=true;
  const t0=Date.now();
  try{
    const pw=String(n).length,numParts=Math.ceil(n/ZIP_CHUNK);
    for(let part=0;part<numParts;part++){
      const ps=part*ZIP_CHUNK+1,pe=Math.min(n,(part+1)*ZIP_CHUNK);
      const zip=new JSZip();let rawBytes=0;
      for(let i=ps;i<=pe;i++){
        pr.textContent='Part '+(part+1)+'/'+numParts+' — Set '+i+'/'+n+' ('+(((i-1)/n*100).toFixed(1))+'%) — '+((Date.now()-t0)/1000).toFixed(1)+'s';
        const setId=String(i).padStart(pw,'0');
        const pb=await buildPdfBlobForSet(i);rawBytes+=pb.size;
        zip.file('Set_'+setId+'.pdf',pb);
        zip.file('Set_'+setId+'_answerkey.json',JSON.stringify(buildMasterJSON(i,i,null),null,2));
        zip.file('Set_'+setId+'_answers.csv',buildCSV(i,i));
        await new Promise(r=>setTimeout(r,0)); // yield after every set
      }
      pr.textContent='Part '+(part+1)+'/'+numParts+' — zipping …';
      const zb=await zip.generateAsync({type:'blob',compression:'STORE'});
      const url=URL.createObjectURL(zb);const a=document.createElement('a');a.href=url;a.download=numParts>1?'Class4_Part'+(part+1)+'of'+numParts+'.zip':'Class4_AllSets.zip';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
      pr.textContent='Part '+(part+1)+' done — '+(pe-ps+1)+' PDFs.';
    }
    pr.textContent='All done — '+n+' sets, '+((Date.now()-t0)/1000).toFixed(1)+'s total.';
  }catch(e){console.error(e);pr.textContent='Export failed: '+e.message;}finally{eb.disabled=false;gb.disabled=false;}
}
document.getElementById('exportAllBtn').addEventListener('click',exportAllSetsAsZip);

window.generateSets=generateSets;window.activateSet=activateSet;window.captureCoords=captureCoords;
window.buildMasterJSON=buildMasterJSON;window.buildCSV=buildCSV;window.buildPdfBlobForSet=buildPdfBlobForSet;
window.getWorksheetSets=()=>worksheetSets;window.getQuestionRegistry=()=>Q;window.getVisualsLibrary=()=>V;
</script>
