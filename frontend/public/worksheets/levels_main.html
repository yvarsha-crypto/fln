<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLN Worksheet Generator — All 59 Levels</title>
<style>
:root{
  --ink:#1a1a1a; --paper:#ffffff; --accent:#2f6fed; --muted:#666;
  --line:#c9c9c9; --panel:#f4f6f9; --danger:#d33; --good:#1a8a4a;
}
*{box-sizing:border-box;}
body{font-family:'Segoe UI',Arial,sans-serif;margin:0;background:#e9edf2;color:var(--ink);}
#controls{background:var(--panel);border-bottom:1px solid var(--line);padding:12px 16px;position:sticky;top:0;z-index:50;}
.ctrl-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:8px;}
.ctrl-row label{font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:2px;font-weight:600;}
select,input[type=number]{padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-size:14px;}
button{padding:7px 12px;border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;}
button.secondary{background:#fff;color:var(--accent);}
button.warn{background:#fff;color:var(--danger);border-color:var(--danger);}
button:disabled{opacity:.5;cursor:not-allowed;}
#status{font-size:12px;color:var(--muted);min-height:16px;}
#navbar{display:flex;gap:8px;align-items:center;padding:8px 16px;background:#fff;border-bottom:1px solid var(--line);}
#navbar select{flex:1;max-width:420px;}
#workspaceOuter{padding:24px;display:flex;justify-content:center;}
.page-wrapper{position:relative;background:var(--paper);width:794px;min-height:1123px;box-shadow:0 2px 14px rgba(0,0,0,.15);padding:34px 30px;}
.reg-sq{position:absolute;width:19px;height:19px;background:#000;}
.reg-sq.tl{top:8px;left:8px;} .reg-sq.tr{top:8px;right:8px;}
.reg-sq.bl{bottom:8px;left:8px;} .reg-sq.br{bottom:8px;right:8px;}
.page-header{display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid var(--ink);padding-bottom:6px;margin-bottom:14px;}
.page-header h1{font-size:18px;margin:0;}
.page-header .sub{font-size:12px;color:var(--muted);}
.section{margin-bottom:20px;page-break-inside:avoid;}
.section h3{font-size:14px;background:#eef2fb;padding:6px 8px;border-left:4px solid var(--accent);margin:0 0 8px 0;}
.instr{font-size:12.5px;color:#333;margin:0 0 8px 2px;font-style:italic;}
.q-list{display:flex;flex-direction:column;gap:8px;}
.q-row{display:flex;align-items:center;gap:10px;font-size:14px;flex-wrap:wrap;}
.q-num{font-weight:700;min-width:20px;}
.ans-box{border:1.5px solid var(--ink);border-radius:4px;min-width:44px;height:28px;padding:2px 6px;text-align:center;font-size:14px;display:inline-flex;align-items:center;justify-content:center;}
.ans-box.wide{min-width:90px;}
.icon-row{display:inline-flex;gap:3px;flex-wrap:wrap;vertical-align:middle;}
.ic{display:inline-block;vertical-align:middle;}
.mcq-options{display:flex;gap:12px;flex-wrap:wrap;margin-left:4px;}
.match-grid{display:grid;grid-template-columns:1fr 90px 1fr;align-items:stretch;}
.match-grid.spaced{grid-template-columns:1fr 160px 1fr;column-gap:24px;}
.mini-match-panel{border:1px solid var(--line);border-radius:8px;padding:8px;}
.mini-match-panel .match-item{min-height:24px;padding:3px 6px;}
.match-col-left,.match-col-right{display:flex;flex-direction:column;gap:14px;}
.match-space{position:relative;} /* blank canvas for drawing the connecting line */
.match-item{border:1px dashed var(--line);border-radius:6px;padding:8px;min-height:40px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.match-col-left .match-item{justify-content:space-between;}
.match-col-right .match-item{justify-content:flex-start;}
.match-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--ink);background:#fff;flex-shrink:0;}
.circle-target{display:inline-flex;flex-direction:column;align-items:center;gap:4px;padding:4px 10px;}
.compare-row{display:flex;align-items:flex-end;justify-content:space-around;gap:18px;border:1px solid var(--line);border-radius:8px;padding:12px 16px;}
.grid-cell{border:1px solid var(--line);}
.trace-box{border:1px dashed var(--line);border-radius:8px;padding:10px;display:flex;align-items:center;gap:14px;}
.vert-op{display:inline-block;font-family:'Courier New',monospace;font-size:20px;text-align:right;border-collapse:collapse;}
.vert-op td{padding:1px 4px;}
.vert-op .opline{border-bottom:2px solid var(--ink);}
.vert-rot-wrap{position:relative;width:56px;}
.vert-rot-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(90deg);white-space:nowrap;}
.lenrow-vert{display:inline-flex;flex-direction:column;align-items:center;gap:6px;border:1.6px solid var(--ink);border-radius:10px;padding:10px 14px;width:fit-content;}
.vert-rot-wrap{position:relative;width:56px;}
.vert-rot-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(90deg);white-space:nowrap;}
.lenrow-vert{display:inline-flex;flex-direction:column;align-items:center;gap:6px;border:1.6px solid var(--ink);border-radius:10px;padding:10px 14px;width:fit-content;}
.footer-stamp{position:absolute;bottom:10px;right:16px;font-family:'Courier New',monospace;font-size:9px;color:#888;}
.omr-overlay-layer{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;display:none;}
.page-wrapper.omr-on .omr-overlay-layer{display:block;}
.omr-box{position:absolute;border:1px solid rgba(211,51,51,.85);background:rgba(211,51,51,.08);}
.omr-label{position:absolute;top:-14px;left:0;font-size:8px;background:#d33;color:#fff;padding:1px 3px;border-radius:2px;white-space:nowrap;}
#ansKeyPanel{position:fixed;top:0;right:0;width:420px;max-width:92vw;height:100vh;background:#fff;box-shadow:-4px 0 14px rgba(0,0,0,.2);z-index:100;overflow-y:auto;display:none;padding:16px;}
#ansKeyPanel table{width:100%;border-collapse:collapse;font-size:11px;}
#ansKeyPanel th,#ansKeyPanel td{border:1px solid var(--line);padding:4px 5px;text-align:left;}
#ansKeyPanel h2{font-size:15px;display:flex;justify-content:space-between;align-items:center;}
@media print{
  #controls,#navbar,#ansKeyPanel{display:none !important;}
  #workspaceOuter{padding:0;}
  body{background:#fff;}
  .page-wrapper{box-shadow:none;margin:0;}
}
.worksheet-header-full{border-bottom:3px solid var(--ink);padding-bottom:10px;margin-bottom:16px;}
.wh-topline{display:flex;justify-content:space-between;font-size:13px;margin-bottom:14px;}
.wh-title{font-size:30px;font-weight:800;text-align:center;letter-spacing:1px;margin:0;}
.wh-subtitle{font-size:16px;font-weight:700;text-align:center;color:var(--muted);margin:2px 0 8px;letter-spacing:2px;}
.wh-instr{font-size:13px;text-align:center;font-style:italic;margin:0;}
</style>
</head>
<body>

<div id="controls">
  <div class="ctrl-row">
    <label>Level
      <select id="levelSelect"></select>
    </label>
    <label>Sublevel
      <select id="sublevelSelect"></select>
    </label>
    <label>Sets per sublevel
      <input id="setsPerSub" type="number" min="1" max="20" value="1">
    </label>
    <button id="btnGenerateLevel">Generate This Level</button>
    <button id="btnGenerateAll" class="secondary">Generate ALL 59 Levels</button>
    <span id="status"></span>
  </div>
  <div class="ctrl-row">
    <label>Download sets #
      <input id="fromSetInput" type="number" min="1" value="1" style="width:70px;">
      to
      <input id="toSetInput" type="number" min="1" value="1" style="width:70px;">
    </label>
    <button id="btnDownloadRange">Download ZIP (Worksheet + Answer Key)</button>
    <button id="btnDownloadCurrent" class="secondary">Download Current Set Only</button>
    <button id="btnDownloadLevel" class="secondary">Download Selected Level (All Sets)</button>
    <button id="btnDownloadAll" class="secondary">Download Everything Generated</button>
    <button id="btnMultiSelect" class="secondary">Pick Specific Sets…</button>
  </div>
  <div class="ctrl-row">
    <label>Sublevel-specific range<br>
      <select id="subRangeSublevelSelect" style="margin-top:2px;"></select>
    </label>
    <label>Set # from (within sublevel)
      <input id="subFromInput" type="number" min="1" value="1" style="width:70px;">
    </label>
    <label>to
      <input id="subToInput" type="number" min="1" value="10" style="width:70px;">
    </label>
    <button id="btnDownloadSublevelRange">Generate &amp; Download This Range</button>
  </div>
  <div class="ctrl-row">
    <button id="btnPrint" class="secondary">Print Current Set</button>
    <button id="btnViewKey" class="secondary">Preview Answer Key</button>
    <button id="btnToggleOMR" class="secondary">Toggle OMR Overlay</button>
  </div>
</div>

<div id="navbar">
  <button id="btnPrev" class="secondary">&larr; Prev</button>
  <select id="jumpSelect"></select>
  <button id="btnNext" class="secondary">Next &rarr;</button>
  <span id="countInfo" style="font-size:12px;color:var(--muted);"></span>
</div>

<div id="workspaceOuter">
  <div id="preview"></div>
</div>

<div id="multiSelectPanel" style="display:none;position:fixed;left:0;top:0;width:380px;max-width:92vw;height:100vh;background:#fff;box-shadow:4px 0 14px rgba(0,0,0,.2);z-index:100;overflow-y:auto;padding:16px;">
  <h2 style="font-size:15px;display:flex;justify-content:space-between;align-items:center;">Select sets <button class="secondary" id="btnCloseMultiSelect">Close</button></h2>
  <div style="display:flex;gap:8px;margin-bottom:10px;">
    <button class="secondary" id="btnSelectAllSets" style="font-size:12px;">Select All</button>
    <button class="secondary" id="btnSelectNoneSets" style="font-size:12px;">Clear</button>
  </div>
  <div id="multiSelectList" style="display:flex;flex-direction:column;gap:4px;font-size:12px;"></div>
  <button id="btnDownloadSelectedZip" style="margin-top:14px;width:100%;">Download Selected as ZIP</button>
</div>
<div id="ansKeyPanel">
  <h2>Answer Key <button class="secondary" id="btnCloseKey">Close</button></h2>
  <div id="ansKeyBody"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="icons.js"></script>
<script>
/* =========================================================
   FLN WORKSHEET GENERATOR — combined build, all 59 levels
   ========================================================= */

/* ---------- STATE ---------- */
let worksheetHTMLs = [];   // array of page HTML strings
let answerKeys = [];       // array of answer key objects (parallel to worksheetHTMLs)
let meta = [];             // {levelId,title,slug,sublevelId,setNum}
let inserted = [];
let currentSet = 0;
let omrOverlayActive = false;

/* ---------- UTILS ---------- */
function ri(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function sample(arr,n){ return shuffle(arr).slice(0,n); }
function pick(arr){ return arr[ri(0,arr.length-1)]; }
function tallyString(n){ let full=Math.floor(n/5), rem=n%5, out=[]; for(let i=0;i<full;i++) out.push('||||/'); if(rem) out.push('|'.repeat(rem)); return out.join(' '); }
function pad4(n){ return 'Q'+String(n).padStart(4,'0'); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function labelize(name){ return name.charAt(0).toUpperCase()+name.slice(1); }


function drawClock(h,m){
  const hourAngle=((h%12)+m/60)*30, minAngle=m*6;
  let ticks='';
  for(let i=0;i<12;i++){
    const a=i*30*Math.PI/180, x1=50+40*Math.sin(a), y1=50-40*Math.cos(a), x2=50+46*Math.sin(a), y2=50-46*Math.cos(a);
    ticks+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#333" stroke-width="1.6"/>`;
  }
  const hx=(50+20*Math.sin(hourAngle*Math.PI/180)).toFixed(1), hy=(50-20*Math.cos(hourAngle*Math.PI/180)).toFixed(1);
  const mx=(50+32*Math.sin(minAngle*Math.PI/180)).toFixed(1), my=(50-32*Math.cos(minAngle*Math.PI/180)).toFixed(1);
  return `<svg width="92" height="92" viewBox="0 0 100 100" class="ic">
    <circle cx="50" cy="50" r="46" fill="#fff" stroke="#333" stroke-width="2.2"/>
    ${ticks}
    <line x1="50" y1="50" x2="${hx}" y2="${hy}" stroke="#333" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="50" y1="50" x2="${mx}" y2="${my}" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <circle cx="50" cy="50" r="2.6" fill="#333"/>
  </svg>`;
}

/* ---- vertical division bracket (long-division style), quotient blank above ---- */
function divisionBracketHtml(dividend, divisor, qid){
  const workW = Math.max(90, String(dividend).length*26+30);
  return `<div style="display:inline-block;text-align:center;font-family:'Courier New',monospace;margin:8px 18px;">
    <div style="min-width:54px;height:30px;border-bottom:2px solid var(--ink);font-size:18px;" data-omr="${qid}-quot"></div>
    <div style="display:flex;align-items:flex-start;justify-content:center;">
      <span style="padding:2px 8px 2px 2px;font-size:18px;">${divisor}</span>
      <span style="border-left:2px solid var(--ink);border-top:2px solid var(--ink);padding:2px 14px;font-size:18px;">${dividend}</span>
    </div>
    <div style="min-height:140px;width:${workW}px;margin:0 auto;text-align:left;padding-left:16px;border-left:1px dashed #ddd;" data-omr="${qid}-work"></div>
  </div>`;
}
/* ---- vertical division bracket with remainder line ---- */
function divisionBracketRemainderHtml(dividend, divisor, qid){
  const workW = Math.max(90, String(dividend).length*26+30);
  return `<div style="display:inline-block;text-align:center;font-family:'Courier New',monospace;margin:8px 18px;">
    <div style="min-width:54px;height:30px;border-bottom:2px solid var(--ink);font-size:18px;" data-omr="${qid}-quot"></div>
    <div style="display:flex;align-items:flex-start;justify-content:center;">
      <span style="padding:2px 8px 2px 2px;font-size:18px;">${divisor}</span>
      <span style="border-left:2px solid var(--ink);border-top:2px solid var(--ink);padding:2px 14px;font-size:18px;">${dividend}</span>
    </div>
    <div style="min-height:120px;width:${workW}px;margin:0 auto;text-align:left;padding-left:16px;border-left:1px dashed #ddd;" data-omr="${qid}-work"></div>
    <div style="display:flex;align-items:center;justify-content:center;gap:4px;font-size:13px;margin-top:4px;">
      <span>R =</span><span style="min-width:34px;height:26px;border-bottom:2px solid var(--ink);display:inline-block;" data-omr="${qid}-rem"></span>
    </div>
  </div>`;
}
function tenBlock(size){
  return `<span style="display:inline-block;width:${(size*0.34).toFixed(0)}px;height:${size}px;background:#1a1a1a;border:1.5px solid #1a1a1a;border-radius:2px;margin:1px;vertical-align:bottom;"></span>`;
}
function oneBlock(size){
  const s=(size*0.34).toFixed(0);
  return `<span style="display:inline-block;width:${s}px;height:${s}px;background:#fff;border:1.5px solid #1a1a1a;border-radius:2px;margin:1px;vertical-align:bottom;"></span>`;
}
function blocksHtml(tens,ones,size){
  size = size || 36;
  let s='';
  for(let i=0;i<tens;i++) s+=tenBlock(size);
  for(let i=0;i<ones;i++) s+=oneBlock(size);
  return `<span style="display:inline-flex;align-items:flex-end;flex-wrap:wrap;max-width:220px;">${s}</span>`;
}

/* ---- stick-bundle visuals for Level 16.0 ---- */
function stickBundle(size){
  size = size || 40;
  let lines=''; for(let i=0;i<10;i++){ const x=2+i*3; lines+=`<line x1="${x}" y1="${size*0.18}" x2="${x}" y2="${size}" stroke="#1a1a1a" stroke-width="1.4"/>`; }
  return `<svg width="34" height="${size}" viewBox="0 0 34 ${size}" class="ic">${lines}<rect x="0" y="${size*0.05}" width="34" height="${size*0.1}" fill="#1a1a1a"/></svg>`;
}
function stickSingle(size){
  size = size || 40;
  return `<svg width="7" height="${size}" viewBox="0 0 7 ${size}" class="ic"><line x1="3.5" y1="3" x2="3.5" y2="${size}" stroke="#1a1a1a" stroke-width="1.4"/></svg>`;
}
function sticksHtml(tens,ones,size){
  size = size || 40;
  let s=''; for(let i=0;i<tens;i++) s+=stickBundle(size); for(let i=0;i<ones;i++) s+=stickSingle(size);
  return `<span style="display:inline-flex;align-items:flex-end;gap:3px;">${s}</span>`;
}


/* ---- abacus visual for Level 25.2 ---- */
function abacusHtml(tens,ones,size){
  size = size || 110;
  const beadR = 8;
  const topPad = 10 + beadR; // room so top bead never clips
  let tensBeads='', onesBeads='';
  for(let i=0;i<tens;i++){ tensBeads += `<circle cx="20" cy="${size-14-i*16}" r="${beadR}" fill="#1a1a1a"/>`; }
  for(let i=0;i<ones;i++){ onesBeads += `<circle cx="60" cy="${size-14-i*16}" r="${beadR}" fill="#1a1a1a"/>`; }
  const rodTop = Math.max(6, topPad - Math.max(tens,ones)*0);
  return `<svg width="90" height="${size+20}" viewBox="0 0 90 ${size+20}" class="ic" overflow="visible">
    <line x1="20" y1="6" x2="20" y2="${size}" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="60" y1="6" x2="60" y2="${size}" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="4" y="${size}" width="76" height="14" fill="none" stroke="#1a1a1a" stroke-width="1.6"/>
    <text x="20" y="${size+11}" font-size="8" text-anchor="middle">tens</text>
    <text x="60" y="${size+11}" font-size="8" text-anchor="middle">ones</text>
    ${tensBeads}${onesBeads}
  </svg>`;
}

/* ---- hundred-block/ten-block/one-block visuals for Level 36.2 ---- */
function hundredBlock(size){
  size = size || 60;
  return `<span style="display:inline-block;width:${size}px;height:${size}px;background:repeating-linear-gradient(0deg,#1a1a1a,#1a1a1a 1px,#fff 1px,#fff ${size/10}px),repeating-linear-gradient(90deg,#1a1a1a,#1a1a1a 1px,#fff 1px,#fff ${size/10}px);border:2px solid #1a1a1a;margin:2px;vertical-align:bottom;"></span>`;
}
function hundredsTensOnesHtml(hundreds,tens,ones,size){
  size = size || 50;
  let s='';
  for(let i=0;i<hundreds;i++) s+=hundredBlock(size);
  for(let i=0;i<tens;i++) s+=tenBlock(size);
  for(let i=0;i<ones;i++) s+=oneBlock(size);
  return `<span style="display:inline-flex;align-items:flex-end;flex-wrap:wrap;max-width:400px;">${s}</span>`;
}

/* ---- Thousand-block visuals for Level 49 (numbers up to 10,000) ---- */
function thousandBlockGroup(cellSize){
  cellSize = cellSize || 16;
  let cells=''; for(let i=0;i<10;i++) cells+=hundredBlock(cellSize);
  return `<span style="display:inline-grid;grid-template-columns:repeat(5,${cellSize}px);grid-auto-rows:${cellSize}px;gap:1px;border:2px solid #1a1a1a;border-radius:3px;padding:2px;margin:2px 6px 2px 2px;vertical-align:bottom;">${cells}</span>`;
}
function thousandsHundredsTensOnesHtml(thousands,hundreds,tens,ones,size){
  size = size || 34;
  const cellSize = Math.max(10, Math.round(size*0.42));
  let s='';
  for(let i=0;i<thousands;i++) s+=thousandBlockGroup(cellSize);
  for(let i=0;i<hundreds;i++) s+=hundredBlock(size);
  for(let i=0;i<tens;i++) s+=tenBlock(size);
  for(let i=0;i<ones;i++) s+=oneBlock(size);
  return `<span style="display:inline-flex;align-items:flex-end;flex-wrap:wrap;gap:4px;max-width:480px;">${s}</span>`;
}

/* ---- proper crossed tally marks (groups of 5, 4 verticals + diagonal) ---- */
function tallyGroupSVG(count, x, height){
  let s='';
  const spacing=7;
  const linesToDraw = Math.min(count,4);
  for(let i=0;i<linesToDraw;i++){
    const lx = x+i*spacing;
    s+=`<line x1="${lx}" y1="2" x2="${lx}" y2="${height-2}" stroke="#1a1a1a" stroke-width="2"/>`;
  }
  if(count===5){
    s+=`<line x1="${x-4}" y1="${height-2}" x2="${x+3*spacing+4}" y2="2" stroke="#1a1a1a" stroke-width="2"/>`;
  }
  return s;
}
function tallyMarksSVG(n, unitH){
  unitH = unitH || 26;
  if(n<=0) return `<svg width="6" height="${unitH}" class="ic"></svg>`;
  const groupWidth = 4*7+14;
  const groups = Math.floor(n/5);
  const remainder = n%5;
  const totalGroups = groups + (remainder>0?1:0);
  const totalWidth = totalGroups*groupWidth + 4;
  let content='', gx=4;
  for(let g=0;g<groups;g++){ content+=tallyGroupSVG(5, gx, unitH); gx+=groupWidth; }
  if(remainder>0){ content+=tallyGroupSVG(remainder, gx, unitH); }
  return `<svg width="${totalWidth}" height="${unitH}" viewBox="0 0 ${totalWidth} ${unitH}" class="ic">${content}</svg>`;
}
/* ---- dot grid for "count and tally" style questions ---- */
function dotGridHtml(count, cols){
  cols = cols||5;
  let cells='';
  for(let i=0;i<count;i++){
    cells+=`<span style="display:inline-block;width:15px;height:15px;border-radius:50%;background:#1a1a1a;margin:2px;"></span>`;
  }
  return `<div style="display:flex;flex-wrap:wrap;width:${cols*21}px;">${cells}</div>`;
}

/* ---- Indian currency visuals (Level 46) ---- */
function coinSVG(value, size){
  size = size || 50;
  return `<svg width="${size}" height="${size}" viewBox="0 0 60 60" class="ic">
    <circle cx="30" cy="30" r="27" fill="#fff" stroke="#1a1a1a" stroke-width="2.4"/>
    <circle cx="30" cy="30" r="22.5" fill="none" stroke="#1a1a1a" stroke-width="1.3"/>
    <circle cx="30" cy="30" r="22.5" fill="none" stroke="#1a1a1a" stroke-width=".6" stroke-dasharray="1.5 2.2"/>
    ${Array.from({length:16}).map((_,i)=>{const a=i*22.5*Math.PI/180;const x1=30+25*Math.sin(a),y1=30-25*Math.cos(a),x2=30+27*Math.sin(a),y2=30-27*Math.cos(a);return `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#1a1a1a" stroke-width="1"/>`;}).join('')}
    <text x="30" y="35" font-size="14" font-weight="800" text-anchor="middle" fill="#1a1a1a">&#8377;${value}</text>
  </svg>`;
}
function noteSVG(value, size, forceSimple){
  size = size || 78;
  const w=size, h=Math.round(size*0.46);
  const small = size < 60 || forceSimple;
  if(small){
    // Simplified version: no watermark circle, no corner labels — just border + big centered value, fully legible.
    const fs = Math.max(11, Math.round(h*0.4));
    return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" class="ic">
      <rect x="1.5" y="1.5" width="${w-3}" height="${h-3}" rx="4" fill="#fff" stroke="#1a1a1a" stroke-width="2"/>
      <rect x="4.5" y="4.5" width="${w-9}" height="${h-9}" rx="2" fill="none" stroke="#1a1a1a" stroke-width=".8" stroke-dasharray="2 1.6"/>
      <text x="${w/2}" y="${h/2+fs*0.36}" font-size="${fs}" font-weight="800" text-anchor="middle" fill="#1a1a1a">&#8377;${value}</text>
    </svg>`;
  }
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" class="ic">
    <rect x="2" y="2" width="${w-4}" height="${h-4}" rx="5" fill="#fff" stroke="#1a1a1a" stroke-width="2.4"/>
    <rect x="6" y="6" width="${w-12}" height="${h-12}" rx="3" fill="none" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="2.5 2"/>
    <line x1="10" y1="${h-9}" x2="${w-10}" y2="9" stroke="#1a1a1a" stroke-width=".5" opacity=".35"/>
    <line x1="10" y1="9" x2="${w-10}" y2="${h-9}" stroke="#1a1a1a" stroke-width=".5" opacity=".35"/>
    <circle cx="${w-19}" cy="${h/2}" r="${h*0.32}" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <circle cx="${w-19}" cy="${h/2}" r="${h*0.14}" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <text x="12" y="${h/2+5}" font-size="15" font-weight="800" fill="#1a1a1a">&#8377;${value}</text>
    <text x="8" y="12" font-size="7" font-weight="700" fill="#1a1a1a">&#8377;${value}</text>
    <text x="${w-16}" y="${h-6}" font-size="7" font-weight="700" fill="#1a1a1a">&#8377;${value}</text>
  </svg>`;
}
function currencyPiece(value, isNote, size, forceSimple){ return isNote ? noteSVG(value, size||74, forceSimple) : coinSVG(value, size||50); }

function moneySetHtml(pieces, size){
  return `<span style="display:inline-flex;flex-wrap:wrap;gap:8px;align-items:center;">${pieces.map(p=>currencyPiece(p.value,p.isNote,size||(p.isNote?74:50))).join('')}</span>`;
}
function randomMoneyCombo(target, notePool, coinPool){
  let remaining=target, pieces=[];
  const denoms=[...notePool,...coinPool].sort((a,b)=>b-a);
  let guard=0;
  while(remaining>0 && guard<12){
    guard++;
    const usable=denoms.filter(d=>d<=remaining);
    if(usable.length===0) break;
    const d=pick(usable);
    pieces.push({value:d, isNote:notePool.includes(d)});
    remaining-=d;
  }
  if(remaining>0) pieces.push({value:remaining, isNote:notePool.includes(remaining)});
  return pieces;
}

function strokePathData(type, w, h){
  const midY=h/2;
  switch(type){
    case 'diagonal': return `M6,${h-6} L${w-6},6`;
    case 'wave': return `M4,${midY} Q${w*0.17},${midY-h*0.32} ${w*0.33},${midY} T${w*0.66},${midY} T${w-4},${midY}`;
    case 'spiral': {
      let cx=w*0.35, cy=h/2, d=`M${cx+2},${cy}`, r=3;
      for(let i=0;i<3;i++){ d+=` a${r},${r} 0 1 1 -0.1,0`; r+=5; }
      d+=` L${w-6},${cy}`;
      return d;
    }
    case 'square': return `M${w*0.3},${h*0.15} L${w*0.7},${h*0.15} L${w*0.7},${h*0.85} L${w*0.3},${h*0.85} Z`;
    case 'rectangle': return `M${w*0.15},${h*0.2} L${w*0.85},${h*0.2} L${w*0.85},${h*0.8} L${w*0.15},${h*0.8} Z`;
    case 'triangle': return `M${w*0.5},${h*0.1} L${w*0.85},${h*0.9} L${w*0.15},${h*0.9} Z`;
    case 'circle': return `M${w*0.5+w*0.32},${h/2} A${w*0.32},${h*0.4} 0 1 1 ${w*0.5+w*0.32-0.1},${h/2}`;
    case 'loop': return `M4,${h*0.85} C4,${h*0.15} ${w*0.42},${h*0.15} ${w*0.42},${h*0.5} C${w*0.42},${h*0.85} ${w*0.1},${h*0.85} ${w*0.15},${h*0.5} L${w-6},${h*0.5}`;
    case 'chain': { let d=`M4,${midY}`; const loops=3, step=(w-10)/loops; for(let i=0;i<loops;i++){ d+=` a${step/2},${h*0.4} 0 1 1 ${step},0`; } return d; }
    case 'cross': return `M${w/2},4 L${w/2},${h-4} M4,${h/2} L${w-4},${h/2}`;
    default: return `M4,${midY} L${w-4},${midY}`;
  }
}

function strokeTraceRow(strokeType, exampleIcons, qid, colLabelIsShape){
  const w=110,h=50;

  const traceSvg = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" class="ic" data-omr="${qid}-trace"><path d="${d}" fill="none" stroke="#999" stroke-width="2" stroke-dasharray="3 4"/></svg>`;

}

function scaleReadingSVG(value,maxVal,size){
  size=size||130;
  const r=size*0.38;
  const outerR = r*1.3;
  const pad = 16; // extra room so tick labels never clip
  const cx = outerR+pad, cy = outerR+pad;
  const svgW = ((outerR+pad)*2).toFixed(0), svgH = ((outerR+pad)*2).toFixed(0);
  const startAngle=-135, endAngle=135;
  const frac = value/maxVal;
  const angle = startAngle + frac*(endAngle-startAngle);
  const rad = angle*Math.PI/180;
  const nx=(cx+r*0.75*Math.cos(rad)).toFixed(1), ny=(cy+r*0.75*Math.sin(rad)).toFixed(1);
  let ticks='';
  const tickCount=6;
  for(let t=0;t<=tickCount;t++){
    const ta = startAngle + (t/tickCount)*(endAngle-startAngle);
    const tr = ta*Math.PI/180;
    const x1=cx+r*Math.cos(tr), y1=cy+r*Math.sin(tr);
    const x2=cx+r*1.15*Math.cos(tr), y2=cy+r*1.15*Math.sin(tr);
    const labelVal = Math.round(maxVal*t/tickCount);
    const lx=cx+r*1.35*Math.cos(tr), ly=cy+r*1.35*Math.sin(tr);
    ticks+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#1a1a1a" stroke-width="1.4"/><text x="${lx.toFixed(1)}" y="${(ly+3).toFixed(1)}" font-size="8" text-anchor="middle">${labelVal}</text>`;
  }
  return `<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" class="ic">
    <circle cx="${cx}" cy="${cy}" r="${outerR.toFixed(1)}" fill="#fff" stroke="#1a1a1a" stroke-width="2"/>
    ${ticks}
    <line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="#d33" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="3" fill="#1a1a1a"/>
  </svg>`;
}

function jarReadingSVG(valueML,maxML,height){
  height = height||140;
  const width = height*0.62;
  const topY=14, bottomY=height-6, usableH=bottomY-topY, steps=5;
  let gridLines='', labels='';
  for(let s=0;s<=steps;s++){
    const val = Math.round(maxML*(steps-s)/steps);
    const y = topY + (usableH*s/steps);
    gridLines += `<line x1="${(width*0.12).toFixed(1)}" y1="${y.toFixed(1)}" x2="${(width*0.76).toFixed(1)}" y2="${y.toFixed(1)}" stroke="#999" stroke-width="0.8"/>`;
    labels += `<text x="${(width*0.82).toFixed(1)}" y="${(y+3).toFixed(1)}" font-size="8">${val}</text>`;
  }
  const waterY = bottomY-(usableH*(valueML/maxML));
  return `<svg width="${(width+30).toFixed(0)}" height="${height}" viewBox="0 0 ${(width+30).toFixed(0)} ${height}" class="ic">
    <rect x="${(width*0.12).toFixed(1)}" y="${topY}" width="${(width*0.64).toFixed(1)}" height="${usableH.toFixed(1)}" fill="none" stroke="#1a1a1a" stroke-width="1.8" rx="4"/>
    ${gridLines}${labels}
    <rect x="${(width*0.12).toFixed(1)}" y="${waterY.toFixed(1)}" width="${(width*0.64).toFixed(1)}" height="${(bottomY-waterY).toFixed(1)}" fill="#888" opacity="0.5"/>
  </svg>`;
}

function fractionCircleSVG(parts, shaded, size){
  size = size || 90;
  const cx=size/2, cy=size/2, r=size*0.42;
  let paths='';
  for(let i=0;i<parts;i++){
    const a0=(i/parts)*2*Math.PI-Math.PI/2, a1=((i+1)/parts)*2*Math.PI-Math.PI/2;
    const x0=(cx+r*Math.cos(a0)).toFixed(2), y0=(cy+r*Math.sin(a0)).toFixed(2);
    const x1=(cx+r*Math.cos(a1)).toFixed(2), y1=(cy+r*Math.sin(a1)).toFixed(2);
    const largeArc=(a1-a0)>Math.PI?1:0;
    const fill = i<shaded ? '#1a1a1a' : '#fff';
    paths += `<path d="M${cx},${cy} L${x0},${y0} A${r},${r} 0 ${largeArc} 1 ${x1},${y1} Z" fill="${fill}" stroke="#1a1a1a" stroke-width="1.4"/>`;
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="ic">${paths}</svg>`;
}

function fractionBarSVG(parts, shaded, width, height){
  width=width||160; height=height||34;
  const gap=4;
  const cellW = (width-(parts-1)*gap)/parts;
  let cells='';
  for(let i=0;i<parts;i++){
    const x = i*(cellW+gap);
    cells += `<rect x="${x.toFixed(1)}" y="0" width="${cellW.toFixed(1)}" height="${height}" fill="${i<shaded?'#1a1a1a':'#fff'}" stroke="#1a1a1a" stroke-width="1.6"/>`;
  }
  return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" class="ic">${cells}</svg>`;
}

function fractionCompleteSVG(parts, shownCount, qid, size){
  size = size || 90;
  const cx=size/2, cy=size/2, r=size*0.42;
  let solid='', dashed='';
  for(let i=0;i<parts;i++){
    const a0=(i/parts)*2*Math.PI-Math.PI/2, a1=((i+1)/parts)*2*Math.PI-Math.PI/2;
    const x0=(cx+r*Math.cos(a0)).toFixed(2), y0=(cy+r*Math.sin(a0)).toFixed(2);
    const x1=(cx+r*Math.cos(a1)).toFixed(2), y1=(cy+r*Math.sin(a1)).toFixed(2);
    const largeArc=(a1-a0)>Math.PI?1:0;
    const d=`M${cx},${cy} L${x0},${y0} A${r},${r} 0 ${largeArc} 1 ${x1},${y1} Z`;
    if(i<shownCount) solid += `<path d="${d}" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="1.4"/>`;
    else dashed += `<path d="${d}" fill="none" stroke="#999" stroke-width="1.4" stroke-dasharray="3 3"/>`;
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="ic" data-omr="${qid}-draw">${solid}${dashed}</svg>`;
}

function fractionCircleCrossSVG(parts, shaded, crossed, size){
  size = size || 90;
  const cx=size/2, cy=size/2, r=size*0.42;
  let paths='';
  for(let i=0;i<parts;i++){
    const a0=(i/parts)*2*Math.PI-Math.PI/2, a1=((i+1)/parts)*2*Math.PI-Math.PI/2;
    const x0=(cx+r*Math.cos(a0)).toFixed(2), y0=(cy+r*Math.sin(a0)).toFixed(2);
    const x1=(cx+r*Math.cos(a1)).toFixed(2), y1=(cy+r*Math.sin(a1)).toFixed(2);
    const largeArc=(a1-a0)>Math.PI?1:0;
    const isShaded = i<shaded;
    const isCrossed = i<crossed;
    const fill = isShaded ? '#1a1a1a' : '#fff';
    paths += `<path d="M${cx},${cy} L${x0},${y0} A${r},${r} 0 ${largeArc} 1 ${x1},${y1} Z" fill="${fill}" stroke="#1a1a1a" stroke-width="1.4"/>`;
    if(isCrossed){
      const midA=(a0+a1)/2, mx=cx+r*0.55*Math.cos(midA), my=cy+r*0.55*Math.sin(midA);
      paths += `<line x1="${(mx-6).toFixed(2)}" y1="${(my-6).toFixed(2)}" x2="${(mx+6).toFixed(2)}" y2="${(my+6).toFixed(2)}" stroke="#fff" stroke-width="2"/><line x1="${(mx-6).toFixed(2)}" y1="${(my+6).toFixed(2)}" x2="${(mx+6).toFixed(2)}" y2="${(my-6).toFixed(2)}" stroke="#fff" stroke-width="2"/>`;
    }
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="ic">${paths}</svg>`;
}
function unequalCircleSVG(parts, size){
  size = size || 80;
  const cx=size/2, cy=size/2, r=size*0.42;
  let bounds=[0];
  for(let i=1;i<parts;i++){ bounds.push(bounds[i-1]+(0.5+Math.random())*(2*Math.PI/parts)); }
  const total = bounds[bounds.length-1]+(0.5+Math.random())*(2*Math.PI/parts);
  const scale = 2*Math.PI/total;
  const angles = bounds.map(b=>b*scale); angles.push(2*Math.PI);
  let paths='';
  for(let i=0;i<parts;i++){
    const a0=angles[i]-Math.PI/2, a1=angles[i+1]-Math.PI/2;
    const x0=(cx+r*Math.cos(a0)).toFixed(2), y0=(cy+r*Math.sin(a0)).toFixed(2);
    const x1=(cx+r*Math.cos(a1)).toFixed(2), y1=(cy+r*Math.sin(a1)).toFixed(2);
    const largeArc=(a1-a0)>Math.PI?1:0;
    paths+=`<path d="M${cx},${cy} L${x0},${y0} A${r},${r} 0 ${largeArc} 1 ${x1},${y1} Z" fill="#fff" stroke="#1a1a1a" stroke-width="1.4"/>`;
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="ic">${paths}</svg>`;
}

const MARINE_TRACE_ROWS=[
  {creature:'jellyfish', pattern:'straight'},
  {creature:'dolphin', pattern:'wave'},

  {creature:'fish', pattern:'zigzag'},
  {creature:'crab', pattern:'scallop'}
];
function tracePatternPath(type,w,h){
  const midY=h/2;
  if(type==='straight') return `M2,${midY} L${w-2},${midY}`;
  if(type==='wave'){
    const amp=h/2-6, cycles=3, step=(w-4)/cycles;
    let d=`M2,${midY}`;
    for(let i=0;i<cycles;i++){ const x0=2+step*i;
      d+=` Q${x0+step*0.25},${midY-amp} ${x0+step*0.5},${midY} Q${x0+step*0.75},${midY+amp} ${x0+step},${midY}`; }
    return d;
  }
  if(type==='zigzag'){
    const top=6, bottom=h-6, cycles=5, step=(w-4)/cycles;
    let d=`M2,${midY}`;
    for(let i=0;i<cycles;i++){ const y=i%2===0?top:bottom; d+=` L${2+step*(i+1)},${y}`; }
    return d;
  }
  if(type==='scallop'){
    const bumps=4, step=(w-4)/bumps, r=h/2-6;
    let d=`M2,${midY}`;
    for(let i=0;i<bumps;i++){ d+=` A${step/2},${r} 0 0 1 ${2+step*(i+1)},${midY}`; }
    return d;
  }
  if(type==='spiral-wave'){
    const loopCx=16, loopCy=midY, loopR=8;
    let d=`M${loopCx+loopR},${loopCy} A${loopR},${loopR} 0 1 1 ${loopCx+loopR-0.1},${loopCy-0.1}`;
    const waveStart=loopCx+loopR+4, waveWidth=w-waveStart-2, amp=h/2-8, cycles=2, step=waveWidth/cycles;
    d+=` M${waveStart},${midY}`;
    for(let i=0;i<cycles;i++){ const x0=waveStart+step*i;
      d+=` Q${x0+step*0.25},${midY-amp} ${x0+step*0.5},${midY} Q${x0+step*0.75},${midY+amp} ${x0+step},${midY}`; }
    return d;
  }
  return `M2,${midY} L${w-2},${midY}`;
}

/* ---------- DIFFICULTY ENGINE ---------- */
function difficultyProfile(subIdx){
  const profiles=[
    {hard:.50,medium:.32,easy:.18},
    {hard:.22,medium:.60,easy:.18},
    {hard:.12,medium:.50,easy:.38},
    {hard:.08,medium:.32,easy:.60}
  ];
  return profiles[Math.min(subIdx,3)];
}
function difficultyList(subIdx,n){
  const p=difficultyProfile(subIdx);
  let nh=Math.round(n*p.hard), nm=Math.round(n*p.medium), ne=Math.max(0,n-nh-nm);
  let arr=[];
  for(let i=0;i<nh;i++) arr.push('hard');
  for(let i=0;i<nm;i++) arr.push('medium');
  for(let i=0;i<ne;i++) arr.push('easy');
  while(arr.length<n) arr.push('medium');
  return shuffle(arr.slice(0,n));
}
function scaleRange(min,max,diff){
  const span=max-min;
  if(diff==='easy') return [min, Math.round(min+span*0.4)];
  if(diff==='medium') return [Math.round(min+span*0.25), Math.round(min+span*0.75)];
  return [Math.round(min+span*0.55), max]; // hard
}

GENERATORS['compare-equal-match'] = (p,subIdx,qc,sid,sname) => {

  const theme = p.theme || randomTheme();
  let counts=[]; while(counts.length<n){ const c=ri(2,8); if(!counts.includes(c)) counts.push(c); }
  const iconsUsed=[]; counts.forEach(()=>{ let ic; do{ ic=themeIcon(theme); }while(iconsUsed.includes(ic)); iconsUsed.push(ic); });
  const countToIcon={}; counts.forEach((c,i)=>countToIcon[c]=iconsUsed[i]);
  const rightOrder = shuffle(counts);
  let leftItems='', rightItems='', answers=[];
  counts.forEach((c,i)=>{
    const qid=qidOf(qc);
    const rightCount = rightOrder[i];
    leftItems+=`<div class="match-item"><div class="match-content">${iconRow(countToIcon[c],c,26)}</div><span class="match-dot" data-omr="${qid}-leftdot"></span></div>`;

/* ---- 4. Match MCQ: opposites / shapes / relations (Level 3A) ---- */
GENERATORS['match-mcq'] = (p,subIdx,qc,sid,sname) => {
  const optionCount = subIdx===0?4:(subIdx===1?3:2);
  const banks = p.banks || ['opposite','shape','relation'];
  const n = p.n || banks.length + 1;
  let rows='', answers=[];
  for(let i=0;i<n;i++){
    const qid=qidOf(qc);
    const bankName = pick(banks);
    let bank = bankName==='opposite'?OPPOSITES:bankName==='shape'?SHAPE_MATCH:RELATION_MATCH;
    const pairIdx = ri(0,bank.length-1);
    const [word,correctAns] = bank[pairIdx];
    let distractors=[];
    while(distractors.length<optionCount-1){
      const d = pick(bank)[1];
      if(d!==correctAns && !distractors.includes(d)) distractors.push(d);
    }
    const options = shuffle([correctAns,...distractors]);
    const correctIdx = options.indexOf(correctAns);
    rows+=`<div class="q-row"><span class="q-num">${i+1}.</span><b>${esc(word)}</b> &rarr;
      <span class="mcq-options">${options.map((o,idx)=>`<span class="mcq-opt" data-omr="${qid}-opt${idx}">${String.fromCharCode(65+idx)}. ${esc(o)}</span>`).join('')}</span>
    </div>`;
    answers.push(makeAnsItem(qid,sid,sname,i+1,'mcq',{optionIndex:correctIdx,text:correctAns},`bubble ${String.fromCharCode(65+correctIdx)}`,ICR_DETECT_MAP['mcq']));
  }
  return {html:`<p class="instr">Choose the matching word for each item.</p><div class="q-list">${rows}</div>`, answers};
};

GENERATORS['pattern-complete'] = (p,subIdx,qc,sid,sname) => {

    const patternType = subIdx>=2?'AB':pick(['AB','AAB','ABC']);
    let seq=[];
    if(patternType==='AB'){ for(let k=0;k<3;k++){seq.push(iconA);seq.push(iconB);} }
    else if(patternType==='AAB'){ for(let k=0;k<2;k++){seq.push(iconA);seq.push(iconA);seq.push(iconB);} }
    else { const iconC=set2[2]||iconA; for(let k=0;k<2;k++){seq.push(iconA);seq.push(iconB);seq.push(iconC);} }
    const next = seq[seq.length%2===0?0:1];
    const nextIcon = patternType==='AB'?(seq.length%2===0?iconA:iconB):seq[seq.length%3];
    rows+=`<div class="q-row"><span class="q-num">${i+1}.</span>${seq.map(ic=>icon(ic,22)).join('')} <span class="ans-box" data-omr="${qid}-next">?</span></div>`;

/* ---- vertical operation helper ---- */
function vertOpHtml(a,b,op,qid){

  return `<table class="vert-op" data-omr="${qid}-vert"><tr><td colspan="${w}"></td><td>${a}</td></tr>

    <tr><td colspan="${w+1}" style="height:22px;"></td></tr></table>`;
}

function vertOpHtmlBoxed(a,b,op,qid){
  const w = Math.max(String(a).length,String(b).length)+1;

/* ---- 16/26/39 etc: Addition vertical (no-carry / carry) ---- */
GENERATORS['addition-vertical'] = (p,subIdx,qc,sid,sname) => {
  const max = p.max || 30, carry = !!p.carry;
  const n = p.n || (subIdx===0?5:4);
  const minA = p.minA || 10;
  const cols = p.cols || 0; // 0 = default vertical list, >0 = horizontal grid
  let cells=[], answers=[];
  for(let i=0;i<n;i++){
    const qid=qidOf(qc);
    let a,b,ok=false,tries=0;
    while(!ok && tries<50){
      a=ri(minA,max-1); b=ri(1,Math.max(1,max-a));
      const onesSum = (a%10)+(b%10);
      ok = carry ? onesSum>=10 : onesSum<10;
      tries++;
    }
    if(cols>0){
      cells.push(`<div>${vertOpHtmlBoxed(a,b,'+',qid)}</div>`);
    } else {
      cells.push(`<div class="q-row">${vertOpHtmlBoxed(a,b,'+',qid)}</div>`);
    }
    answers.push(makeAnsItem(qid,sid,sname,i+1,'fill-blank',a+b,'answer written in the box below the line',ICR_DETECT_MAP['fill-blank']));
  }
  const wrapStyle = cols>0 ? `display:grid;grid-template-columns:repeat(${cols},1fr);gap:20px;` : '';
  const html = `<p class="instr">Add. Write the answer in the box below the line.${carry?' (Regroup where needed.)':''}</p><div style="${wrapStyle}">${cells.join('')}</div>`;
  return {html, answers};
};

/* ---- 17/27/40 etc: Subtraction vertical (no-borrow / borrow) ---- */
GENERATORS['subtraction-vertical'] = (p,subIdx,qc,sid,sname) => {
  const max = p.max || 30, borrow = !!p.borrow;
  const n = p.n || (subIdx===0?5:4);
  const minA = p.minA || 11;
  const cols = p.cols || 0;
  let cells=[], answers=[];
  for(let i=0;i<n;i++){
    const qid=qidOf(qc);
    let a,b,ok=false,tries=0;

      const needBorrow = (a%10) < (b%10);
      ok = borrow ? needBorrow : !needBorrow;

    cells.push(`<div>${vertOpHtmlBoxed(a,b,'-',qid)}</div>`);
    answers.push(makeAnsItem(qid,sid,sname,i+1,'fill-blank',a-b,'answer written in the box below the line',ICR_DETECT_MAP['fill-blank']));
  }
  const wrapStyle = cols>0 ? `display:grid;grid-template-columns:repeat(${cols},1fr);gap:20px;` : 'display:flex;flex-direction:column;gap:14px;';
  const html = `<p class="instr">Subtract. Write the answer in the box below the line.${borrow?' (Regroup where needed.)':''}</p><div style="${wrapStyle}">${cells.join('')}</div>`;
  return {html, answers};
};

/* ---- 19. Skip counting (Level 20) ---- */

/* ---- 21. Tally / data handling (Level 30,47) ---- */
GENERATORS['tally-data'] = (p,subIdx,qc,sid,sname) => {

  let rows='', answers=[], data={};

  const qs = [
    ()=>{ const c=pick(cats); return {q:`How many ${c}?`, a:data[c]}; },
    ()=>{ const sorted=Object.entries(data).sort((a,b)=>b[1]-a[1]); return {q:'Which has the MOST?', a:sorted[0][0]}; },
    ()=>{ const sorted=Object.entries(data).sort((a,b)=>a[1]-b[1]); return {q:'Which has the LEAST?', a:sorted[0][0]}; },
    ()=>{ const total=Object.values(data).reduce((s,v)=>s+v,0); return {q:'What is the TOTAL count?', a:total}; }
  ];

    const h=ri(1,12); const mOpts = roundTo===60?[0]:(roundTo===30?[0,30]:[0,15,30,45]);
    const m=pick(mOpts);
    const timeStr = `${h}:${String(m).padStart(2,'0')}`;
    rows+=`<div class="q-row"><span class="q-num">${i+1}.</span>${drawClock(h,m)}<span>Time = <span class="ans-box wide" data-omr="${qid}-time"></span></span></div>`;
    answers.push(makeAnsItem(qid,sid,sname,i+1,'fill-blank',timeStr,'time written in text box',ICR_DETECT_MAP['fill-blank']));
  }
  let calRows='', calAnswers=[];
  if(p.calendar){
    const cn = 3;
    for(let i=0;i<cn;i++){

      let q,a;
      if(mode==='weekday-after'){ const idx=ri(0,5); q=`Day after ${WEEKDAYS[idx]}?`; a=WEEKDAYS[idx+1]; }
      else if(mode==='weekday-before'){ const idx=ri(1,6); q=`Day before ${WEEKDAYS[idx]}?`; a=WEEKDAYS[idx-1]; }

      answers.push(makeAnsItem(qid,sid,sname,i+1,'fill-blank',`${shaded}/${parts}`,'fraction written in text box',ICR_DETECT_MAP['fill-blank']));
    } else {
      const shaded2=ri(1,parts-shaded>0?parts-shaded:1);
      rows+=`<div class="q-row"><span class="q-num">${i+1}.</span><b>${shaded}/${parts} + ${shaded2}/${parts} =</b> <span class="ans-box wide" data-omr="${qid}-fracop"></span></div>`;

/* ---- Data Handling shared helpers (Level 47) ---- */
function buildDataCategories(n, minVal, maxVal, theme){
  theme = theme || randomTheme();
  let icons = sample(THEMES[theme], Math.min(n, THEMES[theme].length));
  while(icons.length<n) icons.push(pick(THEMES[theme]));
  icons = icons.slice(0,n);
  let values=[]; while(values.length<n){ values.push(ri(minVal,maxVal)); }
  return icons.map((ic,idx)=>({icon:ic, label:labelize(ic), value:values[idx]}));
}
function barGraphSVG(dataset, maxScale, opts){
  opts = opts || {};
  const barW = opts.barW || 46, gap = opts.gap || 26, chartH = opts.chartH || 160;
  const axisPad = 30;
  const n = dataset.length;
  const chartW = n*(barW+gap)+gap;
  const gridCount = 5;
  let gridLines='', bars='', labels='';
  for(let g=0; g<=gridCount; g++){
    const val = Math.round(maxScale*g/gridCount);
    const y = chartH - (chartH*(g/gridCount));
    gridLines += `<line x1="${axisPad}" y1="${y.toFixed(1)}" x2="${chartW+axisPad}" y2="${y.toFixed(1)}" stroke="#ddd" stroke-width="1"/><text x="${axisPad-6}" y="${(y+3).toFixed(1)}" font-size="9" text-anchor="end">${val}</text>`;
  }
  dataset.forEach((d,i)=>{
    const bh = chartH*(d.value/maxScale);
    const x = axisPad+gap+i*(barW+gap);
    const y = chartH-bh;
    bars += `<rect x="${x}" y="${y.toFixed(1)}" width="${barW}" height="${bh.toFixed(1)}" fill="#666" stroke="#1a1a1a" stroke-width="1.4"/>`;
    labels += `<text x="${x+barW/2}" y="${chartH+16}" font-size="9" text-anchor="middle">${esc(d.label)}</text>`;
  });
  const totalW = chartW+axisPad+10, totalH = chartH+34;
  return `<svg width="${totalW}" height="${totalH}" viewBox="0 0 ${totalW} ${totalH}" class="ic">
    <line x1="${axisPad}" y1="0" x2="${axisPad}" y2="${chartH}" stroke="#1a1a1a" stroke-width="1.6"/>
    <line x1="${axisPad}" y1="${chartH}" x2="${chartW+axisPad}" y2="${chartH}" stroke="#1a1a1a" stroke-width="1.6"/>
    ${gridLines}${bars}${labels}
  </svg>`;
}
function dataQuestionBank(dataset){
  const sorted = [...dataset].sort((a,b)=>b.value-a.value);
  const highest = sorted[0], lowest = sorted[sorted.length-1];
  const specific = pick(dataset);
  const [a,b] = sample(dataset,2);
  const [c,d] = sample(dataset,2);
  const symbol = c.value>d.value?'>':(c.value<d.value?'<':'=');
  const total = dataset.reduce((s,v)=>s+v.value,0);
  return [
    {text:'Which category has the HIGHEST count?', kind:'circle', correctLabel:highest.label},
    {text:'Which category has the LOWEST count?', kind:'circle', correctLabel:lowest.label},
    {text:`How many ${specific.label.toLowerCase()} are there?`, kind:'fill', answer:specific.value},
    {text:`How many more ${a.label.toLowerCase()} than ${b.label.toLowerCase()} are there?`, kind:'fill', answer:Math.abs(a.value-b.value)},
    {text:`Compare: ${c.label} ___ ${d.label}`, kind:'symbol', a:c, b:d, answer:symbol},
    {text:'What is the TOTAL count of all categories?', kind:'fill', answer:total}
  ];
}
function renderDataQuestions(dataset, qc, sid, sname, count){
  const bank = shuffle(dataQuestionBank(dataset)).slice(0, count);
  let rows='', answers=[];
  bank.forEach((item,i)=>{
    const qid=qidOf(qc);
    if(item.kind==='circle'){
      const opts = dataset.map(dd=>dd.label);
      const correctIdx = opts.indexOf(item.correctLabel);
      rows += `<div class="q-row"><span class="q-num">${i+1}.</span>${esc(item.text)} ${opts.map((o,idx)=>`<span class="circle-target" data-omr="${qid}-opt${idx}" style="border:1px dashed var(--line);border-radius:4px;padding:3px 8px;">${esc(o)}</span>`).join('')}</div>`;
      answers.push(makeAnsItem(qid,sid,sname,i+1,'circle-choice',{optionIndex:correctIdx,value:item.correctLabel},`circle '${item.correctLabel}'`,ICR_DETECT_MAP['circle-choice']));
    } else if(item.kind==='symbol'){
      rows += `<div class="q-row"><span class="q-num">${i+1}.</span>${esc(item.text.split('___')[0])}<span class="ans-box" data-omr="${qid}-sym"></span>${esc(item.text.split('___')[1]||'')}</div>`;
      answers.push(makeAnsItem(qid,sid,sname,i+1,'fill-blank',item.answer,'symbol written in box',ICR_DETECT_MAP['fill-blank']));
    } else {
      rows += `<div class="q-row"><span class="q-num">${i+1}.</span>${esc(item.text)} <span class="ans-box wide" data-omr="${qid}-ans"></span></div>`;
      answers.push(makeAnsItem(qid,sid,sname,i+1,'fill-blank',item.answer,'answer written in box',ICR_DETECT_MAP['fill-blank']));
    }
  });
  return {html:`<div class="q-list">${rows}</div>`, answers};
}

/* ---- 53.0 Section C: Common factors & common multiples (mixed) ---- */
GENERATORS['common-factors-multiples-mixed'] = (p,subIdx,qc,sid,sname) => {
  const n = p.n || 5;
  const pairs = p.pairs || [[12,18],[4,6],[8,12],[6,9],[10,15]];
  function factorsOf(x){ let f=[]; for(let k=1;k<=x;k++) if(x%k===0) f.push(k); return f; }
  function lcm(x,y){ function gcd(m,nn){ return nn? gcd(nn,m%nn):m; } return (x*y)/gcd(x,y); }
  let rows='', answers=[];
  for(let i=0;i<n;i++){
    const qid=qidOf(qc);
    const [a,b] = pairs[i % pairs.length];
    const mode = i%2===0 ? 'factors' : 'multiples';
    if(mode==='factors'){
      const fa=factorsOf(a), fb=factorsOf(b);
      const common = fa.filter(x=>fb.includes(x));
      rows+=`<div class="q-row"><span class="q-num">${i+1}.</span>Common factors of <b>${a}</b> and <b>${b}</b>: <span class="ans-box wide" data-omr="${qid}-common" style="min-width:180px;"></span></div>`;
      answers.push(makeAnsItem(qid,sid,sname,i+1,'fill-blank',common.join(', '),'common factors written in box',ICR_DETECT_MAP['fill-blank']));
    } else {
      const lcmCount = 4;
      const l = lcm(a,b);
      const commonMultiples = Array.from({length:lcmCount},(_,k)=>l*(k+1));
      rows+=`<div class="q-row"><span class="q-num">${i+1}.</span>First ${lcmCount} common multiples of <b>${a}</b> and <b>${b}</b>: <span class="ans-box wide" data-omr="${qid}-common" style="min-width:180px;"></span></div>`;
      answers.push(makeAnsItem(qid,sid,sname,i+1,'fill-blank',commonMultiples.join(', '),'common multiples written in box',ICR_DETECT_MAP['fill-blank']));
    }
  }
  return {html:`<p class="instr">Find the common factors / common multiples as asked.</p><div class="q-list">${rows}</div>`, answers};

/* ---- 53.2 Section A: Circle the factors from options ---- */
GENERATORS['circle-factors-options'] = (p,subIdx,qc,sid,sname) => {
  const n = p.n || 5;
  const pool = p.pool || [18,12,16,20,24];
  let rows='', answers=[];
  for(let i=0;i<n;i++){
    const qid=qidOf(qc);
    const num = pool[i % pool.length];
    function factorsOf(x){ let f=[]; for(let k=1;k<=x;k++) if(x%k===0) f.push(k); return f; }
    const factors = factorsOf(num);
    const correctOptions = sample(factors.filter(f=>f>1 && f<num), Math.min(2, factors.length));
    let nonFactors=[]; let tries=0;
    while(nonFactors.length < (5-correctOptions.length) && tries<50){
      const cand = ri(2, num+6);
      if(num%cand!==0 && !nonFactors.includes(cand)) nonFactors.push(cand);
      tries++;
    }
    const options = shuffle([...correctOptions, ...nonFactors]).slice(0,5);
    const correctIdxs = options.map((o,idx)=> factors.includes(o) ? idx : null).filter(x=>x!==null);
    rows += `<div class="q-row"><span class="q-num">${i+1}.</span>Circle the factors of <b>${num}</b>: ${options.map((o,idx)=>`<span class="circle-target" data-omr="${qid}-opt${idx}">${o}</span>`).join(' ')}</div>`;
    answers.push(makeAnsItem(qid,sid,sname,i+1,'circle-choice',correctIdxs,`circle option(s) ${correctIdxs.map(x=>x+1).join(', ')} (factors of ${num})`,ICR_DETECT_MAP['circle-choice']));
  }
  return {html:`<p class="instr">Circle the numbers that are factors of the given number.</p><div class="q-list">${rows}</div>`, answers};
};

GENERATORS['compare-decimals-configurable'] = (p,subIdx,qc,sid,sname) => {
  const n = p.n || 5;

  const intMax = p.intMax || 9;

  let rows='', answers=[];
  for(let i=0;i<n;i++){
    const qid=qidOf(qc);
    const a = randDecimalStr(intMax, places);
    let b;
    if(closeVals){
      const bDigits = a.digits.map(d=> Math.random()<0.5 ? d : ri(0,9));
      b = {intPart:a.intPart, digits:bDigits, numStr:a.intPart+'.'+bDigits.join(''), value:parseFloat(a.intPart+'.'+bDigits.join(''))};
      if(b.value===a.value) b.digits[b.digits.length-1] = (b.digits[b.digits.length-1]+1)%10, b.numStr=a.intPart+'.'+b.digits.join(''), b.value=parseFloat(b.numStr);
    } else {
      b = randDecimalStr(intMax, places);
    }
    const symbol = a.value>b.value?'>':(a.value<b.value?'<':'=');
    rows+=`<div class="q-row"><span class="q-num">${i+1}.</span><b style="font-size:18px;">${a.numStr}</b> <span class="ans-box" data-omr="${qid}-sym"></span> <b style="font-size:18px;">${b.numStr}</b></div>`;

  }
  return {html:`<p class="instr">Compare the decimals: write &lt;, &gt; or = in the box.</p><div class="q-list">${rows}</div>`, answers};
};

/* ---- Level 56 helpers: rectangle/square diagram + shaded-grid diagram ---- */
function rectDiagramSVG(len, wid, unitPx, showGrid){
  const w = len*unitPx, h = wid*unitPx;
  const padL = 46, padT = 26, padR = 16, padB = 16;
  const svgW = w+padL+padR, svgH = h+padT+padB;
  let gridLines='';
  if(showGrid){
    for(let i=1;i<len;i++) gridLines += `<line x1="${padL+i*unitPx}" y1="${padT}" x2="${padL+i*unitPx}" y2="${padT+h}" stroke="#bbb" stroke-width="0.7"/>`;
    for(let j=1;j<wid;j++) gridLines += `<line x1="${padL}" y1="${padT+j*unitPx}" x2="${padL+w}" y2="${padT+j*unitPx}" stroke="#bbb" stroke-width="0.7"/>`;
  }
  return `<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" class="ic" overflow="visible">
    <rect x="${padL}" y="${padT}" width="${w}" height="${h}" fill="none" stroke="#1a1a1a" stroke-width="2"/>
    ${gridLines}
    <text x="${padL+w/2}" y="${padT-8}" font-size="12" text-anchor="middle">${len} cm</text>
    <text x="${padL-10}" y="${padT+h/2+4}" font-size="12" text-anchor="middle" transform="rotate(-90 ${padL-10} ${padT+h/2})">${wid} cm</text>
  </svg>`;
}
function squareDiagramSVG(side, unitPx, showGrid){ return rectDiagramSVG(side, side, unitPx, showGrid); }

function gridSquaresShadedSVG(rows, cols, unitPx){
  let cells='';
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      cells += `<rect x="${c*unitPx}" y="${r*unitPx}" width="${unitPx}" height="${unitPx}" fill="#d8d8d8" stroke="#1a1a1a" stroke-width="1"/>`;
    }
  }
  const w=cols*unitPx, h=rows*unitPx;
  return `<svg width="${w+6}" height="${h+6}" viewBox="0 0 ${w+6} ${h+6}" class="ic" overflow="visible"><g transform="translate(3,3)">${cells}</g></svg>`;
}

/* ---- Level 57 helpers: angle diagrams + protractor ---- */
const ACUTE_ANGLES = [20,30,40,50,60,70,75];
const OBTUSE_ANGLES = [100,110,120,130,140,150,160,170];
const SIMPLE_MEASURE_ANGLES = [30,45,60,90,120,150];

/* Each icon appears with exactly ONE angle type — never reused across types.
   This is what guarantees a single correct answer is possible at all. */
const ANGLE_REAL_LIFE_BANK = [
  {icon:'cone',      type:'Acute'},
  {icon:'star',      type:'Acute'},
  {icon:'scissors',  type:'Acute'},
  {icon:'triangle',  type:'Acute'},
  {icon:'lightning', type:'Acute'},
  {icon:'window',    type:'Right'},
  {icon:'door',      type:'Right'},
  {icon:'clock',     type:'Right'},
  {icon:'square',    type:'Right'},
  {icon:'crossshape',type:'Right'},
  {icon:'book',      type:'Obtuse'},
  {icon:'umbrella',  type:'Obtuse'}
];

function validateAngleQuestion(options, target){
  const matches = options.filter(o => o.type === target.type);
  return matches.length === 1;
}

function angleDiagramSimpleSVG(deg, size){
  size = size || 100;
  const vx = size*0.22, vy = size*0.82, armLen = size*0.62;
  const rad = deg*Math.PI/180;
  const x2 = vx+armLen, y2 = vy;
  const x3 = vx+armLen*Math.cos(rad), y3 = vy-armLen*Math.sin(rad);
  let marker;
  if(Math.abs(deg-90)<0.5){
    const s = size*0.16;
    marker = `<rect x="${vx.toFixed(1)}" y="${(vy-s).toFixed(1)}" width="${s.toFixed(1)}" height="${s.toFixed(1)}" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>`;
  } else {
    const arcR = size*0.2;
    const ax2 = vx+arcR*Math.cos(rad), ay2 = vy-arcR*Math.sin(rad);
    const largeArc = deg>180?1:0;
    marker = `<path d="M ${(vx+arcR).toFixed(1)} ${vy.toFixed(1)} A ${arcR.toFixed(1)} ${arcR.toFixed(1)} 0 ${largeArc} 0 ${ax2.toFixed(1)} ${ay2.toFixed(1)}" fill="none" stroke="#d33" stroke-width="1.6"/>`;
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="ic" overflow="visible">
    <line x1="${vx.toFixed(1)}" y1="${vy.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="${vx.toFixed(1)}" y1="${vy.toFixed(1)}" x2="${x3.toFixed(1)}" y2="${y3.toFixed(1)}" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round"/>
    ${marker}
    <circle cx="${vx.toFixed(1)}" cy="${vy.toFixed(1)}" r="2" fill="#1a1a1a"/>
  </svg>`;
}

function protractorAngleSVG(deg){
  const W=220, H=140, cx=110, cy=120, r=85;
  let ticks='';
  for(let a=0;a<=180;a+=30){
    const rad=a*Math.PI/180;
    const x1=cx+r*Math.cos(rad), y1=cy-r*Math.sin(rad);
    const x2=cx+(r+8)*Math.cos(rad), y2=cy-(r+8)*Math.sin(rad);
    const lx=cx+(r+20)*Math.cos(rad), ly=cy-(r+20)*Math.sin(rad);
    ticks += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#1a1a1a" stroke-width="1"/><text x="${lx.toFixed(1)}" y="${(ly+3).toFixed(1)}" font-size="8" text-anchor="middle">${a}</text>`;
  }
  const rad = deg*Math.PI/180;
  const extLen = r*0.92;
  const x3=cx+extLen*Math.cos(rad), y3=cy-extLen*Math.sin(rad);
  const arcR=28;
  const ax2=cx+arcR*Math.cos(rad), ay2=cy-arcR*Math.sin(rad);
  const largeArc = deg>180?1:0;
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" class="ic" overflow="visible">
    <path d="M ${(cx-r).toFixed(1)} ${cy} A ${r} ${r} 0 0 1 ${(cx+r).toFixed(1)} ${cy}" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
    ${ticks}
    <line x1="${(cx-r-5).toFixed(1)}" y1="${cy}" x2="${(cx+r+5).toFixed(1)}" y2="${cy}" stroke="#1a1a1a" stroke-width="1.6"/>
    <line x1="${cx}" y1="${cy}" x2="${x3.toFixed(1)}" y2="${y3.toFixed(1)}" stroke="#d33" stroke-width="2.4"/>
    <path d="M ${(cx+arcR)} ${cy} A ${arcR} ${arcR} 0 ${largeArc} 0 ${ax2.toFixed(1)} ${ay2.toFixed(1)}" fill="none" stroke="#2f6fed" stroke-width="1.4"/>
    <circle cx="${cx}" cy="${cy}" r="2.2" fill="#1a1a1a"/>
  </svg>`;
}

/* ---- Real-life objects: circle the picture showing the required angle ---- */
GENERATORS['angle-real-life-circle'] = (p,subIdx,qc,sid,sname) => {
  const n = p.n || 5;
  const pool = p.pool || ANGLE_REAL_LIFE_BANK;
  const optCount = p.optCount || 3;
  const forcedType = p.forcedType || null;
  const usedCombos = new Set(); // prevents repeating the same object combination
  let rows='', answers=[];

  for(let i=0;i<n;i++){
    const qid=qidOf(qc);
    let target, distractors, options, comboKey, valid=false, tries=0;

    while(!valid && tries<60){
      tries++;
      const targetPool = forcedType ? pool.filter(o=>o.type===forcedType) : pool;
      if(targetPool.length===0) break;
      target = pick(targetPool);

      // Distractors MUST be a different type than the target — this is what
      // makes "exactly one correct answer" structurally guaranteed rather than
      // merely likely.
      const distractorPool = pool.filter(o => o.type !== target.type && o.icon !== target.icon);
      if(distractorPool.length < optCount-1) continue;

      distractors = sample(distractorPool, optCount-1);
      options = shuffle([target, ...distractors]);
      comboKey = options.map(o=>o.icon).sort().join('|');

      if(usedCombos.has(comboKey)) continue; // rule 5: no repeated combos
      valid = validateAngleQuestion(options, target); // rule 6: exactly one correct
      if(valid) usedCombos.add(comboKey);
    }

    if(!valid) continue; // safety net: skip rather than emit a broken question

    const correctIdx = options.findIndex(o=>o.icon===target.icon);
    rows += `<div class="q-row"><span class="q-num">${i+1}.</span>Circle the picture showing an <b>${target.type}</b> angle: ${options.map((o,idx)=>`<span class="circle-target" data-omr="${qid}-opt${idx}">${icon(o.icon,40)}</span>`).join('')}</div>`;
    answers.push(makeAnsItem(qid,sid,sname,i+1,'circle-choice',{optionIndex:correctIdx,icon:target.icon},`circle option ${correctIdx+1} (${target.icon})`,ICR_DETECT_MAP['circle-choice']));
  }

  return {html:`<p class="instr">Look at the pictures and circle as instructed.</p><div class="q-list">${rows}</div>`, answers};
};

/* ---- Grid-based complete-the-half helper (58.1 Section C) ---- */

  if(o>0) parts.push(o);
  if(parts.length===0) parts=[0];
  return parts.join(' + ');
}

GENERATORS['compare-hto-picture'] = (p,subIdx,qc,sid,sname) => {

/* ---- 38 Section A/B: Caterpillar-style ascending/descending ordering (3-digit numbers, box per number) ---- */
GENERATORS['ordering-caterpillar-3digit'] = (p,subIdx,qc,sid,sname) => {
  const n = p.n || 5;
  const numPerRow = p.numPerRow || 4;
  const min = p.min || 100, max = p.max || 999;
  const dir = p.dir || 'asc'; // 'asc' or 'desc'
  const closeVals = !!p.closeVals;
  let rows='', answers=[];
  for(let i=0;i<n;i++){
    let nums=[];
    if(closeVals){
      const base = ri(min,max-50);
      while(nums.length<numPerRow){ const x=base+ri(-40,90); if(x>=min && x<=max && !nums.includes(x)) nums.push(x); }
    } else {
      while(nums.length<numPerRow){ const x=ri(min,max); if(!nums.includes(x)) nums.push(x); }
    }
    const sorted = dir==='asc' ? [...nums].sort((a,b)=>a-b) : [...nums].sort((a,b)=>b-a);
    const minSize=36, maxSize=58;
    const boxesHtml = sorted.map((_,bi)=>{
      const qid=qidOf(qc);
      const t = numPerRow>1 ? bi/(numPerRow-1) : 0;
      const sz = Math.round(dir==='asc' ? (minSize + t*(maxSize-minSize)) : (maxSize - t*(maxSize-minSize)));
      answers.push(makeAnsItem(qid,sid,sname,answers.length+1,'fill-blank',sorted[bi],`number written in circle ${bi+1} (${dir}ending order)`,ICR_DETECT_MAP['fill-blank']));
      return `<span style="display:inline-flex;align-items:center;justify-content:center;width:${sz}px;height:${sz}px;border-radius:50%;border:2px solid var(--ink);margin-left:-4px;background:#fff;font-size:12px;" data-omr="${qid}-write"></span>`;
    }).join('');
    const headSvg = `<svg width="36" height="36" viewBox="0 0 36 36" class="ic" style="flex-shrink:0;">
      <circle cx="18" cy="18" r="15" fill="#fff" stroke="#1a1a1a" stroke-width="2"/>

    </svg>`;
    rows += `<div style="margin-bottom:16px;">
      <div style="font-weight:600;margin-bottom:4px;">${i+1}) ${nums.join(', ')}</div>
      <div style="display:flex;align-items:center;">${headSvg}${boxesHtml}</div>

  }
  return {html:`<p class="instr">Arrange the numbers from ${dir==='asc'?'smallest to largest':'largest to smallest'}.</p><div>${rows}</div>`, answers};

/* ---- "Add and Match" composite: match-equation-to-group + fill-box adds + vertical adds (Level 7.0) ---- */
GENERATORS['addition-add-and-match'] = (p,subIdx,qc,sid,sname) => {
  const matchCount = p.matchCount || 5;
  const fillCount = p.fillCount || 6;
  const vertCount = p.vertCount || 8;
  const maxSum = p.maxSum || 10;
  const shapeIcons = p.shapeIcons || ['triangle','flower','ball','square','hexagon','circle','star'];

  // Part 1: match equation -> group of shapes with matching total
  let sums=[]; while(sums.length<matchCount){ const s=ri(4,maxSum); if(!sums.includes(s)) sums.push(s); }
  const shapesUsed = shuffle(shapeIcons).slice(0,matchCount);
  const rightOrder = shuffle(sums.map((_,i)=>i));
  let leftItems='', rightItems='', answers=[];
  sums.forEach((sum,i)=>{
    const qid=qidOf(qc);
    let a=ri(1,sum-1), b=sum-a;
    leftItems += `<div class="match-item"><div class="match-content"><b>${a} + ${b}</b></div><span class="match-dot" data-omr="${qid}-leftdot"></span></div>`;
    answers.push(makeAnsItem(qid,sid,sname,i+1,'match-line',{sum, correctRightIndex: rightOrder.indexOf(i)}, 'draw a line from the equation to the group with the matching total', ICR_DETECT_MAP['match-line']));
  });
  const qids = answers.map(a=>a.questionId);
  rightOrder.forEach(origIdx=>{
    const sum = sums[origIdx], ic = shapesUsed[origIdx], qid = qids[origIdx];
    rightItems += `<div class="match-item"><span class="match-dot" data-omr="${qid}-rightdot"></span><div class="match-content">${iconRow(ic,sum,18)}</div></div>`;
  });
  const matchHtml = `<p class="instr">Draw a line from each equation to the group of shapes with the matching total.</p>
    <div class="match-grid spaced"><div class="match-col-left">${leftItems}</div><div class="match-space"></div><div class="match-col-right">${rightItems}</div></div>`;

  // Part 2: fill-in-the-box adds, two columns
  let fillRowsLeft='', fillRowsRight='';
  const half = Math.ceil(fillCount/2);
  for(let i=0;i<fillCount;i++){
    const qid=qidOf(qc);
    let a=ri(1,maxSum-1), b=ri(1,maxSum-a);
    const rowHtml = `<div class="q-row"><b>${a} + ${b} =</b> <span class="ans-box" data-omr="${qid}-sum"></span></div>`;
    if(i<half) fillRowsLeft+=rowHtml; else fillRowsRight+=rowHtml;
    answers.push(makeAnsItem(qid,sid,sname,matchCount+i+1,'fill-blank',a+b,'sum written in box',ICR_DETECT_MAP['fill-blank']));
  }
  const fillHtml = `<p class="instr" style="margin-top:14px;">Add.</p>
    <div style="display:flex;gap:40px;"><div class="q-list">${fillRowsLeft}</div><div class="q-list">${fillRowsRight}</div></div>`;

  // Part 3: vertical addition grid

  }
  const vertHtml = `<p class="instr" style="margin-top:14px;">Add.</p><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;">${vertCells}</div>`;

  return {html: matchHtml+fillHtml+vertHtml, answers};
};

/* ---- 1-10 dot-to-dot tracing (Level 9.0/9.1/9.2 Q-B) ---- */
function dotToDotSVG(qid, size){
  size = size || 260;
  const cx=size/2, cy=size/2, baseR=size*0.35;
  const points=[];
  for(let i=0;i<10;i++){
    const angle=(i/10)*2*Math.PI - Math.PI/2;
    const rVar = baseR*(0.75+Math.random()*0.5);
    points.push({x:cx+rVar*Math.cos(angle), y:cy+rVar*Math.sin(angle)});
  }
  const dotsSvg = points.map((pt,i)=>`<circle cx="${pt.x.toFixed(1)}" cy="${pt.y.toFixed(1)}" r="3" fill="#1a1a1a"/><text x="${(pt.x+8).toFixed(1)}" y="${(pt.y-4).toFixed(1)}" font-size="12" fill="#1a1a1a">${i+1}</text>`).join('');
  const pathD = points.map((pt,i)=>(i===0?'M':'L')+pt.x.toFixed(1)+','+pt.y.toFixed(1)).join(' ')+' Z';
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="ic"><path d="${pathD}" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="3 3" data-omr="${qid}-trace"/>${dotsSvg}</svg>`;
}
GENERATORS['dot-to-dot-trace'] = (p,subIdx,qc,sid,sname) => {
  const n = p.n || 1;

  for(let i=0;i<n;i++){

    rows += `<div class="q-row" style="justify-content:center;">${dotToDotSVG(qid, p.size||260)}</div>`;
    answers.push(makeAnsItem(qid,sid,sname,i+1,'trace','connect dots 1 to 10 in order','freehand line connecting numbered dots 1-10 in sequence',ICR_DETECT_MAP['trace']));

};

/* ---- Large dot-to-dot (1-30) with varied shape styles ---- */
function dotToDotSVGLarge(qid, size, numPoints){
  size = size || 300;
  const cx=size/2, cy=size*0.52;
  const style = pick(['blob','star','flower']);
  const points=[];
  for(let i=0;i<numPoints;i++){
    const angle = (i/numPoints)*2*Math.PI - Math.PI/2;
    const baseR = size*0.34;
    let rVar;
    if(style==='star'){
      rVar = baseR*(i%2===0 ? 1.0 : 0.62);
    } else if(style==='flower'){
      rVar = baseR*(0.68+0.32*Math.abs(Math.sin(angle*4)));
    } else {
      rVar = baseR*(0.75+Math.random()*0.5);
    }
    points.push({x:cx+rVar*Math.cos(angle), y:cy+rVar*Math.sin(angle)});
  }
  const dotsSvg = points.map((pt,i)=>`<circle cx="${pt.x.toFixed(1)}" cy="${pt.y.toFixed(1)}" r="2.6" fill="#1a1a1a"/><text x="${(pt.x+7).toFixed(1)}" y="${(pt.y-3).toFixed(1)}" font-size="9" fill="#1a1a1a">${i+1}</text>`).join('');
  const pathD = points.map((pt,i)=>(i===0?'M':'L')+pt.x.toFixed(1)+','+pt.y.toFixed(1)).join(' ')+' Z';
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="ic"><path d="${pathD}" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="3 3" data-omr="${qid}-trace"/>${dotsSvg}</svg>`;
}

/* ---- Mixed Add/Subtract equation-to-group matching, 2 add + 2 subtract (Level 11.0) ---- */
GENERATORS['add-subtract-match-mixed'] = (p,subIdx,qc,sid,sname) => {
  const addCount = p.addCount || 2;
  const subCount = p.subCount || 2;
  const maxVal = p.maxVal || 10;
  const shapeIcons = p.shapeIcons || ['triangle','flower','ball','square','hexagon','circle','star'];

  let rowsData=[];
  let usedTotals=[];
  for(let i=0;i<addCount;i++){
    let total; do{ total=ri(4,maxVal); }while(usedTotals.includes(total));
    usedTotals.push(total);
    let a=ri(1,total-1), b=total-a;
    rowsData.push({eq:`${a} + ${b}`, total, op:'add'});
  }
  for(let i=0;i<subCount;i++){
    let diff; do{ diff=ri(1,7); }while(usedTotals.includes(diff));
    usedTotals.push(diff);
    let b=ri(1,Math.max(1,maxVal-diff)); let a=diff+b; if(a>maxVal){ a=maxVal; b=a-diff; }
    rowsData.push({eq:`${a} &minus; ${b}`, total:diff, op:'sub'});
  }
  rowsData = shuffle(rowsData);
  const shapesUsed = shuffle(shapeIcons).slice(0,rowsData.length);
  const rightOrder = shuffle(rowsData.map((_,i)=>i));

  let leftItems='', rightItems='', answers=[];
  rowsData.forEach((row,i)=>{
    const qid=qidOf(qc);
    leftItems += `<div class="match-item" style="min-height:52px;height:52px;box-sizing:border-box;"><div class="match-content"><b>${row.eq}</b></div><span class="match-dot" data-omr="${qid}-leftdot"></span></div>`;
    answers.push(makeAnsItem(qid,sid,sname,i+1,'match-line',{result:row.total, op:row.op, correctRightIndex: rightOrder.indexOf(i)}, 'draw a line from the equation to the group with the matching total', ICR_DETECT_MAP['match-line']));
  });
  const qids = answers.map(a=>a.questionId);
  rightOrder.forEach(origIdx=>{
    const row = rowsData[origIdx], ic = shapesUsed[origIdx], qid = qids[origIdx];
    rightItems += `<div class="match-item" style="min-height:52px;height:52px;box-sizing:border-box;overflow:visible;flex-wrap:wrap;align-content:center;">
      <span class="match-dot" data-omr="${qid}-rightdot"></span>
      <div class="match-content" style="display:flex;flex-wrap:wrap;align-content:center;gap:1px;max-height:44px;overflow:hidden;">${iconRow(ic,row.total,12)}</div>
    </div>`;
  });
  return {
    html:`<p class="instr">Draw a line from each equation to the group of shapes with the matching total. (2 addition, 2 subtraction)</p>
      <div class="match-grid spaced"><div class="match-col-left">${leftItems}</div><div class="match-space"></div><div class="match-col-right">${rightItems}</div></div>`,
    answers
  };
};

/* ---- 13.1: 3-column grid (column-major, e.g. 1-10 / 11-20 / 21-30) with random blanks ---- */
GENERATORS['number-grid-missing'] = (p,subIdx,qc,sid,sname) => {

  const blankFraction = p.blankFraction || 0.4;
  const totalBlanks = Math.round(span*blankFraction);
  let allNums = Array.from({length:span},(_,i)=>min+i);
  let blankSet = new Set(sample(allNums, totalBlanks));
  let answers=[];
  let tableRows='';
  for(let r=0;r<rows;r++){
    let rowHtml='<tr>';
    for(let c=0;c<cols;c++){
      const num = min + c*rows + r;
      if(num>max){ rowHtml+='<td style="border:1px solid var(--line);height:44px;box-sizing:border-box;"></td>'; continue; }
      if(blankSet.has(num)){
        const qid=qidOf(qc);
        rowHtml += `<td style="border:1px solid var(--line);height:44px;box-sizing:border-box;text-align:center;vertical-align:middle;" data-omr="${qid}-write"></td>`;
        answers.push(makeAnsItem(qid,sid,sname,answers.length+1,'fill-blank',num,'number written in empty grid cell',ICR_DETECT_MAP['fill-blank']));

    }
    rowHtml+='</tr>';
    tableRows+=rowHtml;
  }
  const html = `<p class="instr">Write the missing numbers from ${min}-${max}.</p><table style="border-collapse:collapse;width:60%;table-layout:fixed;">${tableRows}</table>`;

};

GENERATORS['ordering-listed-boxes'] = (p,subIdx,qc,sid,sname) => {

    });
    const thisQNo = qNo++;
    rows += `<div class="q-row"><span class="q-num">${thisQNo}.</span>Arrange in ascending order: ${nums.join(', ')} &rarr; ${boxes.map(b=>b.html).join(' ')}</div>`;
    boxes.forEach((b,bi)=>{
      answers.push(makeAnsItem(b.qid,sid,sname,thisQNo,'fill-blank',sorted[bi],`number ${bi+1} of the ascending order written in box`,ICR_DETECT_MAP['fill-blank']));
    });
  }
  for(let i=0;i<descCount;i++){
    let nums=[]; while(nums.length<numPerGroup){ const x=ri(1,maxNum); if(!nums.includes(x)) nums.push(x); }
    const sorted=[...nums].sort((a,b)=>b-a);
    const boxes = sorted.map(()=>{
      const qid=qidOf(qc);
      return {qid, html:`<span class="ans-box" data-omr="${qid}-box" style="width:44px;height:38px;"></span>`};
    });
    const thisQNo = qNo++;
    rows += `<div class="q-row"><span class="q-num">${thisQNo}.</span>Arrange in descending order: ${nums.join(', ')} &rarr; ${boxes.map(b=>b.html).join(' ')}</div>`;
    boxes.forEach((b,bi)=>{
      answers.push(makeAnsItem(b.qid,sid,sname,thisQNo,'fill-blank',sorted[bi],`number ${bi+1} of the descending order written in box`,ICR_DETECT_MAP['fill-blank']));
    });
  }
  for(let i=0;i<largestCount;i++){
    const qid=qidOf(qc);
    let nums=[]; while(nums.length<numPerGroup){ const x=ri(1,maxNum); if(!nums.includes(x)) nums.push(x); }
    const target=Math.max(...nums);
    const correctIdx=nums.indexOf(target);
    rows += `<div class="q-row"><span class="q-num">${qNo++}.</span>Circle the largest. :- ${nums.map((v,idx)=>`<span class="circle-target" data-omr="${qid}-opt${idx}">${v}</span>`).join(', ')}</div>`;
    answers.push(makeAnsItem(qid,sid,sname,qNo-1,'circle-choice',{optionIndex:correctIdx,value:target},`circle option ${correctIdx+1} (${target})`,ICR_DETECT_MAP['circle-choice']));
  }
  for(let i=0;i<smallestCount;i++){
    const qid=qidOf(qc);
    let nums=[]; while(nums.length<numPerGroup){ const x=ri(1,maxNum); if(!nums.includes(x)) nums.push(x); }
    const target=Math.min(...nums);
    const correctIdx=nums.indexOf(target);
    rows += `<div class="q-row"><span class="q-num">${qNo++}.</span>Circle the smallest. :- ${nums.map((v,idx)=>`<span class="circle-target" data-omr="${qid}-opt${idx}">${v}</span>`).join(', ')}</div>`;
    answers.push(makeAnsItem(qid,sid,sname,qNo-1,'circle-choice',{optionIndex:correctIdx,value:target},`circle option ${correctIdx+1} (${target})`,ICR_DETECT_MAP['circle-choice']));
  }
  return {html:`<div class="q-list">${rows}</div>`, answers};
};

/* ---- 30.0: Raw data list -> tally + frequency table (10 categories) ---- */

GENERATORS['tally-number-match'] = (p,subIdx,qc,sid,sname) => {
