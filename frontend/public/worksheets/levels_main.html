/* ---- Calendar: one calendar image + a list of tasks (circle dates on it, or answer in boxes) ---- */
GENERATORS['calendar-tasks'] = (p,subIdx,qc,sid,sname) => {
  const year = p.year || 2026;
  const month = p.month!==undefined ? p.month : ri(0,11);
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const monthName = MONTHS[month];
  const dayHeaders = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const tasks = p.tasks || ['circle-today','weekday-of-date','month-name','next-date','prev-date'];

  let answers=[], taskDefs=[], circleQids={};
  const usedDates = new Set();
  function pickDate(minD,maxD){
    let d, tries=0;
    do{ d=ri(minD,maxD); tries++; } while(usedDates.has(d) && tries<30);
    usedDates.add(d);
    return d;
  }

  tasks.forEach(tRaw=>{
    const t = typeof tRaw==='string' ? tRaw : tRaw.type;
    const fixedDate = typeof tRaw==='object' ? tRaw.date : undefined;
    const fixedDow = typeof tRaw==='object' ? tRaw.dow : undefined;
    if(t==='circle-today' || t==='circle-date' || t==='circle-number'){
      const d = fixedDate!==undefined ? fixedDate : pickDate(1,daysInMonth);
      usedDates.add(d);
      taskDefs.push({type:t, date:d});
    } else if(t==='circle-weekday'){
      const targetDow = fixedDow!==undefined ? fixedDow : ri(0,6);
      let candidates=[]; for(let d=1;d<=daysInMonth;d++){ if(new Date(year,month,d).getDay()===targetDow) candidates.push(d); }
      taskDefs.push({type:t, dow:targetDow, dates:candidates});
    } else if(t==='circle-first-day'){
      taskDefs.push({type:t, date:1});
    } else if(t==='circle-last-date'){
      taskDefs.push({type:t, date:daysInMonth});
    } else if(t==='weekday-of-date'){
      taskDefs.push({type:t, date: fixedDate!==undefined ? fixedDate : pickDate(1,daysInMonth)});
    } else if(t==='month-name'){
      taskDefs.push({type:t});
    } else if(t==='next-date'){
      taskDefs.push({type:t, date: fixedDate!==undefined ? fixedDate : pickDate(1,daysInMonth-1)});
    } else if(t==='prev-date'){
      taskDefs.push({type:t, date: fixedDate!==undefined ? fixedDate : pickDate(2,daysInMonth)});
    } else if(t==='first-last-day'){
      taskDefs.push({type:t});
    }
  });

  // assign qids to any cell that needs circling directly on the calendar
  taskDefs.forEach(td=>{
    if(['circle-today','circle-date','circle-number','circle-first-day','circle-last-date'].includes(td.type)){
      const qid=qidOf(qc);
      td.qid=qid;
      circleQids[td.date]=qid;
    } else if(td.type==='circle-weekday'){
      const qid=qidOf(qc);
      td.qid=qid;
      td.dates.forEach(d=>{ circleQids[d]=qid; });
    }
  });

  // build the calendar grid
  let cells=[]; for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(d);
  while(cells.length % 7 !== 0) cells.push(null);
  const weeks=[]; for(let i=0;i<cells.length;i+=7) weeks.push(cells.slice(i,i+7));
  const calendarHtml = `<table style="border-collapse:collapse;width:360px;margin:0 auto 16px;">
    <tr><th colspan="7" style="border:1.5px solid var(--ink);padding:8px;background:#eef2fb;font-size:17px;">${monthName} ${year}</th></tr>
    <tr>${dayHeaders.map(dh=>`<th style="border:1px solid var(--line);padding:5px;font-size:11px;">${dh}</th>`).join('')}</tr>
    ${weeks.map(week=>`<tr>${week.map(d=>{
      if(d===null) return `<td style="border:1px solid var(--line);height:38px;"></td>`;
      const qid = circleQids[d];
      return `<td style="border:1px solid var(--line);height:38px;text-align:center;font-size:14px;" ${qid?`data-omr="${qid}-circle"`:''}>${d}</td>`;
    }).join('')}</tr>`).join('')}
  </table>`;

  // build the question list below the calendar
  let qRows=''; let qNo=1;
  taskDefs.forEach(td=>{
    if(td.type==='circle-today'){
      qRows += `<div class="q-row"><span class="q-num">${qNo++}.</span>Circle today's date: <b>${td.date}</b></div>`;
      answers.push(makeAnsItem(td.qid,sid,sname,qNo-1,'circle-choice',td.date,`circle the date ${td.date} on the calendar`,ICR_DETECT_MAP['circle-choice']));
    } else if(td.type==='circle-date' || td.type==='circle-number'){
      qRows += `<div class="q-row"><span class="q-num">${qNo++}.</span>Circle the number <b>${td.date}</b> on the calendar.</div>`;
      answers.push(makeAnsItem(td.qid,sid,sname,qNo-1,'circle-choice',td.date,`circle the date ${td.date} on the calendar`,ICR_DETECT_MAP['circle-choice']));
    } else if(td.type==='circle-weekday'){
      qRows += `<div class="q-row"><span class="q-num">${qNo++}.</span>Circle every <b>${WEEKDAYS_CAL[td.dow]}</b> shown in the calendar.</div>`;
      answers.push(makeAnsItem(td.qid,sid,sname,qNo-1,'circle-choice',td.dates,`circle every ${WEEKDAYS_CAL[td.dow]} date shown (${td.dates.join(', ')})`,ICR_DETECT_MAP['circle-choice']));
    } else if(td.type==='circle-first-day'){
      qRows += `<div class="q-row"><span class="q-num">${qNo++}.</span>Circle the first date of the month.</div>`;
      answers.push(makeAnsItem(td.qid,sid,sname,qNo-1,'circle-choice',1,'circle date 1 on the calendar',ICR_DETECT_MAP['circle-choice']));
    } else if(td.type==='circle-last-date'){
      qRows += `<div class="q-row"><span class="q-num">${qNo++}.</span>Circle the last date of the month.</div>`;
      answers.push(makeAnsItem(td.qid,sid,sname,qNo-1,'circle-choice',daysInMonth,`circle date ${daysInMonth} on the calendar`,ICR_DETECT_MAP['circle-choice']));
    } else if(td.type==='weekday-of-date'){
      const qid=qidOf(qc);
      const dow = new Date(year,month,td.date).getDay();
      qRows += `<div class="q-row"><span class="q-num">${qNo++}.</span>What day of the week is <b>${td.date} ${monthName}</b>? <span class="ans-box wide" data-omr="${qid}-weekday"></span></div>`;
      answers.push(makeAnsItem(qid,sid,sname,qNo-1,'fill-blank',WEEKDAYS_CAL[dow],'weekday name written in box',ICR_DETECT_MAP['fill-blank']));
    } else if(td.type==='month-name'){
      const qid=qidOf(qc);
      qRows += `<div class="q-row"><span class="q-num">${qNo++}.</span>Which month is shown in the calendar? <span class="ans-box wide" data-omr="${qid}-month"></span></div>`;
      answers.push(makeAnsItem(qid,sid,sname,qNo-1,'fill-blank',monthName,'month name written in box',ICR_DETECT_MAP['fill-blank']));
    } else if(td.type==='next-date'){
      const qid=qidOf(qc);
      qRows += `<div class="q-row"><span class="q-num">${qNo++}.</span>What is the date right after <b>${td.date} ${monthName}</b>? <span class="ans-box" data-omr="${qid}-next"></span></div>`;
      answers.push(makeAnsItem(qid,sid,sname,qNo-1,'fill-blank',td.date+1,'next date written in box',ICR_DETECT_MAP['fill-blank']));
    } else if(td.type==='prev-date'){
      const qid=qidOf(qc);
      qRows += `<div class="q-row"><span class="q-num">${qNo++}.</span>What is the date right before <b>${td.date} ${monthName}</b>? <span class="ans-box" data-omr="${qid}-prev"></span></div>`;
      answers.push(makeAnsItem(qid,sid,sname,qNo-1,'fill-blank',td.date-1,'previous date written in box',ICR_DETECT_MAP['fill-blank']));
    } else if(td.type==='first-last-day'){
      const qidF=qidOf(qc), qidL=qidOf(qc);
      qRows += `<div class="q-row"><span class="q-num">${qNo++}.</span>What is the first date shown? <span class="ans-box" data-omr="${qidF}-first"></span> &nbsp; What is the last date shown? <span class="ans-box" data-omr="${qidL}-last"></span></div>`;
      answers.push(makeAnsItem(qidF,sid,sname,qNo-1,'fill-blank',1,'first date written in box',ICR_DETECT_MAP['fill-blank']));
      answers.push(makeAnsItem(qidL,sid,sname,qNo-1,'fill-blank',daysInMonth,'last date written in box',ICR_DETECT_MAP['fill-blank']));
    }
  });

  return {html:`${calendarHtml}<div class="q-list">${qRows}</div>`, answers};
};

/* ---- 32.0: Circle the object, write its position in a box (Section A & B) ---- */
GENERATORS['ordinal-circle-write'] = (p,subIdx,qc,sid,sname) => {
  const n = p.n || 5;
  const itemsCount = p.itemsCount || 5;
  const ORDS=['1st','2nd','3rd','4th','5th','6th','7th','8th','9th','10th'];
  let rows='', answers=[];
  for(let i=0;i<n;i++){
    const qid=qidOf(qc);
    const theme=randomTheme();
    let icons=sample(THEMES[theme], Math.min(itemsCount, THEMES[theme].length));
    while(icons.length<itemsCount) icons.push(pick(THEMES[theme]));
    const targetIdx=ri(0,itemsCount-1);
    const itemsHtml = icons.map((ic,idx)=>{
      const isTarget = idx===targetIdx;
      return `<span style="display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;${isTarget?'border:2.5px solid var(--ink);border-radius:50%;':''}">${icon(ic,28)}</span>`;
    }).join('');
    rows+=`<div class="q-row" style="justify-content:space-between;"><span class="q-num">${i+1}.</span><span style="display:flex;gap:4px;">${itemsHtml}</span><span class="ans-box" data-omr="${qid}-pos" style="width:60px;"></span></div>`;

/* ---- 33 Section C: Complete the pattern table (equal groups / repeated addition / multiplication / total) ---- */
GENERATORS['multiplication-pattern-table'] = (p,subIdx,qc,sid,sname) => {
  const factor = p.factor || 4;
  const maxRows = p.maxRows || 4;
  const showPictures = !!p.showPictures;
  let bodyRows='', answers=[];
  const theme = randomTheme();
  const ic = themeIcon(theme);
  for(let r=1;r<=maxRows;r++){
    const total = factor*r;
    const repAdd = Array.from({length:r}).fill(factor).join(' + ');
    const multExpr = `${r} &times; ${factor}`;
    const picsHtml = showPictures ? Array.from({length:r}).map(()=>iconRow(ic,factor,16)).join(' ') : null;

    // Row 1 is fully solved (worked example). Every row after that has at least one blank column.
    let blankRepAdd=false, blankMult=false, blankTotal=false;
    if(r===1){
      // fully solved, no blanks
    } else {
      // exactly one blank column per row
      const chosen = pick(['repadd','mult','total']);
      blankRepAdd = chosen==='repadd';
      blankMult = chosen==='mult';
      blankTotal = chosen==='total';
    }

    const qidsForRow=[];
    function cellHtml(isBlank, val, kind){
      if(!isBlank) return `<td style="border:1px solid var(--line);padding:8px;text-align:center;">${val}</td>`;
      const qid=qidOf(qc);
      qidsForRow.push({qid,kind});
      return `<td style="border:1px solid var(--line);padding:8px;text-align:center;" data-omr="${qid}-${kind}"></td>`;
    }
    let rowHtml = '<tr>';
    if(showPictures) rowHtml += `<td style="border:1px solid var(--line);padding:8px;text-align:center;">${picsHtml}</td>`;
    rowHtml += cellHtml(blankRepAdd, repAdd, 'repadd');
    rowHtml += cellHtml(blankMult, multExpr, 'mult');
    rowHtml += cellHtml(blankTotal, String(total), 'total');
    rowHtml += '</tr>';
    bodyRows += rowHtml;
    qidsForRow.forEach(q=>{
      const correct = q.kind==='total' ? total : (q.kind==='repadd' ? repAdd : multExpr);
      answers.push(makeAnsItem(q.qid,sid,sname,answers.length+1,'fill-blank',correct,`${q.kind} value written in table cell`,ICR_DETECT_MAP['fill-blank']));
    });
  }
  const headerCells = (showPictures? '<th style="border:1px solid var(--line);padding:6px;background:#eef2fb;">Equal Groups</th>':'')
    + '<th style="border:1px solid var(--line);padding:6px;background:#eef2fb;">Repeated Addition</th>'
    + '<th style="border:1px solid var(--line);padding:6px;background:#eef2fb;">Multiplication</th>'
    + '<th style="border:1px solid var(--line);padding:6px;background:#eef2fb;">Total</th>';
  const html = `<p class="instr">Complete the pattern.</p>
    <table style="border-collapse:collapse;width:100%;"><tr>${headerCells}</tr>${bodyRows}</table>`;
  return {html, answers};
};

/* ---- 52 Section B: Follow the Route ---- */
function buildRouteMap(gridSize, steps, cellSize){
  const dirsPool=['North','South','East','West'];
  let x=Math.floor(gridSize/2), y=Math.floor(gridSize/2);
  let moves=[]; const path=[{x,y}];
  for(let s=0;s<steps;s++){
    const candidates = dirsPool.filter(d=>{
      let nx=x, ny=y;
      if(d==='North') ny--; else if(d==='South') ny++; else if(d==='East') nx++; else nx--;
      return nx>=0&&nx<gridSize&&ny>=0&&ny<gridSize;
    });
    const d = pick(candidates);
    if(d==='North') y--; else if(d==='South') y++; else if(d==='East') x++; else x--;
    moves.push(d); path.push({x,y});
  }
  const start = path[0], end = path[path.length-1];
  const [startLandmark, endLandmark] = sample(MAP_LANDMARK_POOL,2);
  const placements = [{...start,...startLandmark},{...end,...endLandmark}];
  const gridHtml = wrapGridWithCompass(mapGridHtml(gridSize, placements, cellSize));
  return {gridHtml, moves, startLabel:startLandmark.label, endLabel:endLandmark.label};
}

/* ---- 52 Section C: Shortest Path ---- */
GENERATORS['map-shortest-path'] = (p,subIdx,qc,sid,sname) => {
  const n = p.n || 5;
  const gridSize = p.gridSize || 5;
  const cellSize = p.cellSize || 42;
  let rows='', answers=[];
  for(let i=0;i<n;i++){
    const qid=qidOf(qc);
    let ax=ri(0,gridSize-1), ay=ri(0,gridSize-1), bx=ri(0,gridSize-1), by=ri(0,gridSize-1);
    while(ax===bx&&ay===by){ bx=ri(0,gridSize-1); by=ri(0,gridSize-1); }
    const [la,lb] = sample(MAP_LANDMARK_POOL,2);
    const placements=[{x:ax,y:ay,...la},{x:bx,y:by,...lb}];
    const gridHtml = wrapGridWithCompass(mapGridHtml(gridSize, placements, cellSize));
    const steps = Math.abs(ax-bx)+Math.abs(ay-by);
    rows += `<div style="margin-bottom:18px;border:1px solid var(--line);border-radius:8px;padding:10px;">
      <div>${gridHtml}</div>
      <p class="q-row" style="margin-top:8px;"><span class="q-num">${i+1}.</span>Find the shortest path (moving only up, down, left or right) from the <b>${esc(la.label)}</b> to the <b>${esc(lb.label)}</b>. Steps = <span class="ans-box" data-omr="${qid}-ans"></span></p>
    </div>`;
    answers.push(makeAnsItem(qid,sid,sname,i+1,'fill-blank',steps,'number of steps written in box',ICR_DETECT_MAP['fill-blank']));
  }
  return {html:`<p class="instr">Observe the map and identify the shortest route.</p><div>${rows}</div>`, answers};
};

/* ---- 52.2 Section B: Locate Objects (2-landmark simple version) ---- */
GENERATORS['map-locate-objects-simple'] = (p,subIdx,qc,sid,sname) => {

  const cellSize = p.cellSize || 46;
  let rows='', answers=[];
  for(let i=0;i<n;i++){
    const qid=qidOf(qc);

    let ax,ay,bx,by;
    if(axis==='row'){ ay=by=ri(0,gridSize-1); ax=ri(0,gridSize-1); do{ bx=ri(0,gridSize-1); }while(bx===ax); }
    else { ax=bx=ri(0,gridSize-1); ay=ri(0,gridSize-1); do{ by=ri(0,gridSize-1); }while(by===ay); }
    const [la,lb] = sample(MAP_LANDMARK_POOL,2);

/* ---- 43 Section A: Ruler + Scale + Jar reading, worksheet-style ---- */
GENERATORS['measuring-tool-mixed'] = (p,subIdx,qc,sid,sname) => {
  const rulerCount = p.rulerCount!==undefined ? p.rulerCount : 3;
  const scaleCount = p.scaleCount!==undefined ? p.scaleCount : 1;
  const jarCount = p.jarCount!==undefined ? p.jarCount : 1;
  const maxCm = p.maxCm || 15;
  const iconPool = p.iconPool || ['paperclip','pencil','key','crayon','sharpener'];
  const rulerWidth = p.rulerWidth || 480;
  const unitW = rulerWidth/maxCm;
  const letters=['a','b','c','d','e','f','g','h','i','j'];
  let idx=0, rows='', answers=[];

  for(let i=0;i<rulerCount;i++){
    const qid=qidOf(qc);
    const ic = iconPool[i % iconPool.length];
    const len = ri(p.minLen||2, Math.min(maxCm-2, p.maxLen||(maxCm-3)));
    const objPx = len*unitW;
    const ticks = Array.from({length:maxCm+1}).map((_,t)=>`<div style="position:absolute;left:${t*unitW}px;top:0;transform:translateX(-50%);text-align:center;">
      <div style="font-size:11px;">${t}</div>
      <div style="border-left:1.5px solid var(--ink);height:12px;margin:0 auto;width:0;"></div>
    </div>`).join('');
    rows += `<div style="margin-bottom:22px;">
      <div class="q-num" style="margin-bottom:4px;">${idx+1}.</div>
      <div style="position:relative;width:${rulerWidth}px;">
        <div style="position:relative;height:14px;margin-bottom:2px;">${measureBracketSVG(objPx,12)}</div>
        <div style="height:48px;">${measureIcon(ic,objPx,48)}</div>
      </div>
      <div style="position:relative;height:30px;border:1.5px solid var(--ink);border-radius:4px;width:${rulerWidth}px;margin-top:2px;">${ticks}</div>
      <div style="font-size:10px;margin-top:1px;">cm</div>
      <div style="border-bottom:1.5px solid var(--ink);width:220px;height:20px;margin-top:20px;" data-omr="${qid}-ans"></div>
    </div>`;
    answers.push(makeAnsItem(qid,sid,sname,idx+1,'fill-blank',len,'measured length in cm written on the blank line',ICR_DETECT_MAP['fill-blank']));
    idx++;
  }

  for(let i=0;i<scaleCount;i++){
    const qid=qidOf(qc);
    const maxKg = p.maxKg || 10;
    const val = ri(1,maxKg-1);
    rows += `<div style="margin-bottom:22px;">
      <div class="q-num" style="margin-bottom:4px;">${idx+1}.</div>
      ${scaleReadingSVG(val,maxKg,130)}
      <div>Weight = <span class="ans-box" data-omr="${qid}-ans" style="width:60px;"></span> kg</div>
    </div>`;
    answers.push(makeAnsItem(qid,sid,sname,idx+1,'fill-blank',val,'weight in kg written in box',ICR_DETECT_MAP['fill-blank']));
    idx++;
  }

  for(let i=0;i<jarCount;i++){
    const qid=qidOf(qc);
    const maxMl = p.maxMl || 500;
    const step = maxMl/5;
    const val = step*ri(1,4);
    rows += `<div style="margin-bottom:22px;">
      <div class="q-num" style="margin-bottom:4px;">${idx+1}.</div>
      ${jarReadingSVG(val,maxMl,140)}
      <div>Reading = <span class="ans-box" data-omr="${qid}-ans" style="width:60px;"></span> mL</div>
    </div>`;
    answers.push(makeAnsItem(qid,sid,sname,idx+1,'fill-blank',val,'reading in mL written in box',ICR_DETECT_MAP['fill-blank']));
    idx++;
  }

  return {html:`<p class="instr">Measure/read each tool shown. Round to the nearest mark where needed.</p><div>${rows}</div>`, answers};
};

/* ---- 43 Section: Simple unit conversions (fill in box) ---- */
GENERATORS['unit-conversion-fill'] = (p,subIdx,qc,sid,sname) => {
  const n = p.n || 5;
  const types = p.types || ['cm-m','m-cm','g-kg','kg-g','ml-l','l-ml'];
  let rows='', answers=[];
  for(let i=0;i<n;i++){
    const qid=qidOf(qc);
    const t = types[i % types.length];
    let left, right, ans;
    if(t==='cm-m'){ const m=ri(1,9); left=`${m*100} cm`; right='m'; ans=m; }
    else if(t==='m-cm'){ const m=ri(1,9); left=`${m} m`; right='cm'; ans=m*100; }
    else if(t==='g-kg'){ const k=ri(1,9); left=`${k*1000} g`; right='kg'; ans=k; }
    else if(t==='kg-g'){ const k=ri(1,9); left=`${k} kg`; right='g'; ans=k*1000; }
    else if(t==='ml-l'){ const l=ri(1,9); left=`${l*1000} mL`; right='L'; ans=l; }
    else { const l=ri(1,9); left=`${l} L`; right='mL'; ans=l*1000; }
    rows += `<div class="q-row"><span class="q-num">${i+1}.</span><b>${left} =</b> <span class="ans-box" data-omr="${qid}-ans"></span> <b>${right}</b></div>`;
    answers.push(makeAnsItem(qid,sid,sname,i+1,'fill-blank',ans,'value written in box',ICR_DETECT_MAP['fill-blank']));
  }
  return {html:`<p class="instr">Fill in the missing value to complete each conversion.</p><div class="q-list">${rows}</div>`, answers};
};

/* ---- 43 Section: Compare measurements across units (symbol box) ---- */
GENERATORS['measurement-compare-units'] = (p,subIdx,qc,sid,sname) => {
  const n = p.n || 5;
  const types = p.types || ['length','weight','capacity'];
  let rows='', answers=[];
  for(let i=0;i<n;i++){
    const qid=qidOf(qc);
    const t = types[i % types.length];
    let a,b;
    if(t==='length'){ a={val:ri(20,180),unit:'cm',base:0}; a.base=a.val; b={val:ri(1,3),unit:'m',base:0}; b.base=b.val*100; }
    else if(t==='weight'){ a={val:ri(1,5),unit:'kg',base:0}; a.base=a.val*1000; b={val:ri(500,4500),unit:'g',base:0}; b.base=b.val; }
    else { a={val:ri(1,3),unit:'L',base:0}; a.base=a.val*1000; b={val:ri(200,2500),unit:'mL',base:0}; b.base=b.val; }
    if(Math.random()<0.5){ const tmp=a; a=b; b=tmp; }
    const symbol = a.base>b.base?'>':(a.base<b.base?'<':'=');
    rows += `<div class="q-row"><span class="q-num">${i+1}.</span><b>${a.val} ${a.unit}</b> <span class="ans-box" data-omr="${qid}-sym" style="width:30px;height:26px;"></span> <b>${b.val} ${b.unit}</b></div>`;
    answers.push(makeAnsItem(qid,sid,sname,i+1,'fill-blank',symbol,'symbol written in box',ICR_DETECT_MAP['fill-blank']));
  }
  return {html:`<p class="instr">Compare. Write &lt;, &gt; or = in the box.</p><div class="q-list">${rows}</div>`, answers};
};

function levelSublevelIds(level){
  if(level.subs===1) return [level.id+'.0'];
  return Array.from({length:level.subs},(_,i)=>level.id+'.'+i);
}

/* =========================================================
   ASSEMBLY
   ========================================================= */
const PDF_PAGE_W_MM=210, PDF_PAGE_H_MM=297, PDF_MARGIN_MM=10;
const PDF_SIDE_MM=PDF_MARGIN_MM;
const PDF_CONTENT_W=PDF_PAGE_W_MM-2*PDF_MARGIN_MM, PDF_CONTENT_H=PDF_PAGE_H_MM-2*PDF_MARGIN_MM;

function pageIdStamp(setNum,total){
  return `<div class="footer-stamp">SET-${String(setNum).padStart(5,'0')}${total?(' / '+total):''}</div>`;
}
function regSquares(){
  return `<div class="reg-sq tl"></div><div class="reg-sq tr"></div><div class="reg-sq bl"></div><div class="reg-sq br"></div>`;
}
const HEADER_OVERRIDES = {
  '34.0': {title:'SCHOOL SUPPLIES', subtitle:'MEASURING ACTIVITY', instr:'Measure the school supplies below and write the number!'},
  '34.1': {title:'MEASURING OBJECTS', subtitle:'WITH PAPER CLIPS', instr:'Measure each object using paper clips and write the number.'},
  '34.2': {title:'LENGTH, WEIGHT & CAPACITY', subtitle:'COMPARISON ACTIVITY', instr:'Circle the correct answer for each question.'}
};

function buildWorksheet(levelId, subIdx, setNum, totalForStamp){
  const level = LEVELS.find(l=>l.id===levelId);
  const subIds = levelSublevelIds(level);
  const sublevelId = subIds[subIdx];
  const secsDesc = level.build(subIdx);
  const qc = {n:1};
  let sectionsHtml=[], allAnswers=[];
  secsDesc.forEach((sd,idx)=>{
    const sectionId = 'S'+String(idx+1).padStart(2,'0');
    const gen = GENERATORS[sd.type];
    if(!gen){ return; }
    const {html, answers} = gen(sd.params, subIdx, qc, sectionId, sd.name);
    sectionsHtml.push(sectionWrap(sectionId, sd.letter+'. '+sd.name, html));
    answers.forEach(a=>{ a.sectionId=a.sectionId||sectionId; a.sectionName=a.sectionName||sd.name; allAnswers.push(a); });
  });
  const hOverride = HEADER_OVERRIDES[sublevelId];
  const headerHtml = hOverride ? `
    <div class="worksheet-header-full">
      <div class="wh-topline"><span>Name: _______________________</span><span>Date: _______________________</span></div>
      <h1 class="wh-title">${esc(hOverride.title)}</h1>
      <div class="wh-subtitle">${esc(hOverride.subtitle)}</div>
      <p class="wh-instr">${esc(hOverride.instr)}</p>
    </div>` :
    `<div class="page-header"><h1>Level ${level.id}: ${esc(level.title)}</h1><span class="sub">Sublevel ${sublevelId} &middot; Set ${setNum}</span></div>`;

  const pageHtml = `<div class="page-wrapper" data-level="${level.id}" data-sublevel="${sublevelId}" data-setnum="${setNum}">
    ${regSquares()}
    <div class="omr-overlay-layer"></div>
    ${headerHtml}
    ${sectionsHtml.join('')}
    ${pageIdStamp(setNum, totalForStamp)}
  </div>`;
  const ctx = {levelId:level.id, levelTitle:level.title, sublevelId, slug:level.slug};
  const answerKey = buildAnswerKeyForSet(setNum, allAnswers, ctx);
  return {html:pageHtml, answerKey, meta:{levelId:level.id, title:level.title, slug:level.slug, sublevelId, setNum}};
}

/* =========================================================
   GENERATE / STATE MANAGEMENT
   ========================================================= */
function yieldToBrowser(){ return new Promise(r=>setTimeout(r,0)); }

/* Builds one worksheet+key and pushes it. Kept sync — cheap per call. */
function generateOneSet(levelId, subIdx){
  const setNum = worksheetHTMLs.length+1;
  const {html, answerKey, meta:m} = buildWorksheet(levelId, subIdx, setNum, null);
  worksheetHTMLs.push(html);
  answerKeys.push(answerKey);
  meta.push(m);
}

/* Async, chunked generation — yields to the browser every few sets so the
   tab stays responsive and the status text keeps updating. */
async function generateLevelAsync(levelId, setsPerSub, onProgress){
  const level = LEVELS.find(l=>l.id===levelId);
  const subIds = levelSublevelIds(level);
  let done=0;
  for(let subIdx=0; subIdx<subIds.length; subIdx++){
    for(let k=0;k<setsPerSub;k++){
      generateOneSet(levelId, subIdx);
      done++;
      if(done % 2 === 0){
        if(onProgress) onProgress(done);
        await yieldToBrowser();
      }
    }
  }
  if(onProgress) onProgress(done);
}

async function generateAllLevelsAsync(setsPerSub, onProgress){
  for(let li=0; li<LEVELS.length; li++){
    const level = LEVELS[li];
    await generateLevelAsync(level.id, setsPerSub, (doneInLevel)=>{
      if(onProgress) onProgress(li+1, LEVELS.length, level, worksheetHTMLs.length);
    });
    await yieldToBrowser();
  }
}

/* All generated indices for one specific level+sublevel, in the order they
   were created (i.e. per-sublevel set numbering: 1st created = set #1). */
function getSublevelIndices(levelId, sublevelId){
  const indices=[];
  meta.forEach((m,i)=>{ if(m.levelId===levelId && m.sublevelId===sublevelId) indices.push(i); });
  return indices;
}

/* Generates more sets for one specific sublevel (only), until it has at
   least targetCount sets. Yields periodically so the tab stays responsive. */
async function ensureSublevelSetCount(levelId, subIdx, sublevelId, targetCount, onProgress){
  let indices = getSublevelIndices(levelId, sublevelId);
  let createdSinceYield = 0;
  while(indices.length < targetCount){
    generateOneSet(levelId, subIdx);
    indices = getSublevelIndices(levelId, sublevelId);
    createdSinceYield++;
    if(createdSinceYield % 2 === 0){
      if(onProgress) onProgress(indices.length, targetCount);
      await yieldToBrowser();
    }
  }
  if(onProgress) onProgress(indices.length, targetCount);
  return indices;
}

/* =========================================================
   PDF EXPORT
   ========================================================= */
function makeHiddenContainer(html){
  const div=document.createElement('div');
  div.style.position='fixed'; div.style.left='-9999px'; div.style.top='0';
  div.innerHTML=html;
  document.body.appendChild(div);
  return div;
}
async function renderEl(el, targetWidthMM){
  const canvas = await html2canvas(el, {scale:2, backgroundColor:'#ffffff'});
  const widthMM = targetWidthMM || PDF_CONTENT_W;
  const heightMM = canvas.height * (widthMM/canvas.width);
  return {canvas, heightMM, widthMM};
}
async function buildPdfBlob(idx){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p','mm','a4');
  const container = makeHiddenContainer(worksheetHTMLs[idx]);
  const wrapper = container.querySelector('.page-wrapper');
  wrapper.style.width='794px';
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
  const sectionEls = Array.from(wrapper.querySelectorAll('.section'));
  const headerEl = wrapper.querySelector('.page-header');
  let y = PDF_MARGIN_MM;
  let first=true;
  const {canvas:hc, heightMM:hh} = await renderEl(headerEl, PDF_CONTENT_W);
  pdf.addImage(hc.toDataURL('image/png'),'PNG',PDF_MARGIN_MM,y,PDF_CONTENT_W,hh);
  y += hh + 3;
  for(const el of sectionEls){
    const {canvas, heightMM} = await renderEl(el, PDF_CONTENT_W);
    let hMM = heightMM, wMM = PDF_CONTENT_W;
    if(hMM > PDF_CONTENT_H - PDF_MARGIN_MM){ const scale=(PDF_CONTENT_H-PDF_MARGIN_MM)/hMM; hMM*=scale; wMM*=scale; }
    if(y + hMM > PDF_PAGE_H_MM - PDF_MARGIN_MM){ pdf.addPage(); y = PDF_MARGIN_MM; }
    pdf.addImage(canvas.toDataURL('image/png'),'PNG',PDF_MARGIN_MM,y,wMM,hMM);
    y += hMM + 4;
    first=false;
  }
  const setNum = idx+1;
  pdf.setFontSize(7);
  pdf.text(`SET-${String(setNum).padStart(5,'0')}`, PDF_PAGE_W_MM-30, PDF_PAGE_H_MM-6);
  document.body.removeChild(container);
  return pdf.output('blob');
}

/* =========================================================
   OMR / COORDS
   ========================================================= */
function showOMROverlay(wsDiv){
  const layer = wsDiv.querySelector('.omr-overlay-layer');
  if(!layer) return;
  layer.innerHTML='';
  const wrapRect = wsDiv.getBoundingClientRect();
  wsDiv.querySelectorAll('[data-omr]').forEach(el=>{
    const r = el.getBoundingClientRect();
    const box=document.createElement('div');
    box.className='omr-box';
    box.style.left=(r.left-wrapRect.left)+'px';
    box.style.top=(r.top-wrapRect.top)+'px';
    box.style.width=r.width+'px';
    box.style.height=r.height+'px';
    const label=document.createElement('div');
    label.className='omr-label';
    label.textContent=el.getAttribute('data-omr');
    box.appendChild(label);
    layer.appendChild(box);
  });
  wsDiv.classList.add('omr-on');
}
function removeOMROverlay(wsDiv){
  const layer = wsDiv.querySelector('.omr-overlay-layer');
  if(layer) layer.innerHTML='';
  wsDiv.classList.remove('omr-on');
}
function captureCoords(pageEl){
  const wrapper = pageEl.classList && pageEl.classList.contains('page-wrapper') ? pageEl : pageEl.querySelector('.page-wrapper');
  if(!wrapper) return null;
  const wrapRect = wrapper.getBoundingClientRect();
  const pxToMM = PDF_PAGE_W_MM / wrapRect.width;
  const registrationSquares = {};
  wrapper.querySelectorAll('.reg-sq').forEach(sq=>{
    const r=sq.getBoundingClientRect();
    const pos = sq.classList.contains('tl')?'tl':sq.classList.contains('tr')?'tr':sq.classList.contains('bl')?'bl':'br';
    registrationSquares[pos]={x_mm:+((r.left-wrapRect.left)*pxToMM).toFixed(2), y_mm:+((r.top-wrapRect.top)*pxToMM).toFixed(2)};
  });
  const answerRegions=[];
  wrapper.querySelectorAll('[data-omr]').forEach(el=>{
    const r=el.getBoundingClientRect();
    answerRegions.push({
      omr: el.getAttribute('data-omr'),
      x_mm:+((r.left-wrapRect.left)*pxToMM).toFixed(2),
      y_mm:+((r.top-wrapRect.top)*pxToMM).toFixed(2),
      w_mm:+((r.width)*pxToMM).toFixed(2),
      h_mm:+((r.height)*pxToMM).toFixed(2)
    });
  });
  return {registrationSquares, answerRegions};
}

/* =========================================================
   EXPORT HELPERS
   ========================================================= */
function downloadBlob(content, mime, filename){
  const blob = content instanceof Blob ? content : new Blob([content],{type:mime});
  const url = URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 500);
}

/* Clean, ICR-matching-friendly answer key JSON for one set.
   `questionId` (e.g. "Q0007") is the prefix used on every data-omr box
   for that question, so the ICR pipeline can locate all boxes for a
   question, read them, and diff against `answer`. */
function buildCleanAnswerKey(ak){
  return {
    setId: `L${ak.level}_${ak.slug}_set${String(ak.set).padStart(5,'0')}`,
    level: ak.level,
    levelTitle: ak.levelTitle,
    sublevel: ak.sublevel,
    setNumber: ak.set,
    generatedAt: ak.generatedAt,
    totalQuestions: ak.items.length,
    answers: ak.items.map(it=>({
      questionId: it.questionId,
      section: it.sectionId,
      sectionName: it.sectionName,
      questionNumber: it.questionNo,
      type: it.answerType,
      answer: it.correctAnswer,
      expectedMark: it.icrNote
    }))
  };
}

/* Renders a set off-screen just to capture its data-omr box coordinates
   (mm, relative to the page), for matching against a scanned sheet. */
async function captureCoordsForIndex(idx){
  const container = makeHiddenContainer(worksheetHTMLs[idx]);
  const wrapper = container.querySelector('.page-wrapper');
  wrapper.style.width='794px';
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
  const coords = captureCoords(wrapper);
  document.body.removeChild(container);
  return coords;
}

/* Core export: builds ONE zip containing, for every requested set index,
   a folder with worksheet.pdf + answer_key.json + coords.json, plus a
   top-level manifest.json. Large exports are split into multiple zip
   parts automatically. */
async function exportSetsAsZip(indices, zipBaseName){
  if(!indices.length){ setStatus('No sets to export.'); return; }
  const chunkSize = 250;
  const chunks = Math.ceil(indices.length/chunkSize);
  const t0 = Date.now();
  for(let c=0;c<chunks;c++){
    const zip = new JSZip();
    const from = c*chunkSize, to = Math.min(indices.length, from+chunkSize);
    const subset = indices.slice(from,to);
    const manifest = [];
    for(let k=0;k<subset.length;k++){
      const idx = subset[k];
      const m = meta[idx];
      const folderName = `set_${String(idx+1).padStart(5,'0')}_L${m.levelId}_${m.sublevelId}`;
      setStatus(`Building ${folderName} (${k+1}/${subset.length}) — zip ${c+1}/${chunks}...`);
      const pdfBlob = await buildPdfBlob(idx);
      const coords = await captureCoordsForIndex(idx);
      const cleanKey = buildCleanAnswerKey(answerKeys[idx]);
      zip.file(`${folderName}/worksheet.pdf`, pdfBlob);
      zip.file(`${folderName}/answer_key.json`, JSON.stringify(cleanKey, null, 2));
      zip.file(`${folderName}/coords.json`, JSON.stringify(coords, null, 2));
      manifest.push({folder:folderName, level:m.levelId, title:m.title, sublevel:m.sublevelId, setNumber:idx+1});
    }
    zip.file('manifest.json', JSON.stringify({generatedAt:new Date().toISOString(), count:subset.length, sets:manifest}, null, 2));
    setStatus(`Compressing zip ${c+1}/${chunks}...`);
    const blob = await zip.generateAsync({type:'blob'}, p=>setStatus(`Compressing zip ${c+1}/${chunks} — ${p.percent.toFixed(0)}%`));
    downloadBlob(blob, 'application/zip', `${zipBaseName}_part${c+1}_of_${chunks}.zip`);
  }
  setStatus(`Done — exported ${indices.length} set(s) (worksheet + answer key + coords) in ${chunks} zip file(s). Elapsed ${((Date.now()-t0)/1000).toFixed(1)}s`);
}

/* =========================================================
   UI WIRING
   ========================================================= */
function setStatus(msg){ document.getElementById('status').textContent = msg; }

function populateLevelSelect(){
  const sel = document.getElementById('levelSelect');
  sel.innerHTML = LEVELS.map(l=>`<option value="${l.id}">${l.id}. ${esc(l.title)}</option>`).join('');
}
function populateSublevelSelect(){

  const sel = document.getElementById('sublevelSelect');

}

function populateSubRangeSublevelSelect(){
  const levelId = +document.getElementById('levelSelect').value;
  const level = LEVELS.find(l=>l.id===levelId);
  const ids = levelSublevelIds(level);
  const sel = document.getElementById('subRangeSublevelSelect');
  sel.innerHTML = ids.map((id,idx)=>`<option value="${idx}">${id}</option>`).join('');
}
function refreshJumpSelect(){
  const sel = document.getElementById('jumpSelect');
  sel.innerHTML = meta.map((m,i)=>`<option value="${i}">#${i+1} — L${m.levelId} ${m.title} — ${m.sublevelId} — Set ${m.setNum}</option>`).join('');
  sel.value = currentSet;
  document.getElementById('countInfo').textContent = `${worksheetHTMLs.length} set(s) generated`;
}
function renderCurrent(){
  const el = document.getElementById('preview');
  if(worksheetHTMLs.length===0){ el.innerHTML='<p style="color:#888;padding:40px;">No sets generated yet. Choose a level and click "Generate This Level".</p>'; return; }
  currentSet = Math.max(0, Math.min(currentSet, worksheetHTMLs.length-1));
  el.innerHTML = worksheetHTMLs[currentSet];
  omrOverlayActive = false;
  refreshJumpSelect();
  document.getElementById('fromSetInput').value = currentSet+1;
  document.getElementById('toSetInput').value = currentSet+1;
}
function currentPageWrapper(){
  return document.querySelector('#preview .page-wrapper');
}

document.getElementById('levelSelect').addEventListener('change', ()=>{ populateSublevelSelect(); populateSubRangeSublevelSelect(); });

document.getElementById('btnGenerateLevel').addEventListener('click', async ()=>{
  const levelId = +document.getElementById('levelSelect').value;
  const setsPerSub = Math.max(1, +document.getElementById('setsPerSub').value || 1);
  const btn = document.getElementById('btnGenerateLevel');
  const btnAll = document.getElementById('btnGenerateAll');
 btn.disabled = true; btnAll.disabled = true;
  const startCount = worksheetHTMLs.length;
  try{
    await generateLevelAsync(levelId, setsPerSub, (done)=>{
      setStatus(`Generating Level ${levelId}... ${done} set(s) so far.`);
    });
    currentSet = startCount;
    renderCurrent();
    setStatus(`Generated Level ${levelId} — ${worksheetHTMLs.length - startCount} new set(s). Total: ${worksheetHTMLs.length}.`);
  } finally {
    btn.disabled = false; btnAll.disabled = false;
  }
});

document.getElementById('btnGenerateAll').addEventListener('click', async ()=>{
  const setsPerSub = Math.max(1, +document.getElementById('setsPerSub').value || 1);
  const btn = document.getElementById('btnGenerateAll');
  const btnOne = document.getElementById('btnGenerateLevel');
  btn.disabled = true; btnOne.disabled = true;
  const startCount = worksheetHTMLs.length;
  try{
    await generateAllLevelsAsync(setsPerSub, (levelsDone, totalLevels, level, totalSets)=>{
      setStatus(`Generating all levels... ${levelsDone}/${totalLevels} levels done (L${level.id}: ${level.title}) — ${totalSets} sets so far.`);
    });
    currentSet = startCount;
    renderCurrent();
    setStatus(`Generated ALL 59 levels — ${worksheetHTMLs.length} total sets.`);
  } finally {
    btn.disabled = false; btnOne.disabled = false;
  }
});

document.getElementById('btnPrev').addEventListener('click', ()=>{ currentSet--; renderCurrent(); });
document.getElementById('btnNext').addEventListener('click', ()=>{ currentSet++; renderCurrent(); });
document.getElementById('jumpSelect').addEventListener('change', (e)=>{ currentSet=+e.target.value; renderCurrent(); });

document.getElementById('btnPrint').addEventListener('click', ()=>{ window.print(); });

document.getElementById('btnViewKey').addEventListener('click', ()=>{
  if(!answerKeys[currentSet]){ setStatus('No answer key for current set.'); return; }
  const ak = answerKeys[currentSet];
  const body = document.getElementById('ansKeyBody');
  body.innerHTML = `<p style="font-size:12px;color:var(--muted);">Level ${ak.level} — Sublevel ${ak.sublevel} — Set ${ak.set}</p>
    <table><thead><tr><th>#</th><th>Section</th><th>Type</th><th>Answer</th><th>ICR</th></tr></thead><tbody>
    ${ak.items.map(it=>`<tr><td>${it.questionNo}</td><td>${esc(it.sectionName)}</td><td>${esc(it.answerType)}</td><td>${esc(typeof it.correctAnswer==='object'?JSON.stringify(it.correctAnswer):it.correctAnswer)}</td><td>${esc(it.icrNote)}</td></tr>`).join('')}
    </tbody></table>`;
  document.getElementById('ansKeyPanel').style.display='block';
});
document.getElementById('btnCloseKey').addEventListener('click', ()=>{ document.getElementById('ansKeyPanel').style.display='none'; });

document.getElementById('btnToggleOMR').addEventListener('click', ()=>{
  const wrap = currentPageWrapper();
  if(!wrap) return;
  omrOverlayActive = !omrOverlayActive;
  if(omrOverlayActive) showOMROverlay(wrap); else removeOMROverlay(wrap);
});

/* --- Download: range --- */
document.getElementById('btnDownloadRange').addEventListener('click', async ()=>{
  if(worksheetHTMLs.length===0){ setStatus('Generate some sets first.'); return; }
  const fromRaw = Math.max(1, +document.getElementById('fromSetInput').value || 1);
  const toRaw = Math.max(fromRaw, +document.getElementById('toSetInput').value || fromRaw);
  const to = Math.min(toRaw, worksheetHTMLs.length);
  const from = Math.min(fromRaw, to);
  const indices = [];
  for(let i=from-1;i<=to-1;i++) indices.push(i);
  await exportSetsAsZip(indices, `fln_sets_${from}_to_${to}`);
});

/* --- Download: current set only --- */
document.getElementById('btnDownloadCurrent').addEventListener('click', async ()=>{
  if(!worksheetHTMLs[currentSet]){ setStatus('No current set to download.'); return; }
  await exportSetsAsZip([currentSet], `fln_set_${currentSet+1}`);
});

/* --- Download: ALL sublevels of the selected level together (explicit only) --- */
document.getElementById('btnDownloadLevel').addEventListener('click', async ()=>{
  const levelId = +document.getElementById('levelSelect').value;
  const level = LEVELS.find(l=>l.id===levelId);
  const setsPerSub = Math.max(1, +document.getElementById('setsPerSub').value || 1);
  const btn = document.getElementById('btnDownloadLevel');
  btn.disabled = true;
  try{
    setStatus(`Preparing all sublevels of Level ${levelId}...`);
    await generateLevelAsync(levelId, setsPerSub, (done)=>{
      setStatus(`Generating Level ${levelId}... ${done} set(s) so far.`);
    });
    const indices = [];
    meta.forEach((m,i)=>{ if(m.levelId===levelId) indices.push(i); });
    refreshJumpSelect();
    await exportSetsAsZip(indices, `fln_L${levelId}_${level.slug}_all_sublevels`);
  } finally {
    btn.disabled = false;
  }
});

/* --- Download: everything generated so far --- */
document.getElementById('btnDownloadAll').addEventListener('click', async ()=>{
  if(worksheetHTMLs.length===0){ setStatus('Generate some sets first.'); return; }
  await exportSetsAsZip(Array.from({length:worksheetHTMLs.length},(_,i)=>i), 'fln_all_generated_sets');
});

/* --- Download: pick specific sets --- */
function renderMultiSelectList(){
  document.getElementById('multiSelectList').innerHTML = meta.map((m,i)=>`<label style="display:flex;align-items:center;gap:6px;"><input type="checkbox" class="msChk" value="${i}"> #${i+1} — L${m.levelId} ${m.title} — ${m.sublevelId} — Set ${m.setNum}</label>`).join('');
}
document.getElementById('btnMultiSelect').addEventListener('click', ()=>{ renderMultiSelectList(); document.getElementById('multiSelectPanel').style.display='block'; });
document.getElementById('btnCloseMultiSelect').addEventListener('click', ()=>{ document.getElementById('multiSelectPanel').style.display='none'; });
document.getElementById('btnSelectAllSets').addEventListener('click', ()=>{ document.querySelectorAll('.msChk').forEach(c=>c.checked=true); });
document.getElementById('btnSelectNoneSets').addEventListener('click', ()=>{ document.querySelectorAll('.msChk').forEach(c=>c.checked=false); });
document.getElementById('btnDownloadSelectedZip').addEventListener('click', async ()=>{
  const indices = Array.from(document.querySelectorAll('.msChk:checked')).map(c=>+c.value);
  await exportSetsAsZip(indices, 'fln_selected_sets');
});

/* --- Download: an exact numbered range within ONE specific sublevel,
   auto-generating any missing sets in that range first. --- */
document.getElementById('btnDownloadSublevelRange').addEventListener('click', async ()=>{
  const levelId = +document.getElementById('levelSelect').value;
  const level = LEVELS.find(l=>l.id===levelId);
  const subIdx = +document.getElementById('subRangeSublevelSelect').value;
  const subIds = levelSublevelIds(level);
  const sublevelId = subIds[subIdx];

  const from = Math.max(1, +document.getElementById('subFromInput').value || 1);
  const to = Math.max(from, +document.getElementById('subToInput').value || from);

  const btn = document.getElementById('btnDownloadSublevelRange');
  btn.disabled = true;
  try{
    setStatus(`Checking existing sets for ${sublevelId}...`);

    const indices = await ensureSublevelSetCount(levelId, subIdx, sublevelId, to, (have,target)=>{
      setStatus(`Generating ${sublevelId}: ${have}/${target} sets ready...`);
    });

    if(document.getElementById('preview').children.length===0){
      currentSet = indices[0];
      renderCurrent();
    } else {
      refreshJumpSelect();
    }

    const rangeIndices = indices.slice(from-1, to);
    await exportSetsAsZip(rangeIndices, `fln_L${levelId}_${sublevelId}_sets${from}_to_${to}`);
  } finally {
    btn.disabled = false;
  }
});

/* boot */
populateLevelSelect();
populateSublevelSelect();
populateSubRangeSublevelSelect();

// Parse URL query parameters to auto-select and auto-generate student level
const params = new URLSearchParams(window.location.search);
const pLevel = params.get('level');
const pSub = params.get('sub');
if (pLevel) {
  const levelSelect = document.getElementById('levelSelect');
  if (levelSelect) {
    levelSelect.value = pLevel;
    populateSublevelSelect();
    populateSubRangeSublevelSelect();
    
    const subIdx = pSub ? Number(pSub) : 0;
    const subSelect = document.getElementById('sublevelSelect');
    if (subSelect) subSelect.value = String(subIdx);
    const subRangeSelect = document.getElementById('subRangeSublevelSelect');
    if (subRangeSelect) subRangeSelect.value = String(subIdx);
    
    // Auto-generate 1 set of this level so it displays immediately
    generateOneSet(Number(pLevel), subIdx);
  }
}

renderCurrent();

/* expose global API */
window.activateSet = (i)=>{ currentSet=i; renderCurrent(); };
window.captureCoords = captureCoords;
window.worksheetHTMLs = worksheetHTMLs;
window.answerKeys = answerKeys;

function generateSetsForLevelAndSublevel(levelId, subIdx, count) {
  worksheetHTMLs.length = 0;
  answerKeys.length = 0;
  meta.length = 0;
  for (let i = 0; i < count; i++) {
    generateOneSet(levelId, subIdx);
  }
}
window.generateSetsForLevelAndSublevel = generateSetsForLevelAndSublevel;

function buildMasterJSON(start, end) {
  if (!answerKeys.length) return null;
  const s = Math.max(1, start || 1), e = Math.min(answerKeys.length, end || answerKeys.length);
  return {
    meta: { generated: new Date().toISOString(), totalSets: e-s+1, setsRange: `${s}-${e}` },
    sets: answerKeys.slice(s-1, e).map(buildCleanAnswerKey)
  };
}
window.buildMasterJSON = buildMasterJSON;

function buildCSV(start, end) {
  if (!answerKeys.length) return '';
  const s = Math.max(1, start || 1), e = Math.min(answerKeys.length, end || answerKeys.length);
  const rows = [['set','question','type','answer']];
  for (let i = s-1; i < e; i++) {
    const ak = answerKeys[i];
    const cleanKey = buildCleanAnswerKey(ak);
    cleanKey.answers.forEach(a => {
      rows.push([cleanKey.setNumber, a.questionId, a.type, a.answer]);
    });
  }
  return rows.map(r => r.map(v => String(v == null ? '' : v).replace(/[",\n]/g, m => `"${m}"`)).join(',')).join('\n');
}
window.buildCSV = buildCSV;
