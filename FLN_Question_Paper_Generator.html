<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#111;font-size:14px;}
#sidebar{position:fixed;left:0;top:0;bottom:0;width:270px;background:#1a1a2e;overflow-y:auto;z-index:100;}
#sidebar-header{background:#16213e;padding:14px 16px;border-bottom:2px solid #e94560;position:sticky;top:0;z-index:10;}

.lvl-btn:hover{background:#0f3460;color:#fff;}

#main{margin-left:270px;min-height:100vh;display:flex;flex-direction:column;}
#topbar{background:#fff;border-bottom:2px solid #ddd;padding:10px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:50;}
#topbar h2{font-size:13px;font-weight:700;flex:1;min-width:160px;color:#1a1a2e;}
.sl-tabs{display:flex;gap:5px;}

.sl-tab:hover{border-color:#e94560;color:#e94560;}

.vop{font-weight:800;}

.nl-wrap{display:flex;align-items:center;margin:5px 0;flex-wrap:wrap;gap:0;}

.mcq-opts{display:flex;gap:12px;flex-wrap:wrap;margin-top:3px;}
.mcq-o{font-size:11.5px;display:flex;align-items:center;gap:3px;}
.mcq-c{display:inline-block;width:13px;height:13px;border:1.5px solid #000;border-radius:50%;}

/* Match */
.match-wrap{display:flex;gap:30px;margin:5px 0;}
.match-col{flex:1;}
.match-item{display:flex;align-items:center;gap:6px;margin:4px 0;font-size:12px;}

/* Grid for objects */

/* Table */
.dtable{border-collapse:collapse;font-size:11.5px;margin:5px 0;}
.dtable th,.dtable td{border:1.5px solid #000;padding:4px 10px;text-align:center;}
.dtable th{background:#000;color:#fff;}

/* Pictograph row */
.prow{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:12px;}
.pname{min-width:60px;font-weight:700;}

/* Shape draw box */
.draw-box{border:1.5px dashed #888;width:80px;height:70px;display:inline-block;vertical-align:middle;margin:0 8px;font-size:9px;color:#aaa;display:inline-flex;align-items:center;justify-content:center;}

.pf{margin-top:14px;border-top:1.5px solid #000;padding-top:5px;font-size:10px;text-align:center;color:#666;}

#empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:#888;padding:40px;text-align:center;}

#spin{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center;}

.sbox{background:#fff;border-radius:10px;padding:26px 36px;text-align:center;}

@media print{
  #sidebar,#topbar,#infobar,.np{display:none!important;}
  #main{margin-left:0;}
  #paper-area{padding:0;background:#fff;}
  #pw{width:100%;}

<script>
// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[ri(0,arr.length-1)];}
function sh(arr){const r=[...arr];for(let i=r.length-1;i>0;i--){const j=ri(0,i);[r[i],r[j]]=[r[j],r[i]];}return r;}

// Generate N UNIQUE questions using a factory function
// factory(index) returns an object {key, html} 
// key is used to deduplicate
function makeUnique(factory, needed, maxTries){
  const used=new Set(), out=[];
  let tries=0;
  maxTries=maxTries||needed*30;
  while(out.length<needed && tries<maxTries){
    tries++;
    const q=factory();
    if(!used.has(q.key)){used.add(q.key);out.push(q);}
  }
  // If still not enough, relax dedup and fill
  while(out.length<needed){
    out.push(factory());
  }
  return out;
}

const FRUITS  =['🍎','🍊','🍋','🍇','🍓','🥭','🍌','🍑','🫐','🍈'];
const ANIMALS =['🐄','🐔','🐟','🐦','🐘','🐕','🐈','🦋','🐓','🐢'];
const OBJECTS =['📚','✏️','🎒','⭐','🌸','🌙','🏠','🎈','🪁','🎯'];
const VEGGIES =['🥕','🧅','🥦','🍅','🌽','🥔','🫛','🧄','🥒','🌶️'];
const SHAPES2D=['circle','square','triangle','rectangle','pentagon','hexagon','oval'];
const NAMES   =['Raju','Meena','Priya','Arjun','Deepa','Karan','Sita','Rahul','Ananya','Rohan','Kavya','Aarav','Tara','Mohan'];
const FOODS   =['mangoes','apples','laddoos','bananas','toffees','guavas','oranges','cookies','biscuits'];
const ITEMS   =['pencils','flowers','marbles','crayons','stickers','books','coins','balls','erasers'];

function pname(){return pick(NAMES);}
function picon(){return pick([...FRUITS,...ANIMALS,...OBJECTS,...VEGGIES]);}
function pfood(){return pick(FOODS);}
function pitem(){return pick(ITEMS);}

function em(icon,n){return Array(n).fill(icon).join('');}
function bl(w){return `<span class="bl" style="min-width:${w||36}px;">&nbsp;</span>`;}
function vs(a,b,op){
  op=op||'+';
  return `<span class="vsum"><span>${a}</span><span class="vop">${op}&nbsp;${b}</span><span class="vl"></span><span style="min-width:36px;">&nbsp;&nbsp;&nbsp;</span></span>`;
}
function mcq(q,opts){
  const L=['A','B','C','D'];
  const o=sh(opts).slice(0,4);
  return q+'<div class="mcq-opts">'+o.map((x,i)=>`<span class="mcq-o"><span class="mcq-c"></span>${L[i]}) ${x}</span>`).join('')+'</div>';
}
function nline(nums){
  return '<div class="nl-wrap">'+nums.map(n=>
    n===null?`<div class="nl-cell nl-blank">&nbsp;&nbsp;&nbsp;</div>`:`<div class="nl-cell">${n}</div>`
  ).join('')+'</div>';
}
function obox(icon,n,big){
  return `<div class="obj-box${big?' big':''}">${em(icon,n)}</div>`;
}
function drawbox(label){
  return `<span class="draw-box">${label||'draw here'}</span>`;
}

// ══════════════════════════════════════════════
// LEVEL DATABASE
// ══════════════════════════════════════════════
const LEVELS=[
  {id:1, cls:'Class 1', title:'Quantity Comparison',        topic:'More / Less / Equal using objects'},
  {id:2, cls:'Class 1', title:'Odd One Out',                topic:'Classification & differentiation'},
  {id:3, cls:'Class 1', title:'Sorting & Grouping',         topic:'Sort by size, colour, shape'},
  {id:4, cls:'Class 1', title:'Numbers 1–10',               topic:'Read, write, count 1–10'},
  {id:5, cls:'Class 1', title:'Finger Counting',            topic:'Count with fingers & objects'},
  {id:6, cls:'Class 1', title:'Before, After, Between',     topic:'Number sequence positions'},
  {id:7, cls:'Class 1', title:'Addition (Objects 1–10)',    topic:'Combine groups, total ≤ 10'},
  {id:8, cls:'Class 1', title:'Subtraction (1–10)',         topic:'Remove from group, within 10'},
  {id:9, cls:'Class 1', title:'Pattern Recognition',        topic:'Repeating shapes & number patterns'},
  {id:10,cls:'Class 1', title:'Comparison – Numerals',      topic:'Compare numbers using < > ='},
  {id:11,cls:'Class 1', title:'Review (1–10)',               topic:'Mixed review of Levels 1–10'},
  {id:12,cls:'Class 1', title:'Tens and Ones',              topic:'Place value – tens and ones'},
  {id:13,cls:'Class 1', title:'Numbers 11–30',              topic:'Read, write, count 11–30'},
  {id:14,cls:'Class 1', title:'Counting & Trace',           topic:'Count objects, trace numerals'},
  {id:15,cls:'Class 1', title:'Mixed (1–30)',               topic:'Mixed number skills up to 30'},
  {id:16,cls:'Class 1', title:'Addition (1–30)',            topic:'2-digit addition without carry'},
  {id:17,cls:'Class 1', title:'Subtraction (1–30)',         topic:'2-digit subtraction without borrow'},
  {id:18,cls:'Class 1', title:'Ordering Numbers',           topic:'Ascending & descending order'},
  {id:19,cls:'Class 2', title:'Numbers 31–50',              topic:'Read, write, count 31–50'},
  {id:20,cls:'Class 2', title:'Skip Counting 2s & 3s',      topic:'Skip count by 2s and 3s'},
  {id:21,cls:'Class 2', title:'Comparison (1–50)',          topic:'Compare numbers up to 50'},
  {id:22,cls:'Class 2', title:'Addition & Subtraction Mix', topic:'Mixed operations within 50'},
  {id:23,cls:'Class 2', title:'Review (1–50)',              topic:'Mixed review up to 50'},
  {id:24,cls:'Class 2', title:'2D Shapes',                  topic:'Sides, corners, shape names'},
  {id:25,cls:'Class 2', title:'Measurement Intro',          topic:'Long/short, heavy/light, compare'},
  {id:26,cls:'Class 2', title:'Numbers 51–100',             topic:'Read, write, count 51–100'},
  {id:27,cls:'Class 2', title:'Addition/Subtraction ≤100',  topic:'Operations within 100'},
  {id:28,cls:'Class 2', title:'Multiplication Intro',       topic:'Repeated addition, groups of'},
  {id:29,cls:'Class 2', title:'Division Intro',             topic:'Share equally, grouping'},
  {id:30,cls:'Class 2', title:'Fractions (½ & ¼)',         topic:'Half and quarter of shapes/sets'},
  {id:31,cls:'Class 2', title:'Time',                       topic:'Days, hours, o\'clock, half past'},
  {id:32,cls:'Class 2', title:'Measurement (Standard)',     topic:'cm/m, kg/g, litre/ml basics'},
  {id:33,cls:'Class 3', title:'Numbers up to 1000',         topic:'Read, write, compare 3-digit numbers'},
  {id:34,cls:'Class 3', title:'3-Digit Add & Subtract',     topic:'Operations with 3-digit numbers'},
  {id:35,cls:'Class 3', title:'Multiplication Tables',      topic:'Tables of 2–10, word problems'},
  {id:36,cls:'Class 3', title:'Division Facts',             topic:'Division, link with multiplication'},
  {id:37,cls:'Class 3', title:'Fractions (Class 3)',        topic:'Unit fractions, compare, add/sub'},
  {id:38,cls:'Class 3', title:'Geometry',                   topic:'Lines, angles, 2D & 3D shapes'},
  {id:39,cls:'Class 3', title:'Perimeter & Area',           topic:'Calculate perimeter and area'},
  {id:40,cls:'Class 3', title:'Data Handling',              topic:'Tally, pictograph, bar chart'},
];

// Difficulty ranges: d=0 main(hardest), d=1 easier, d=2 easiest
function numRange(d, ranges){ return ranges[d]||ranges[ranges.length-1]; }

// ══════════════════════════════════════════════
// QUESTION FACTORIES — each returns {key, html}
// ══════════════════════════════════════════════

// L1: Quantity Comparison
function qL1(d){
  const maxN=[10,7,4][d];
  const types=d===2?[0,1]:d===1?[0,1,2]:[0,1,2,3];
  const t=pick(types);
  const icon1=pick(FRUITS), icon2=pick(ANIMALS);
  const a=ri(1,maxN), b=ri(1,maxN);
  if(t===0){
    return {key:`L1-moreobject-${a}-${b}-${icon1}-${icon2}`,
      html:`<div class="obj-row">${obox(icon1,a,true)}<span style="font-size:16px;font-weight:700;padding:0 6px;">VS</span>${obox(icon2,b,true)}</div>
      Which group has <strong>MORE</strong>? Circle it.&nbsp; Answer: ${bl(70)}`};
  } else if(t===1){
    return {key:`L1-less-${a}-${b}-${icon1}-${icon2}`,
      html:`<div class="obj-row">${obox(icon1,a,true)}<span style="font-size:16px;font-weight:700;padding:0 6px;">VS</span>${obox(icon2,b,true)}</div>
      Which group has <strong>LESS</strong>? Circle it.&nbsp; Answer: ${bl(70)}`};
  } else if(t===2){
    const same=ri(1,maxN);
    const icon=pick(FRUITS);
    return {key:`L1-equal-${same}-${icon}`,
      html:`<div class="obj-row">${obox(icon,same,true)}<span style="padding:0 6px;">and</span>${obox(icon,same,true)}</div>
      Are both groups <strong>EQUAL</strong>? Circle: &nbsp;<strong>YES &nbsp;/&nbsp; NO</strong>`};
  } else {
    return {key:`L1-write-${a}-${b}`,
      html:`Group A has <strong>${a}</strong> objects.&nbsp; Group B has <strong>${b}</strong> objects.<br>
      Which is more? ${bl()} &nbsp;&nbsp; Which is less? ${bl()} &nbsp;&nbsp; Difference = ${bl()}`};
  }
}

// L2: Odd One Out
function qL2(d){
  const sets=[
    {g:['🍎','🍊','🍋','🚗'],odd:'🚗'},
    {g:['🐄','🐔','🐟','✏️'],odd:'✏️'},
    {g:['📚','✏️','🎒','🍎'],odd:'🍎'},
    {g:['🌸','🌻','🌷','🚗'],odd:'🚗'},
    {g:['🍌','🥭','🍇','🏠'],odd:'🏠'},
    {g:['⭐','⭐','⭐','🌙'],odd:'🌙'},
    {g:['🐘','🐕','🐈','📚'],odd:'📚'},
    {g:['🔵','🔵','🔵','🔴'],odd:'🔴'},
    {g:['🥕','🧅','🥦','🍎'],odd:'🍎'},
    {g:['✏️','📏','🖊️','🍊'],odd:'🍊'},
    {g:['🐄','🐔','🐟','🌸'],odd:'🌸'},
    {g:['🔺','🔺','🔺','🔵'],odd:'🔵'},
    {g:['🍋','🍋','🍋','🐕'],odd:'🐕'},
    {g:['🎒','🎒','🎒','🥕'],odd:'🥕'},
    {g:['🌙','🌙','⭐','🌙'],odd:'⭐'},
  ];
  const s=pick(sets);
  const items=sh(s.g);
  const hint=d===2?` (Hint: one does not belong with the others)`:'';
  return {key:`L2-${s.g.join('')}`,
    html:`<div class="obj-row">${items.map(e=>`<div class="obj-box big" style="font-size:26px;">${e}</div>`).join('')}</div>
    Circle the <strong>ODD ONE OUT</strong>${hint}. Write it here: ${bl(50)}`};
}

// L3: Sorting
function qL3(d){
  const types=d===0?[0,1,2]:d===1?[0,1]:[0];
  const t=pick(types);
  const icon=pick(FRUITS);
  if(t===0){
    const big=ri(3,5), small=ri(1,2);
    const items=[...Array(big).fill(`<span style="font-size:22px;">${icon}</span>`),...Array(small).fill(`<span style="font-size:13px;">${icon}</span>`)];
    return {key:`L3-size-${big}-${small}-${icon}`,
      html:`<div class="obj-row">${sh(items).join('&nbsp;')}</div>
      Count: &nbsp; <strong>Big</strong> ${icon} = ${bl()} &nbsp;&nbsp; <strong>Small</strong> ${icon} = ${bl()}`};
  } else if(t===1){
    const r=ri(2,5),b=ri(2,5),g=ri(2,4);
    return {key:`L3-colour-${r}-${b}-${g}`,
      html:`<div class="obj-row">
        ${Array(r).fill('<span style="font-size:20px;">🔴</span>').join('')}&nbsp;
        ${Array(b).fill('<span style="font-size:20px;">🔵</span>').join('')}&nbsp;
        ${Array(g).fill('<span style="font-size:20px;">🟢</span>').join('')}</div>
      Count: &nbsp; 🔴 = ${bl()} &nbsp; 🔵 = ${bl()} &nbsp; 🟢 = ${bl()}`};
  } else {
    const n1=ri(2,4), n2=ri(2,4);
    const i1=pick(['🔺','🔵','🟡','⬛']), i2=pick(['⭐','❤️','🔷','🌸']);
    return {key:`L3-shape-${n1}-${n2}-${i1}-${i2}`,
      html:`<div class="obj-row">${sh([...Array(n1).fill(i1),...Array(n2).fill(i2)]).map(x=>`<span style="font-size:20px;">${x}</span>`).join('&nbsp;')}</div>
      Count: &nbsp; ${i1} = ${bl()} &nbsp;&nbsp; ${i2} = ${bl()} &nbsp;&nbsp; Total = ${bl()}`};
  }
}

// L40: Data Handling
function qL40(d){
  const FRUIT_NAMES=['Mango','Apple','Banana','Guava','Orange'];
  const fnames=sh(FRUIT_NAMES).slice(0,d===0?5:d===1?4:3);
  const counts=fnames.map(()=>ri(2,10));
  const max=Math.max(...counts);
  const maxName=fnames[counts.indexOf(max)];
  const min=Math.min(...counts);
  const minName=fnames[counts.indexOf(min)];
  const total=counts.reduce((a,b)=>a+b,0);
  const tableHtml=`<table class="dtable"><tr><th>Fruit</th>${fnames.map(f=>`<th>${f}</th>`).join('')}</tr>
  <tr><td><b>Count</b></td>${counts.map(c=>`<td>${c}</td>`).join('')}</tr></table>`;
  const pictHtml=`<div style="margin:5px 0;">${fnames.map((f,i)=>`<div class="prow"><span class="pname">${f}</span>${Array(counts[i]).fill('⭐').join('')}</div>`).join('')}<div style="font-size:10px;margin-top:3px;color:#555;">⭐ = 1 ${fnames[0]}</div></div>`;
  const t=pick(d===0?[0,1,2,3,4]:d===1?[0,1,2,3]:[0,1,2]);
  if(t===0){return {key:`L40-most-${fnames.join('-')}-${counts.join('-')}`,html:tableHtml+`Which fruit is most popular? ${bl(100)}`};}
  else if(t===1){return {key:`L40-total-${counts.join('-')}`,html:tableHtml+`Total fruits counted = ${bl(55)}`};}
  else if(t===2){return {key:`L40-least-${fnames.join('-')}-${counts.join('-')}`,html:tableHtml+`Which fruit is least popular? ${bl(100)}`};}
  else if(t===3){return {key:`L40-pict-${fnames[0]}-${counts[0]}`,html:pictHtml+`How many ${fnames[0]} were counted? ${bl(55)}`};}
  else {return {key:`L40-tally-${ri(0,9)}`,html:mcq('Tally mark for 5 looks like:',['Four lines with one crossed (||||̶)','Five dots','IIIII','Five circles'])};}
}

let SEL={level:null, diff:0};

function buildSidebar(){
  const el=document.getElementById('lvl-list');
  ['Class 1','Class 2','Class 3'].forEach(cls=>{
    const g=document.createElement('div');
    g.innerHTML=`<div class="cls-label">📚 ${cls}</div>`;
    LEVELS.filter(l=>l.cls===cls).forEach(l=>{
      const b=document.createElement('button');
      b.className='lvl-btn'; b.id=`lb${l.id}`;
      b.innerHTML=`<span class="lvl-num">L${l.id}</span>${l.title}`;
      b.onclick=()=>selectLevel(l.id);
      g.appendChild(b);
    });
    el.appendChild(g);
  });
}

function selectLevel(id){
  SEL.level=id; SEL.diff=0;
  document.querySelectorAll('.lvl-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`lb${id}`).classList.add('active');
  const lv=LEVELS.find(l=>l.id===id);
  document.getElementById('ttitle').textContent=`Level ${id}: ${lv.title}`;
  const tabs=document.getElementById('sl-tabs');
  const labels=[['🔴 Main Level','Harder'],['🟡 Easier','Medium'],['🟢 Easiest','Simplest']];
  tabs.innerHTML='';
  labels.forEach(([lbl,sub],i)=>{
    const t=document.createElement('button');
    t.className='sl-tab'+(i===0?' active':'');
    t.innerHTML=lbl;
    t.title=sub;
    t.onclick=()=>{SEL.diff=i;document.querySelectorAll('.sl-tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');};
    tabs.appendChild(t);
  });
  document.getElementById('infobar').innerHTML=`<span class="ipill">Class: <b>${lv.cls}</b></span><span class="ipill">Topic: <b>${lv.topic}</b></span><span class="ipill">Sub-levels: <b>3 difficulties</b></span>`;
  ['gbtn','pbtn','dfbtn'].forEach(id2=>document.getElementById(id2).disabled=false);
}

function generatePaper(){
  if(!SEL.level) return;
  const lv=LEVELS.find(l=>l.id===SEL.level);
  const count=Math.max(5,Math.min(40,parseInt(document.getElementById('qcount').value)||10));
  document.getElementById('spin').classList.add('show');
  document.getElementById('smsg').textContent='Building your question paper…';
  setTimeout(()=>{
    const qs=genQuestions(SEL.level, SEL.diff, count);
    renderPaper(lv, qs, count);
    document.getElementById('spin').classList.remove('show');
  },200);
}

function renderPaper(lv, qs, count){
  document.getElementById('empty').style.display='none';
  document.getElementById('pw').style.display='block';

    <div class="ph-school">Foundation Learning (FLN) – Mathematics</div>
    <div class="ph-title">Question Paper</div>
    <div class="ph-sub">Level ${lv.id}: ${lv.title} &nbsp;|&nbsp; ${lv.cls} &nbsp;|&nbsp; ${diffNames[SEL.diff]}</div>
    <div class="ph-meta">
      <span class="mf"><strong>Name:</strong>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
      <span class="mf"><strong>Date:</strong>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
      <span class="mf"><strong>Marks:&nbsp;${totalMarks}</strong></span>
      <span class="mf"><strong>Time: 45 min</strong></span>
    </div>
  </div>`;
  html+=`<div class="sec-hdr">QUESTIONS — Answer all questions &nbsp;(${count} questions × 2 marks each = ${totalMarks} marks)</div>`;

  qs.forEach((q,i)=>{
    html+=`<div class="qrow"><span class="qn">${i+1}.</span><span class="qb">${q.html}</span></div>`;

  html+=`<div class="pf">Topic: ${lv.topic} &nbsp;|&nbsp; Level ${lv.id} &nbsp;|&nbsp; ${diffNames[SEL.diff]} &nbsp;|&nbsp; All the best! 🌟</div>`;
  document.getElementById('paper').innerHTML=html;
}

async function exportPDF(){
  const paper=document.getElementById('paper');
  if(!paper.innerHTML.trim()){alert('Generate a paper first!');return;}
  document.getElementById('spin').classList.add('show');
  document.getElementById('smsg').textContent='Creating PDF…';
  try{
    const canvas=await html2canvas(paper,{scale:2,useCORS:true,backgroundColor:'#ffffff'});
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const imgData=canvas.toDataURL('image/jpeg',0.95);
    const pdfW=pdf.internal.pageSize.getWidth();
    const pdfH=(canvas.height*pdfW)/canvas.width;
    const pageH=pdf.internal.pageSize.getHeight();
    let pos=0, left=pdfH;
    pdf.addImage(imgData,'JPEG',0,0,pdfW,pdfH);
    left-=pageH;
    while(left>0){pos=left-pdfH;pdf.addPage();pdf.addImage(imgData,'JPEG',0,pos,pdfW,pdfH);left-=pageH;}
    const lv=LEVELS.find(l=>l.id===SEL.level);
    pdf.save(`FLN_L${SEL.level}_${lv.title.replace(/[^a-z0-9]/gi,'_')}_${['Main','Easier','Easiest'][SEL.diff]}.pdf`);
  }catch(e){alert('PDF failed, use Print instead.');}
  document.getElementById('spin').classList.remove('show');
}

buildSidebar();
</script>
</body>
